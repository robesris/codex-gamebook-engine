      handleInputNumber(event);
      break;
    case 'input_text':
      handleInputText(event);
      break;
    case 'choose_items':
      handleChooseItems(event);
      break;
    case 'script':
      handleScript(event);
      break;
    case 'return_to_caller':
      handleReturnToCaller(event);
      break;
    case 'custom':
      handleCustom(event);
      processNextEvent();
      break;
    default:
      processNextEvent();
  }
}

// --- Modify Stat ---
function handleModifyStat(event) {
  const stat = event.stat;
  const amount = event.amount || 0;
  const content = document.getElementById('game-content');

  if (stat === 'provisions') {
    state.provisions = Math.max(0, state.provisions + amount);
  } else if (stat === 'gold') {
    state.gold = Math.max(0, state.gold + amount);
  } else {
    const old = state.stats[stat] || 0;
    let newVal = old + amount;
    // Respect initial max if applicable
    const statDef = (gameData.rules.stats || []).find(s => s.name === stat);
    if (statDef?.initial_is_max && state.initialStats[stat] !== undefined) {
      newVal = Math.min(newVal, state.initialStats[stat]);
    }
    if (statDef?.min !== undefined && statDef?.min !== null) {
      newVal = Math.max(newVal, statDef.min);
    }
    state.stats[stat] = newVal;
  }

  // Check for special: set to value instead of delta
  if (event.set_to !== undefined) {
    if (stat === 'provisions') state.provisions = event.set_to;
    else if (stat === 'gold') state.gold = event.set_to;
    else state.stats[stat] = event.set_to;
  }

  // Check for modify_initial. Exclude the three resource slots
  // (provisions, gold, meals) since those don't have a meaningful
  // "initial ceiling" — they're tracked on state directly, not via
  // state.initialStats, and the CLI emulator matches this behavior
  // (see cli-emulator/play.js).
  if (event.modify_initial && stat !== 'provisions' && stat !== 'gold' && stat !== 'meals') {
    state.initialStats[stat] = (state.initialStats[stat] || 0) + (event.modify_initial_amount || amount);
    // Also apply to current
    state.stats[stat] = (state.stats[stat] || 0) + (event.modify_initial_amount || 0);
  }

  const msg = document.createElement('div');
  msg.className = 'event-msg ' + (amount >= 0 ? 'gain' : 'loss');
  const sign = amount >= 0 ? '+' : '';
  msg.textContent = `${stat.toUpperCase()} ${sign}${amount}`;
  content.appendChild(msg);

  updateStatBar();

  // Check for death. Instead of jumping straight to the ending screen
  // (which would hide the section text the player may not have read yet),
  // pause event processing and render a Continue button that the player
  // clicks to acknowledge. This way the flow is:
  //    [section text] -> [STAMINA -2 loss banner] -> [Continue] -> ending
  // rather than
  //    [section text briefly visible] -> ending screen (confusing)
  const { healthStat: _hs2 } = getCombatStats();
  if (_hs2 && state.stats[_hs2] !== undefined && state.stats[_hs2] <= 0) {
    pendingEvents = [];
    pendingChoices = [];
    renderContinueToEnding(
      { text: `Your ${_hs2} has reached zero. Your adventure is over.`, ending_type: 'death', events: [], choices: [] },
      `${_hs2.toUpperCase()} has reached zero — your adventure is over.`
    );
    return;
  }
}

// Render a single "Continue" button that, when clicked, calls showEnding
// with the supplied section-like object. Used to give the player a beat
// to read the current section's text, any event banners, and any script
// log output before the ending screen swaps in.
function renderContinueToEnding(endingSection, summary) {
  const content = document.getElementById('game-content');
  const area = document.createElement('div');
  area.className = 'continue-area mt-2';
  area.innerHTML = `
    <div class="event-msg loss">${summary || 'Your adventure is over.'}</div>
    <div class="mt-2">
      <button class="btn btn-large" id="continue-to-ending">Continue</button>
    </div>
  `;
  content.appendChild(area);
  const btn = document.getElementById('continue-to-ending');
  if (btn) {
    btn.addEventListener('click', () => showEnding(endingSection), { once: true });
  }
}

// --- Add Item ---
function handleAddItem(event) {
  const item = event.item;
  if (!state.inventory.includes(item)) {
    state.inventory.push(item);
  }
  autoEquipOnAdd(item);
  const content = document.getElementById('game-content');
  const msg = document.createElement('div');
  msg.className = 'event-msg gain';
  msg.textContent = `Acquired: ${getItemName(item)}`;
  content.appendChild(msg);
  updateInventory();
  renderEquipmentPanel();
}

// --- Remove Item ---
function handleRemoveItem(event) {
  const idx = state.inventory.indexOf(event.item);
  if (idx >= 0) state.inventory.splice(idx, 1);
  autoUnequipOnRemove(event.item);
  const content = document.getElementById('game-content');
  const msg = document.createElement('div');
  msg.className = 'event-msg loss';
  msg.textContent = `Lost: ${getItemName(event.item)}`;
  content.appendChild(msg);
  updateInventory();
  renderEquipmentPanel();
}

// --- Remove Inventory Category ---
// Rule 24 (schema v1.8+): remove every inventory item whose
// items_catalog[id].inventory_category matches event.category, and
// auto-unequip any equipped items in that set. Canonical use: LW1 §188
// Kraan Backpack loss — "you have lost the Pack and all the Equipment
// that was inside it" encodes as a single remove_inventory_category
// event instead of a per-id sequence. Items without an
// inventory_category (or with a non-matching one) are unaffected.
function handleRemoveInventoryCategory(event) {
  const content = document.getElementById('game-content');
  const category = event.category;
  const catalog = (gameData && gameData.items_catalog) || {};
  if (!category) {
    const msg = document.createElement('div');
    msg.className = 'event-msg info';
    msg.textContent = '[Warning: remove_inventory_category event has no category field]';
    content.appendChild(msg);
    return;
  }
  const doomed = state.inventory.filter(id => (catalog[id] || {}).inventory_category === category);
  for (const id of doomed) {
    const idx = state.inventory.indexOf(id);
    if (idx >= 0) state.inventory.splice(idx, 1);
    autoUnequipOnRemove(id);
  }
  const msg = document.createElement('div');
  if (doomed.length > 0) {
    msg.className = 'event-msg loss';
    const names = doomed.map(id => getItemName(id)).join(', ');
    msg.textContent = `Lost ${doomed.length} ${category} item${doomed.length === 1 ? '' : 's'}: ${names}${event.reason ? ' — ' + event.reason : ''}`;
  } else {
    msg.className = 'event-msg info';
    msg.textContent = `No ${category} items to remove${event.reason ? ' — ' + event.reason : ''}`;
  }
  content.appendChild(msg);
  updateInventory();
  renderEquipmentPanel();
}

// --- Set Flag ---
function handleSetFlag(event) {
  state.flags.add(event.flag);
  const content = document.getElementById('game-content');
  const msg = document.createElement('div');
  msg.className = 'event-msg info';
  msg.textContent = `\u2691 ${event.flag.replace(/_/g, ' ')}`;
  content.appendChild(msg);
}

// --- Custom ---
// ==================== SCRIPT EVENT ====================
function handleScript(event) {
  if (!LuaEngine.available || !event.script_code) {
    // Fall back to showing description
    const content = document.getElementById('game-content');
    const msg = document.createElement('div');
    msg.className = 'event-msg info';
    msg.textContent = event.description || 'Script event (Lua not available)';
    content.appendChild(msg);
    processNextEvent();
    return;
  }

  const { healthStat } = getCombatStats();
  const playerData = {
    attack: getPlayerAttack(),
    health: getPlayerHealth(),
    name: 'You',
  };

  // Build the script context. Section-level script events see:
  //   game_state     — current values of all player stats (by name)
  //   initial_stats  — starting values of those stats (the "Initial" column)
  //   inventory      — array of item IDs currently carried
  //   flags          — array of flag names currently set
  //   items_catalog  — full items catalog from the game data
  // This matches the CLI emulator's script event context exactly so the
  // same script_code runs identically in both emulators.
  const extraContext = {
    game_state: { ...state.stats },
    initial_stats: { ...(state.initialStats || {}) },
    inventory: [...state.inventory],
    flags: [...state.flags],
    items_catalog: gameData.items_catalog || {},
  };

  const result = LuaEngine.runCombatRound(event.script_code, playerData, { attack: 0, health: 0, name: '' }, { round: 0 }, extraContext);

  const content = document.getElementById('game-content');

  if (result.error) {
    const msg = document.createElement('div');
    msg.className = 'event-msg loss';
    msg.textContent = 'Script error: ' + result.error;
    content.appendChild(msg);
    processNextEvent();
    return;
  }

  // Apply stat changes and health FIRST — they must be committed whether
  // or not the script also sets navigate_to. A script that both mutates
  // stats and navigates (e.g. Warlock 125's repeated-luck loop, which
  // deducts STAMINA on every failure and then navigates on success) will
  // otherwise lose the stat changes on the navigating branch.
  if (result.player?.health !== undefined && healthStat) {
    state.stats[healthStat] = Math.max(0, result.player.health);
  }
  if (result.player?.stats_changed) {
    for (const [k, v] of Object.entries(result.player.stats_changed)) {
      state.stats[k] = v;
    }
  }

  // Show log messages
  for (const msg of result.logs || []) {
    const el = document.createElement('div');
    el.className = 'event-msg info';
    el.innerHTML = msg;
    content.appendChild(el);
  }

  updateStatBar();

  // If the script requested navigation, DO NOT auto-advance. Script
  // events run atomically from the Lua side, so any dice rolls or
  // branching logic happens invisibly from the player's perspective.
  // Instead, show a Continue button so the player can read the section
  // text and the script's log output before moving on. Clicking
  // Continue navigates to the requested target.
  if (result.player?.navigate_to) {
    const target = result.player.navigate_to;
    const area = document.createElement('div');
    area.className = 'continue-area mt-2';
    area.innerHTML = `
      <div class="mt-2">
        <button class="btn btn-large" id="script-continue">Continue</button>
      </div>
    `;
    content.appendChild(area);
    const btn = document.getElementById('script-continue');
    if (btn) {
      btn.addEventListener('click', () => navigateTo(target), { once: true });
    }
    return;
  }

  // Check for death from the script's stat changes. Same pause-for-
  // Continue pattern as handleModifyStat's death check so the player
  // sees the section text and log messages before the ending.
  if (healthStat && state.stats[healthStat] !== undefined && state.stats[healthStat] <= 0) {
    pendingEvents = [];
    pendingChoices = [];
    renderContinueToEnding(
      { text: `Your ${healthStat} has reached zero. Your adventure is over.`, ending_type: 'death', events: [], choices: [] },
      `${healthStat.toUpperCase()} has reached zero — your adventure is over.`
    );
    return;
  }

  processNextEvent();
}

function handleCustom(event) {
  const content = document.getElementById('game-content');
  const msg = document.createElement('div');
  msg.className = 'event-msg info';
  msg.textContent = event.description || 'Special event';
  content.appendChild(msg);
}

// ==================== RETURN TO CALLER (codex 7.6.8) ====================
// Reference (auto-return) implementation: pop the last entry off
// state.returnStack and navigate there. If the stack is empty, fall
// back to the "purist" implementation by rendering an input_number
// prompt using the event's `prompt` string, letting the player type
// the reference they noted before the subroutine.
//
// Both implementation styles are codex-conformant. A single book JSON
// drives both because the prompt text serves as the fallback surface
// for the reference emulator whenever the stack is unexpectedly empty
// (debug jumps into a sub-section, manually loaded save state, etc).
function handleReturnToCaller(event) {
  const content = document.getElementById('game-content');
  if (!Array.isArray(state.returnStack)) state.returnStack = [];

  if (state.returnStack.length > 0) {
    const target = state.returnStack.pop();
    const msg = document.createElement('div');
    msg.className = 'event-msg info';
    msg.textContent = `Returning to section ${target}...`;
    content.appendChild(msg);
    // Pause for a Continue click so the player can read the current
    // section and the "returning to" confirmation before the target
    // section loads over the top.
    const wrap = document.createElement('div');
    wrap.className = 'continue-area mt-2';
    wrap.innerHTML = `<div class="mt-2"><button class="btn btn-large" id="return-to-caller-continue">Continue</button></div>`;
    content.appendChild(wrap);
    const btn = document.getElementById('return-to-caller-continue');
    if (btn) {
      btn.addEventListener('click', () => navigateTo(target), { once: true });
    }
    return;
  }

  // Fallback: no caller recorded. Render a numeric input prompt so the
  // player (who presumably noted the reference per the book's text) can
  // type it manually. This is the same UX a purist emulator would give
  // on every return; here it's only reached when the auto-return path
  // has no data to work with.
  const area = document.createElement('div');
  area.className = 'input-area';
  content.appendChild(area);
  const promptText = event.prompt || 'Enter the section reference you noted before the encounter';
  area.innerHTML = `
    <div class="event-msg info" style="font-style:italic">
      (return_to_caller fell back to manual entry — the return stack was empty, probably because you jumped here via the debug panel)
    </div>
    <h3>${promptText}</h3>
    <div class="mt-1" style="display:flex;gap:8px;align-items:center;justify-content:center;">
      <input type="number" id="return-to-caller-input" min="1" placeholder="Enter section number...">
      <button class="btn btn-small" onclick="submitReturnToCallerFallback()">Submit</button>
    </div>
  `;
  window.submitReturnToCallerFallback = function() {
    const raw = document.getElementById('return-to-caller-input')?.value;
    if (!raw) return;
    const num = parseInt(raw, 10);
    if (Number.isNaN(num)) return;
    navigateTo(num);
  };
}

// ==================== CHOOSE ITEMS ====================
function handleChooseItems(event) {
  const content = document.getElementById('game-content');
  const area = document.createElement('div');
  area.className = 'choose-items-area';
  content.appendChild(area);

  const catalog = gameData.items_catalog || {};
  const filter = event.catalog_filter || {};
  const excludeSet = new Set(event.exclude || []);
  const count = event.count || 1;
  const addAutomatic = event.add_automatic || [];
  const replaceCategory = event.replace_category || false;

  // Filter catalog — separate automatic items from selectable ones
  const autoSet = new Set(addAutomatic);
  const available = Object.entries(catalog).filter(([id, item]) => {
    if (autoSet.has(id)) return false; // shown separately
    if (excludeSet.has(id)) return false;
    for (const [key, val] of Object.entries(filter)) {
      if (item[key] !== val) return false;
    }
    return true;
  });
  const autoItems = addAutomatic.map(id => [id, catalog[id]]).filter(([id, item]) => item);

  const selected = new Set();

  function render() {
    let html = `<h3>${event.description || 'Choose your items'}</h3>`;
    html += `<div class="choose-items-count">Selected: ${selected.size} / ${count}</div>`;
    html += `<div class="choose-items-grid">`;
    // Show automatic items first (always included, not clickable)
    for (const [id, item] of autoItems) {
      html += `<div class="choose-item-btn selected" style="opacity:0.7;cursor:default;">
        <strong>${item.name}</strong> <span style="font-size:0.8em;color:var(--text-dim)">(always carried)</span>
        ${item.description ? `<div class="item-desc">${item.description}</div>` : ''}
      </div>`;
    }
    // Show selectable items
    for (const [id, item] of available) {
      const isSel = selected.has(id);
      html += `<div class="choose-item-btn ${isSel ? 'selected' : ''}" data-item-id="${id}">
        <strong>${item.name}</strong>
        ${item.description ? `<div class="item-desc">${item.description}</div>` : ''}
      </div>`;
    }
    html += `</div>`;
    if (selected.size === count) {
      html += `<div class="center mt-1"><button class="btn" id="confirm-items-btn">Confirm</button></div>`;
    }
    area.innerHTML = html;

    // Bind clicks
    area.querySelectorAll('.choose-item-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.itemId;
        if (selected.has(id)) {
          selected.delete(id);
        } else if (selected.size < count) {
          selected.add(id);
        }
        render();
      });
    });
    const confirmBtn = area.querySelector('#confirm-items-btn');
    if (confirmBtn) {
      confirmBtn.addEventListener('click', () => {
        // Remove existing items in category if replace_category. Also
        // auto-unequip any displaced items so their equipment slot
        // is cleared alongside the inventory removal.
        if (replaceCategory) {
          const filterKey = Object.keys(filter)[0];
          const filterVal = filter[filterKey];
          if (filterKey && filterVal) {
            const kept = [];
            for (const itemId of state.inventory) {
              const catItem = catalog[itemId];
              if (!catItem || catItem[filterKey] !== filterVal) {
                kept.push(itemId);
              } else {
                autoUnequipOnRemove(itemId);
              }
            }
            state.inventory = kept;
          }
        }
        // Add automatic items (auto-equip if applicable)
        for (const id of addAutomatic) {
          if (!state.inventory.includes(id)) state.inventory.push(id);
          autoEquipOnAdd(id);
        }
        // Add selected items (auto-equip if applicable)
        for (const id of selected) {
          if (!state.inventory.includes(id)) state.inventory.push(id);
          autoEquipOnAdd(id);
        }
        area.innerHTML = `<div class="event-msg gain">Selected: ${[...addAutomatic.map(id => getItemName(id)), ...[...selected].map(id => getItemName(id))].join(', ')}</div>`;
        updateInventory();
        updateStatBar();
        renderEquipmentPanel();
        processNextEvent();
      });
    }
  }

  render();
}

// ==================== COMBAT ====================
function handleCombat(event) {
  const content = document.getElementById('game-content');
  const area = document.createElement('div');
  area.className = 'combat-area';
  content.appendChild(area);

  // Resolve enemies list
  let enemies = [];
  if (event.enemies) {
    enemies = event.enemies.map(e => {
      const data = getEnemy(e.ref);
      return { ...data, ref: e.ref, currentHealth: getEnemyHealth(data) };
    });
  } else if (event.enemy_ref) {
    const data = getEnemy(event.enemy_ref);
    enemies = [{ ...data, ref: event.enemy_ref, currentHealth: getEnemyHealth(data) }];
  }

  const mode = event.mode || 'sequential';
  const winTo = event.win_to;
  const fleeTo = event.flee_to || null;
  const specialRules = event.special_rules || null;

  // Sum the deltas of every applied combat_modifier whose dot-path target
  // matches the given string (e.g. "player.attack") AND which is active
  // in the given round per its `duration` field. Used by renderCombat to
  // compute effective stat values for display. The full modifier
  // application pipeline lives in combatAttack(); this helper is display-
  // only and does not mutate any state.
  //
  // Schema v1.7+ duration-aware. When the display is called before the
  // first round runs (roundNum === 0), the caller should pass 1 so the
  // stat bar previews what the upcoming round will use.
  function sumAppliedModifiersForTarget(appliedModifiers, target, round) {
    if (!Array.isArray(appliedModifiers) || appliedModifiers.length === 0) return 0;
    let sum = 0;
    for (const m of appliedModifiers) {
      if (m && m.target === target && typeof m.delta === 'number' && modifierAppliesAtRound(m, round)) sum += m.delta;
    }
    return sum;
  }

  // Format a combat stat (attack stat for player or enemy) as an HTML
  // string suitable for the combat box stats-line. If the delta is zero
  // the output is a plain unchanged "<LABEL> <VALUE>". If the delta is
  // non-zero the output is "<LABEL> <EFFECTIVE> (base <BASE>)" where the
  // effective value is coloured red (net penalty) or green (net buff),
  // and the base value is shown in a dimmed parenthetical so the player
  // can always see both numbers at a glance. The tooltip on hover spells
  // out the modifier direction and magnitude.
  function formatEffectiveStat(label, baseVal, delta) {
    const safeBase = typeof baseVal === 'number' ? baseVal : 0;
    const safeDelta = typeof delta === 'number' ? delta : 0;
    if (safeDelta === 0) {
      return `${label} ${safeBase}`;
    }
    const effective = safeBase + safeDelta;
    const color = safeDelta < 0 ? 'var(--danger)' : 'var(--success)';
    const sign = safeDelta >= 0 ? '+' : '';
    const title = `base ${safeBase}, modifier ${sign}${safeDelta}, effective ${effective}`;
    return `${label} <span class="effective-stat" style="color:${color};font-weight:bold" title="${title}">${effective}</span> <span style="color:var(--text-dim);font-size:0.85em">(base ${safeBase})</span>`;
  }

  function renderCombat() {
    const c = window._combat;
    const enemy = c.enemies[c.currentEnemyIdx];
    const { attackStat, healthStat } = getCombatStats();
    const playerHealth = getPlayerHealth();
    const playerMaxHealth = state.initialStats[healthStat] || playerHealth;
    const playerAttack = getPlayerAttack();
    const enemyMaxHealth = getEnemyHealth(getEnemy(enemy.ref) || enemy);
    const enemyAttack = getEnemyAttack(enemy);

    // Compute effective attack values for display, accounting for the
    // frozen combat_modifiers list (schema v1.4). The math that the
    // round_script actually sees happens in combatAttack(); here we
    // reproduce the scalar-delta side of it (we sum every modifier whose
    // `target` is "player.attack" or "enemy.attack") so the stats-line can
    // show what's currently in effect. This is display-only — the
    // authoritative math is still done per-round in combatAttack.
    //
    // A modifier with delta 0 does not change the display.
    // A modifier with negative delta colours the effective value red.
    // A modifier with positive delta colours the effective value green.
    // The base value is shown in a dimmed parenthetical so the player can
    // always see both the base and the effective number at a glance.
    // Preview the upcoming round for pre-combat display (c.roundNum === 0)
    // so the stat bar reflects what the first fighting round will see.
    const displayRound = c.roundNum === 0 ? 1 : c.roundNum;
    const playerAttackDelta = sumAppliedModifiersForTarget(c.appliedModifiers, 'player.attack', displayRound);
    const enemyAttackDelta = sumAppliedModifiersForTarget(c.appliedModifiers, 'enemy.attack', displayRound);

    let html = `<div class="combat-header"><h3>COMBAT</h3>`;
    if (c.enemies.length > 1) {
      html += `<div style="font-size:0.85em;color:var(--text-dim)">Enemy ${c.currentEnemyIdx + 1} of ${c.enemies.length} (${c.mode})</div>`;
    }
    html += `</div>`;

    if (c.specialRules) {
      html += `<div class="special-rules-box"><strong>Special Rules:</strong> ${c.specialRules}</div>`;
    }
    if (c.appliedModifiers && c.appliedModifiers.length > 0) {
      // Render the frozen combat-modifier list for this fight. Schema
      // v1.4 combat_modifiers; duration-aware since v1.7. Each entry
      // shows target (dot-path), signed delta, an optional duration tag
      // when narrower than 'fight', and the reason if present. Purely
      // informational — the math is applied to playerData/enemyData
      // before the round_script runs in combatAttack, filtered by the
      // same duration logic. Modifiers not active in the current round
      // are dimmed but still shown so the player sees the full fight
      // landscape.
      const rows = c.appliedModifiers.map(m => {
        const sign = m.delta >= 0 ? '+' : '';
        const reason = m.reason ? ` — ${m.reason}` : '';
        const durTag = m.duration === 'first_round' ? ' <span style="color:var(--text-dim);font-size:0.85em">[round 1]</span>'
          : m.duration === 'after_first_round' ? ' <span style="color:var(--text-dim);font-size:0.85em">[round 2+]</span>'
          : '';
        const active = modifierAppliesAtRound(m, displayRound);
        const style = active ? '' : ' style="opacity:0.5"';
        return `<div${style}>${m.target} ${sign}${m.delta}${durTag}${reason}</div>`;
      }).join('');
      html += `<div class="special-rules-box"><strong>Modifiers:</strong>${rows}</div>`;
    }
    if (c.appliedDamageInteractions && c.appliedDamageInteractions.length > 0) {
      // Schema v1.5 damage_interactions panel. Shows immunities /
      // resistances / weaknesses that will scale damage components
      // this fight. Source-tag filters are displayed so the player
      // understands when the interaction will fire.
      const rows = c.appliedDamageInteractions.map(inter => {
        const parts = [];
        parts.push(`<span class="di-kind di-${inter.kind}">${inter.kind}</span>`);
        parts.push(`×${inter.multiplier}`);
        if (inter.direction && inter.direction !== 'incoming') parts.push(`(${inter.direction})`);
        if (Array.isArray(inter.source_has_any) && inter.source_has_any.length > 0) {
          parts.push(`for damage tagged [${inter.source_has_any.join(', ')}]`);
        }
        if (Array.isArray(inter.source_lacks_all) && inter.source_lacks_all.length > 0) {
          parts.push(`except damage tagged [${inter.source_lacks_all.join(', ')}]`);
        }
        if (inter.reason) parts.push(`— ${inter.reason}`);
        return `<div class="di-row">${parts.join(' ')}</div>`;
      }).join('');
      html += `<div class="damage-interactions-panel"><div class="di-header">Damage Interactions</div>${rows}</div>`;
    }

    const playerStatLine = (attackStat ? `${formatEffectiveStat(attackStat, playerAttack, playerAttackDelta)} | ` : '') + `${healthStat} ${playerHealth}`;
    const enemyStatLine = (attackStat ? `${formatEffectiveStat(attackStat, enemyAttack, enemyAttackDelta)} | ` : '') + `${healthStat} ${enemy.currentHealth}`;

    html += `<div class="combatants">
      <div class="combatant player">
        <div class="name" style="color:var(--stat-skill)">You</div>
        <div class="stats-line">${playerStatLine}</div>
        <div class="hp-bar"><div class="hp-fill" style="width:${Math.max(0, playerHealth / playerMaxHealth * 100)}%"></div></div>
      </div>
      <div style="font-size:1.5em;color:var(--text-dim)">vs</div>
      <div class="combatant enemy">
        <div class="name" style="color:var(--danger)">${enemy.name}</div>
        <div class="stats-line">${enemyStatLine}</div>
        <div class="hp-bar"><div class="hp-fill" style="width:${Math.max(0, enemy.currentHealth / enemyMaxHealth * 100)}%"></div></div>
      </div>
    </div>`;

    // Combat log
    if (c.combatLog.length > 0) {
      html += `<div class="combat-log">`;
      for (const entry of c.combatLog) {
        html += `<div class="round">${entry}</div>`;
      }
      html += `</div>`;
    }

    // Actions
    html += `<div class="combat-actions">`;
    if (c.waitingForLuckChoice) {
      const postLabel = gameData.rules.combat_system?.post_round_label || gameData.rules.combat_rules_detail?.post_round_label || 'Test Your Luck?';
      html += `<button class="btn btn-small" onclick="combatTestLuck()">${postLabel}</button>`;
      html += `<button class="btn btn-small" onclick="combatSkipLuck()">Skip</button>`;
    } else if (c.combatOver) {
      // Combat is resolved (all enemies defeated, or the player fled).
      // Show a Continue button rather than auto-navigating so the player
      // can read the final round results, the defeated-enemy banner or
      // flee-wound message, and any special_rules that were in effect
      // during the fight before the next section renders.
      html += `<button class="btn btn-large" onclick="combatContinueAfterEnd()">Continue</button>`;
    } else if (enemy.currentHealth > 0 && playerHealth > 0) {
      html += `<button class="btn" onclick="combatAttack()">Attack</button>`;
      if (c.fleeTo) {
        html += `<button class="btn btn-danger btn-small" onclick="combatFlee()">Flee</button>`;
      }
    }
    html += `</div>`;

    c.area.innerHTML = html;
    // Auto-scroll combat log
    const log = c.area.querySelector('.combat-log');
    if (log) log.scrollTop = log.scrollHeight;
  }

  // Evaluate combat_modifiers (schema v1.4) once at combat start. We
  // merge the combat event's `combat_modifiers` with the intrinsic
  // modifiers from each enemy's catalog entry, evaluate each modifier's
  // condition against current state, and freeze the result. The frozen
  // list is used for both UI display (in the combat header) and the
  // round_script math (applied to playerData/enemyData before each
  // round). Modifiers are NOT re-evaluated each round, which means a
  // mid-combat state change (losing an item that gated a modifier)
  // doesn't update the modifier list. This matches player expectations
  // — modifiers announced at combat start stay in effect — and simplifies
  // the code. If a book needs per-round dynamic modifiers, it should
  // encode them in the round_script directly.
  const eventModifiers = event.combat_modifiers || [];
  const intrinsicModifiers = [];
  for (const en of enemies) {
    const cat = getEnemy(en.ref) || {};
    if (Array.isArray(cat.intrinsic_modifiers)) {
      intrinsicModifiers.push(...cat.intrinsic_modifiers);
    }
  }
  // Rule 23 (schema v1.8+): book-wide standing modifiers from
  // rules.combat_system.standing_modifiers[] apply to every combat in
  // the book unless their condition evaluates false. Merged into the
  // same frozen list as per-section and per-enemy modifiers. Canonical
  // use: LW's "no weapon in hand = -4 COMBAT SKILL" book-wide rule —
  // encoded once in the rules block, auto-applied to every fight.
  const standingModifiers = Array.isArray(gameData?.rules?.combat_system?.standing_modifiers)
    ? gameData.rules.combat_system.standing_modifiers
    : [];
  const appliedModifiers = [];
  for (const mod of [...standingModifiers, ...eventModifiers, ...intrinsicModifiers]) {
    if (mod.condition && !evaluateCondition(mod.condition)) continue;
    const target = typeof mod.target === 'string' ? mod.target : null;
    const delta = typeof mod.delta === 'number' ? mod.delta : 0;
    if (!target || delta === 0) continue;
    // Schema v1.7+ honors the duration field. Preserve it on the frozen
    // list so combatAttack and the modifier-panel display can filter per
    // round. Absent duration defaults to 'fight' (backward compatible).
    appliedModifiers.push({ target, delta, reason: mod.reason || null, duration: mod.duration || 'fight' });
  }

  // Evaluate damage_interactions (schema v1.5) the same way combat_modifiers
  // are frozen. See CLI emulator startCombat() for the reference shape.
  const eventInteractions = event.damage_interactions || [];
  const intrinsicInteractions = [];
  for (const en of enemies) {
    const cat = getEnemy(en.ref) || {};
    if (Array.isArray(cat.intrinsic_damage_interactions)) {
      intrinsicInteractions.push(...cat.intrinsic_damage_interactions);
    }
  }
  const appliedDamageInteractions = [];
  for (const inter of [...eventInteractions, ...intrinsicInteractions]) {
    if (inter.condition && !evaluateCondition(inter.condition)) continue;
    const kind = inter.kind;
    if (kind !== 'immunity' && kind !== 'resistance' && kind !== 'weakness') continue;
    const defaultMult = kind === 'immunity' ? 0 : kind === 'resistance' ? 0.5 : 2;
    const multiplier = typeof inter.multiplier === 'number' ? inter.multiplier : defaultMult;
    appliedDamageInteractions.push({
      kind,
      multiplier,
      direction: inter.direction || 'incoming',
      source_has_any: Array.isArray(inter.source_has_any) ? inter.source_has_any.slice() : null,
      source_lacks_all: Array.isArray(inter.source_lacks_all) ? inter.source_lacks_all.slice() : null,
      reason: inter.reason || null,
    });
  }

  // Store combat state for callbacks — all mutable state lives here
  window._combat = {
    enemies, currentEnemyIdx: 0, mode, winTo, fleeTo, specialRules,
    // Frozen, condition-evaluated list of active modifiers for this
    // combat's duration. See comment above for why this is
    // snapshotted at combat start rather than re-evaluated each round.
    appliedModifiers,
    // Frozen damage_interactions — scale damage at round end.
    appliedDamageInteractions,
    roundNum: 0, combatLog: [], waitingForLuckChoice: false,
    combatOver: false,
    // When combat ends (victory or flee), this holds the section id
    // the Continue button should navigate to. If null, Continue falls
    // through to processNextEvent() instead.
    combatEndTarget: null,
    lastRoundResult: null, renderCombat, checkCombatEnd, area,
  };
  // Keep window._combatContext alive for equipment helpers to detect
  // in-combat state. It's the same object as window._combat.
  window._combatContext = window._combat;

  // Callback bound to the Continue button that appears after combat ends
  // (either the player wins or successfully flees). Navigates to the
  // appropriate target only after the player clicks, so one-round kills
  // and successful flees don't silently whisk the player to the next
  // section before they can read the outcome.
  window.combatContinueAfterEnd = function() {
    const c = window._combat;
    if (!c) return;
    // Guard against double-click / repeated Continue presses. Without
    // this guard, a player who clicks Continue more than once after
    // combat ends would re-fire the transition every time: for combats
    // with a win_to target, a second click re-runs navigateTo() (not
    // harmful visually because navigateTo clears content.innerHTML, but
    // it does re-process the destination section's events); for mid-
    // section combats with no win_to, each extra click re-runs
    // processNextEvent() and — if all pending events have already been
    // drained — re-runs showChoices(), which APPENDS another copy of
    // the section's choice buttons to #game-content each time. The flag
    // is only ever set on this specific combat instance, and a fresh
    // combat (the next handleCombat call) assigns a new object to
    // window._combat so the flag resets naturally for the next fight.
    if (c.continueClicked) return;
    c.continueClicked = true;
    // Clear the combat-actions container (the Continue button) so the
    // player doesn't see a dead clickable button after the transition
    // has started. The rest of the combat area — header, stats line,
    // combat log, modifier / damage-interaction panels — is left in
    // place on purpose: for mid-section combats (no win_to), the
    // upcoming events / choices render below the combat area and the
    // combat record stays on screen as a visible history of what just
    // happened, until the player eventually clicks a choice that
    // navigates to a new section (at which point navigateTo clears
    // content.innerHTML wholesale). For combats with win_to, that
    // innerHTML clear happens immediately on this same click, so
    // clearing only .combat-actions here is a no-op overhead that
    // keeps the behaviour uniform across both paths.
    if (c.area) {
      const actions = c.area.querySelector('.combat-actions');
      if (actions) actions.innerHTML = '';
    }
    const target = c.combatEndTarget;
    if (target != null) navigateTo(target);
    else processNextEvent();
  };

  window.combatAttack = function() {
    const c = window._combat;
    const enemy = c.enemies[c.currentEnemyIdx];
    const { attackStat, healthStat } = getCombatStats();
    c.roundNum++;

    // Get the round script from the combat system
    const cs = gameData.rules.combat_system;
    const roundScript = cs?.round_script || gameData.rules.combat_rules_detail?.round_script;

    if (!roundScript || !LuaEngine.available) {
      c.combatLog.push(`<span class="hit">Error: No combat round_script defined or Lua engine not available.</span>`);
      c.renderCombat();
      return;
    }

    // Build context for the Lua script
    // Pass all player stats and all enemy fields so scripts can access anything they need
    const playerData = {
      attack: getPlayerAttack(),
      health: getPlayerHealth(),
      name: 'You',
      ...state.stats,
    };
    // Apply passive equipment modifiers. Schema v1.5+ honors all three
    // stat_modifier.when values:
    //   - "always"   — applies whenever the item is in inventory.
    //   - "combat"   — applies during combat rounds (we're in one now).
    //   - "equipped" — applies only when the item is in an equipment slot
    //                  in state.equipment. This is the canonical way to
    //                  express "wielded weapon bonus" / "worn armor bonus".
    // An earlier version of this loop walked Object.entries(item.stat_modifier)
    // and treated every key as a stat name, which wrote playerData.stat =
    // "endurance" and playerData.amount = 2 instead of applying an ENDURANCE
    // bonus. Now we read the structured fields directly.
    const catalog = gameData.items_catalog || {};
    const equippedIds = new Set(Object.values(state.equipment || {}));
    for (const itemId of state.inventory) {
      const item = catalog[itemId];
      const sm = item?.stat_modifier;
      if (!sm || typeof sm.stat !== 'string' || typeof sm.amount !== 'number') continue;
      const when = sm.when || 'always';
      let applies = false;
      if (when === 'always') applies = true;
      else if (when === 'combat') applies = true;
      else if (when === 'equipped') applies = equippedIds.has(itemId);
      if (applies) {
        playerData[sm.stat] = (typeof playerData[sm.stat] === 'number' ? playerData[sm.stat] : 0) + sm.amount;
      }
    }
    const enemyCatalogEntry = getEnemy(enemy.ref) || {};
    const enemyData = {
      attack: getEnemyAttack(enemy),
      health: enemy.currentHealth,
      name: enemy.name,
      ...enemyCatalogEntry,
    };
    // Ensure health is the current value, not the catalog max
    enemyData.health = enemy.currentHealth;

    // Apply the frozen combat_modifiers list (schema v1.4; duration-aware
    // since v1.7). The list was evaluated once at combat start — see the
    // combat-init block further up in this function. Each modifier has a
    // target dot-path like "player.attack", "player.hit_threshold",
    // "enemy.armor", etc. The delta is added to the existing field value
    // on playerData or enemyData. Fields currently undefined are treated
    // as 0 so books can introduce new fields purely via modifiers.
    //
    // The `duration` field filters which rounds the modifier
    // participates in: 'fight' (default) every round, 'first_round' only
    // round 1, 'after_first_round' only rounds 2+, 'round' reserved and
    // currently treated as 'fight'.
    const activeThisRound = (c.appliedModifiers || []).filter(m => modifierAppliesAtRound(m, c.roundNum));
    for (const mod of activeThisRound) {
      const target = mod.target;
      const delta = mod.delta;
      const dotIdx = target.indexOf('.');
      if (dotIdx < 0) continue;
      const scope = target.slice(0, dotIdx);
      const field = target.slice(dotIdx + 1);
      let dataObj = null;
      if (scope === 'player') dataObj = playerData;
      else if (scope === 'enemy') dataObj = enemyData;
      if (!dataObj) continue;
      const current = typeof dataObj[field] === 'number' ? dataObj[field] : 0;
      dataObj[field] = current + delta;
    }
    // Surface newly-active modifiers in the combat log the round they
    // start participating. A 'fight' or 'first_round' modifier logs in
    // round 1; an 'after_first_round' modifier logs in round 2.
    const newlyActive = activeThisRound.filter(m => !modifierAppliesAtRound(m, c.roundNum - 1));
    if (newlyActive.length > 0) {
      for (const m of newlyActive) {
        const sign = m.delta >= 0 ? '+' : '';
        const durTag = m.duration === 'first_round' ? ' [first round only]'
          : m.duration === 'after_first_round' ? ' [rounds 2+]'
          : '';
        c.combatLog.push(`<span class="lucky">Modifier: ${m.target} ${sign}${m.delta}${durTag}${m.reason ? ' (' + m.reason + ')' : ''}</span>`);
      }
    }

    const combatData = {
      round: c.roundNum,
      standard_damage: cs?.details?.standard_damage || gameData.rules.combat_rules_detail?.standard_damage || 2,
      last_result: '',
      last_damage: 0,
      // Schema v1.5+ damage contract: round_scripts report damage here
      // rather than mutating *.health directly.
      damage_to_enemy: 0,
      damage_to_player: 0,
      // Expose applied modifiers to the round_script so book-specific
      // scripts can do per-modifier math if they need to. Most scripts
      // don't need this — they just read the already-modified
      // player.attack / enemy.armor / hit_threshold / etc.
      modifiers: c.appliedModifiers || [],
      // Expose applied damage_interactions for scripts that want to
      // introspect them. Most won't.
      damage_interactions: c.appliedDamageInteractions || [],
    };

    // Expose equipment to the round_script as player.equipment so
    // weapon-aware scripts can pick up the active slot contents.
    playerData.equipment = { ...(state.equipment || {}) };

    // Pass extra context: combat_system.details, inventory, items catalog,
    // and initial_stats so combat round_scripts can reference starting
    // values (e.g. "divide damage by half if your STAMINA is above
    // Initial minus 4"). The CLI emulator passes initial_stats to every
    // script call; matching it here keeps both emulators behaviourally
    // identical for books that depend on it.
    const extraContext = {
      inventory: [...state.inventory],
      items_catalog: catalog,
      initial_stats: { ...(state.initialStats || {}) },
      equipment: { ...(state.equipment || {}) },
    };
    const details = cs?.details || {};
    for (const [key, val] of Object.entries(details)) {
      if (key !== 'standard_damage') {
        extraContext[key] = typeof val === 'object' ? val : val;
      }
    }

    // Record health before the script runs so we can detect old-contract
    // scripts that still mutate *.health directly.
    const preEnemyHealth = enemy.currentHealth;
    const prePlayerHealth = getPlayerHealth();

    const result = LuaEngine.runCombatRound(roundScript, playerData, enemyData, combatData, extraContext);

    if (result.error) {
      c.combatLog.push(`<span class="hit">Lua error: ${result.error}</span>`);
      c.renderCombat();
      return;
    }

    // Schema v1.5+ contract: reject round_scripts that still mutate
    // player.health / enemy.health directly. The emulator has no way to
    // apply damage_interactions to a value the script already subtracted.
    if ((result.enemy && result.enemy.health !== undefined && result.enemy.health !== preEnemyHealth) ||
        (result.player && result.player.health !== undefined && result.player.health !== prePlayerHealth)) {
      c.combatLog.push(`<span class="hit">ERROR: round_script uses the pre-v1.5 contract (mutated *.health directly). Migrate to combat.damage_to_enemy / combat.damage_to_player. See Rule 18.</span>`);
      c.renderCombat();
      return;
    }

    // Apply damage reported by the script, scaled by any active
    // damage_interactions per damage component.
    const enemyComponents = normalizeDamage(result.combat?.damage_to_enemy);
    const playerComponents = normalizeDamage(result.combat?.damage_to_player);
    const interactions = c.appliedDamageInteractions || [];
    const enemyTotal = applyDamageInteractions(enemyComponents, interactions, 'incoming', c.combatLog, c.roundNum);
    const playerTotal = applyDamageInteractions(playerComponents, interactions, 'outgoing', c.combatLog, c.roundNum);

    if (enemyTotal !== 0) {
      enemy.currentHealth = Math.max(0, enemy.currentHealth - enemyTotal);
    }
    if (playerTotal !== 0) {
      setPlayerHealth(Math.max(0, getPlayerHealth() - playerTotal));
    }

    // Add logs
    for (const msg of result.logs || []) {
      c.combatLog.push(`<span class="hit">${msg}</span>`);
    }

    // Store last result for luck testing etc.
    const lr = result.combat?.last_result;
    if (lr === 'player_wounds_enemy') {
      c.lastRoundResult = { winner: 'player', damage: result.combat?.last_damage || 0, enemy };
    } else if (lr === 'enemy_wounds_player') {
      c.lastRoundResult = { winner: 'enemy', damage: result.combat?.last_damage || 0, enemy };
    } else {
      c.lastRoundResult = null;
    }

    updateStatBar();

    // Check for post-round script (luck testing, etc.)
    const postScript = cs?.post_round_script || gameData.rules.combat_rules_detail?.post_round_script;
    if (postScript && c.lastRoundResult) {
      // If there's a post-round script, offer it as an option
      c.waitingForLuckChoice = true;
    } else {
      c.waitingForLuckChoice = false;
      c.checkCombatEnd();
      return;
    }

    c.renderCombat();
  };

  window.combatTestLuck = function() {
    const c = window._combat;
    const lr = c.lastRoundResult;
    if (!lr) { c.waitingForLuckChoice = false; c.renderCombat(); return; }

    const cs = gameData.rules.combat_system;
    const postScript = cs?.post_round_script || gameData.rules.combat_rules_detail?.post_round_script;

    if (!postScript || !LuaEngine.available) {
      c.waitingForLuckChoice = false;
      c.lastRoundResult = null;
      c.checkCombatEnd();
      return;
    }

    const playerData = {
      attack: getPlayerAttack(),
      health: getPlayerHealth(),
      name: 'You',
    };
    const enemyData = {
      attack: getEnemyAttack(lr.enemy),
      health: lr.enemy.currentHealth,
      name: lr.enemy.name,
    };
    const combatData = {
      round: c.roundNum,
      last_result: lr.winner === 'player' ? 'player_wounds_enemy' : 'enemy_wounds_player',
      last_damage: lr.damage,
    };

    // Pass all stats so the script can access luck etc.
    const extraContext = { player_stats: { ...state.stats }, initial_stats: { ...state.initialStats } };
    const details = cs?.details || {};
    for (const [key, val] of Object.entries(details)) {
      if (typeof val === 'object') extraContext[key] = val;
    }

    const result = LuaEngine.runCombatRound(postScript, playerData, enemyData, combatData, extraContext);

    if (result.error) {
      c.combatLog.push(`<span class="hit">Lua error: ${result.error}</span>`);
    } else {
      lr.enemy.currentHealth = Math.max(0, result.enemy?.health ?? lr.enemy.currentHealth);
      setPlayerHealth(Math.max(0, result.player?.health ?? getPlayerHealth()));
      // Apply any stat changes from the script
      if (result.player?.stats_changed) {
        for (const [k, v] of Object.entries(result.player.stats_changed)) {
          state.stats[k] = v;
        }
      }
      for (const msg of result.logs || []) {
        c.combatLog.push(`<span class="lucky">${msg}</span>`);
      }
    }

    c.waitingForLuckChoice = false;
    c.lastRoundResult = null;
    updateStatBar();
    c.checkCombatEnd();
  };

  window.combatSkipLuck = function() {
    const c = window._combat;
    c.waitingForLuckChoice = false;
    c.lastRoundResult = null;
    c.checkCombatEnd();
  };

  function checkCombatEnd() {
    const c = window._combat;
    const enemy = c.enemies[c.currentEnemyIdx];

    // Player dead
    if (getPlayerHealth() <= 0) {
      c.combatLog.push('<span class="hit">You have been slain!</span>');
      c.renderCombat();
      setTimeout(() => {
        showEnding({ text: 'You have fallen in combat. Your adventure is over.', ending_type: 'death', events: [], choices: [] });
      }, 1000);
      return;
    }

    // Enemy dead
    if (enemy.currentHealth <= 0) {
      c.combatLog.push(`<span class="lucky">${enemy.name} is defeated!</span>`);

      const nextIdx = c.currentEnemyIdx + 1;
      if (nextIdx < c.enemies.length && (c.mode === 'sequential' || c.mode === 'custom')) {
        // Next enemy
        c.currentEnemyIdx = nextIdx;
        c.combatLog.push(`<br>--- Next opponent: ${c.enemies[c.currentEnemyIdx].name} ---`);
        c.renderCombat();
        return;
      } else {
        // All enemies defeated. Set the combatOver flag and re-render so
        // the player sees the final round's log (including the
        // "defeated!" banner) alongside a Continue button. The navigation
        // to winTo happens only after the player clicks Continue, so
        // one-round kills don't immediately jump to the next section
        // before the player can read what happened. currentEnemyIdx
        // still points at the just-defeated enemy at this point, so the
        // render is safe.
        c.combatOver = true;
        c.combatEndTarget = c.winTo;
        c.renderCombat();
        return;
      }
    }

    c.renderCombat();
  }

  window.combatFlee = function() {
    const c = window._combat;
    const fleeRules = gameData.rules.escaping || {};
    const fleeDmg = fleeRules.flee_damage || 2;

    setPlayerHealth(Math.max(0, getPlayerHealth() - fleeDmg));
    const { healthStat } = getCombatStats();
    c.combatLog.push(`<span class="hit">You flee! The enemy strikes as you run. (-${fleeDmg} ${healthStat})</span>`);
    updateStatBar();

    if (getPlayerHealth() <= 0) {
      c.checkCombatEnd();
      return;
    }

    // Offer luck test on flee wound if allowed
    const luckStat = (gameData.rules.stats || []).find(s => /luck/i.test(s.name));
    const luckVal = luckStat ? (state.stats[luckStat.name] || 0) : 0;
    if (fleeRules.luck_on_flee_wound_allowed && luckVal > 0) {
      c.lastRoundResult = { winner: 'enemy', damage: fleeDmg, enemy: c.enemies[c.currentEnemyIdx] };
      c.waitingForLuckChoice = true;
      c.renderCombat();
      // Override skip / luck-test callbacks to mark combat ended and
      // fall through to the standard Continue button flow, so the
      // player sees the flee wound, any luck-test result, and the
      // final state before clicking through to fleeTo. This matches
      // the victory path's combatOver/combatEndTarget convention.
      const origSkip = window.combatSkipLuck;
      window.combatSkipLuck = function() {
        c.waitingForLuckChoice = false;
        c.combatOver = true;
        c.combatEndTarget = c.fleeTo;
        c.renderCombat();
        window.combatSkipLuck = origSkip;
      };
      const origLuck = window.combatTestLuck;
      const savedTestLuck = window.combatTestLuck;
      window.combatTestLuck = function() {
        savedTestLuck();
        c.combatOver = true;
        c.combatEndTarget = c.fleeTo;
        c.renderCombat();
        window.combatTestLuck = origLuck;
        window.combatSkipLuck = origSkip;
      };
      return;
    }

    // No luck test — mark combat ended and re-render so the flee-wound
    // banner is visible next to the Continue button, which will navigate
    // to fleeTo on click (instead of the previous auto-navigate 500ms).
    c.combatOver = true;
    c.combatEndTarget = c.fleeTo;
    c.renderCombat();
  };

  renderCombat();
}

// ==================== STAT TEST ====================
function handleStatTest(event) {
  const content = document.getElementById('game-content');
  const area = document.createElement('div');
  area.className = 'test-area';
  content.appendChild(area);

  const stat = event.stat;
  const statVal = state.stats[stat] || 0;

  area.innerHTML = `
    <h3>Test Your ${stat.charAt(0).toUpperCase() + stat.slice(1)}</h3>
    <p style="color:var(--text-dim)">Roll 2d6. Succeed if &le; your current ${stat.toUpperCase()} (${statVal})</p>
    <div class="mt-2">
      <button class="btn" onclick="resolveStatTest(this)">Roll</button>
    </div>
  `;

  window.resolveStatTest = function(btn) {
    btn.disabled = true;
    const result = roll2d6();
    const success = result.total <= statVal;

    // Deduct if needed
    if (event.deduct_after) {
      const deductStat = event.deduct_stat || stat;
      const deductAmt = event.deduct_amount || 1;
      state.stats[deductStat] = Math.max(0, (state.stats[deductStat] || 0) - deductAmt);
      updateStatBar();
    }

    area.innerHTML = `
      <h3>Test Your ${stat.charAt(0).toUpperCase() + stat.slice(1)}</h3>
      <div class="dice-display">[${result.rolls.join(', ')}] = ${result.total}</div>
      <div class="test-result ${success ? 'success' : 'failure'}">
        ${result.total} vs ${statVal} — ${success ? 'Success!' : 'Failed!'}
      </div>
      ${event.deduct_after ? `<p style="font-size:0.85em;color:var(--text-dim)">${(event.deduct_stat || stat).toUpperCase()} reduced by ${event.deduct_amount || 1}</p>` : ''}
    `;

    // Apply failure_penalty if present and failed
    if (!success && event.failure_penalty) {
      const penalty = event.failure_penalty;
      if (penalty.type === 'modify_stat') {
        handleModifyStat(penalty);
      }
    }

    // Set a flag for test_failed conditions
    window._lastTestResult = success;

    const nextTarget = success ? event.success_to : event.failure_to;
    if (nextTarget) {
      // Don't auto-advance. The player clicked Roll and should get to
      // read the outcome (and the section text above it) before moving
      // on to the next section.
      const cont = document.createElement('div');
      cont.className = 'mt-2';
      cont.innerHTML = `<button class="btn btn-large" id="stat-test-continue">Continue</button>`;
      area.appendChild(cont);
      const cbtn = document.getElementById('stat-test-continue');
      if (cbtn) {
        cbtn.addEventListener('click', () => navigateTo(nextTarget), { once: true });
      }
    } else {
      // No navigation target, continue to the next event on the same
      // section; a short delay is fine because we're not swapping pages.
      setTimeout(() => processNextEvent(), 1000);
    }
  };
}

// ==================== DICE ROLL ====================
function handleRollDice(event) {
  const content = document.getElementById('game-content');
  const area = document.createElement('div');
  area.className = 'dice-roll-area';
  content.appendChild(area);

  const dice = event.dice || '2d6';

  area.innerHTML = `
    <h3>${event.prompt || 'Roll the Dice'}</h3>
    <p style="color:var(--text-dim)">Roll ${dice}</p>
    <div class="mt-2">
      <button class="btn" onclick="resolveRollDice(this)">Roll</button>
    </div>
  `;

  window.resolveRollDice = function(btn) {
    btn.disabled = true;
    const result = rollDice(dice);

    // Handle apply_to_stat: roll dice and apply result as stat modification
    if (event.apply_to_stat) {
      const stat = event.apply_to_stat;
      const isAdd = event.amount_sign === 'positive';
      const amount = isAdd ? result.total : -result.total;

      if (stat === 'provisions') state.provisions = Math.max(0, state.provisions + amount);
      else if (stat === 'gold') state.gold = Math.max(0, state.gold + amount);
      else {
        const old = state.stats[stat] || 0;
        state.stats[stat] = Math.max(0, old + amount);
      }

      area.innerHTML = `
        <h3>${event.prompt || 'Roll the Dice'}</h3>
        <div class="dice-display">[${result.rolls.join(', ')}] = ${result.total}</div>
        <div class="event-msg ${isAdd ? 'gain' : 'loss'}">${stat.toUpperCase()} ${isAdd ? '+' : ''}${amount}</div>
        ${event.note ? `<p style="font-size:0.85em;color:var(--text-dim)">${event.note}</p>` : ''}
      `;
      updateStatBar();

      // Check for death from the dice-applied stat loss. Route through
      // renderContinueToEnding so the player sees the roll result and the
      // section text before the ending screen swaps in.
      const { healthStat: _hs3 } = getCombatStats();
      if (_hs3 && state.stats[_hs3] !== undefined && state.stats[_hs3] <= 0) {
        pendingEvents = [];
        pendingChoices = [];
        renderContinueToEnding(
          { text: `Your ${_hs3} has reached zero. Your adventure is over.`, ending_type: 'death', events: [], choices: [] },
          `${_hs3.toUpperCase()} has reached zero — your adventure is over.`
        );
        return;
      }

      setTimeout(() => processNextEvent(), 1000);
      return;
    }

    // Standard result table lookup
    let matched = false;
    let target = null;
    let resultText = '';
    let matchedEntry = null;
    const results = event.results || {};
    if (results[String(result.total)]) {
      matched = true;
      matchedEntry = results[String(result.total)];
      target = matchedEntry.target;
      resultText = matchedEntry.text || matchedEntry.note || '';
    } else {
      // Check range keys like "1-2"
      for (const [key, val] of Object.entries(results)) {
        if (key.includes('-')) {
          const [lo, hi] = key.split('-').map(Number);
          if (result.total >= lo && result.total <= hi) {
            matched = true;
            matchedEntry = val;
            target = val.target;
            resultText = val.text || val.note || '';
            break;
          }
        }
      }
    }

    area.innerHTML = `
      <h3>${event.prompt || 'Roll the Dice'}</h3>
      <div class="dice-display">[${result.rolls.join(', ')}] = ${result.total}</div>
      ${resultText ? `<p>${resultText}</p>` : ''}
    `;

    // Per-range effects (Rule 22, schema v1.8+). Effects fire AFTER the
    // range match and BEFORE the target navigation. Each entry is a full
    // event object; we dispatch each through processEvent-equivalent
    // handlers for the non-pausing types. Pausing events inside effects
    // are not supported by Rule 22 — use a `script` event for that shape.
    // The CLI emulator mirrors this dispatch.
    if (matched && matchedEntry && Array.isArray(matchedEntry.effects)) {
      for (const subEvent of matchedEntry.effects) {
        if (subEvent.condition && !evaluateCondition(subEvent.condition)) continue;
        switch (subEvent.type) {
          case 'modify_stat':
            handleModifyStat(subEvent);
            break;
          case 'add_item':
            handleAddItem(subEvent);
            break;
          case 'remove_item':
            handleRemoveItem(subEvent);
            break;
          case 'remove_inventory_category':
            handleRemoveInventoryCategory(subEvent);
            break;
          case 'set_flag':
            handleSetFlag(subEvent);
            break;
          default: {
            const warn = document.createElement('div');
            warn.className = 'event-msg info';
            warn.textContent = `[Warning: roll_dice per-range effects do not support '${subEvent.type}' events. Use a script event for this shape per Rule 22.]`;
            area.appendChild(warn);
          }
        }
      }
      updateStatBar();
    }

    if (target) {
      // Add a Continue button so the player can read the section text
      // and the roll result before the next section loads. Don't auto-
      // advance — the roll already had a click, but a section change
      // is the point at which the player needs time to read.
      const cont = document.createElement('div');
      cont.className = 'mt-2';
      cont.innerHTML = `<button class="btn btn-large" id="roll-dice-continue">Continue</button>`;
      area.appendChild(cont);
      const cbtn = document.getElementById('roll-dice-continue');
      if (cbtn) {
        cbtn.addEventListener('click', () => navigateTo(target), { once: true });
      }
    } else if (matched) {
      // Matched a result but target is null — continue to next event/choices
      setTimeout(() => processNextEvent(), 1000);
    } else {
      area.innerHTML += `<p style="color:var(--danger)">No result for ${result.total}</p>`;
      processNextEvent();
    }
  };
}

// ==================== EAT MEAL ====================

// Rule 25 (schema v1.9+). Return the list of inventory item ids whose
// items_catalog entry declares consume.satisfies_eat_meal: true — these
// appear as alternative eat actions during eat_meal pauses.
function getNamedConsumables() {
  const catalog = (gameData && gameData.items_catalog) || {};
  const inv = Array.isArray(state.inventory) ? state.inventory : [];
  const out = [];
  for (const id of inv) {
    const entry = catalog[id];
    if (entry && entry.consume && entry.consume.satisfies_eat_meal === true) {
      out.push(id);
    }
  }
  return out;
}

function handleEatMeal(event) {
  const content = document.getElementById('game-content');
  const area = document.createElement('div');
  area.className = 'eat-meal-area';
  content.appendChild(area);

  const provRules = gameData.rules.provisions || {};
  const healAmount = event.heal_amount ?? provRules.heal_amount ?? 4;
  const healStat = event.heal_stat || provRules.heal_stat || 'stamina';

  const isRequired = event.required === true;
  const provLabel = provRules.display_name || 'Provisions';

  // Rule 25 (schema v1.9+). Named consumables — items whose catalog
  // entry declares consume.satisfies_eat_meal: true — are additional
  // options during any eat_meal pause. The Laumspur-style flow: player
  // may hold 0 generic provisions but 1 Laumspur and still be able to
  // satisfy a required eat_meal, so we must expose the named-consumable
  // buttons whenever any are present in inventory, not only in the
  // zero-provisions branch.
  const namedConsumables = getNamedConsumables();
  const catalog = gameData.items_catalog || {};

  function renderNamedButtons() {
    return namedConsumables.map(id => {
      const entry = catalog[id] || {};
      const safeId = String(id).replace(/'/g, "\\'");
      const displayName = entry.name || id;
      return `<button class="btn btn-success btn-small" onclick="doEatNamedConsumable('${safeId}')">Eat ${displayName}</button>`;
    }).join(' ');
  }

  if (state.provisions > 0 || namedConsumables.length > 0) {
    const hasGeneric = state.provisions > 0;
    const genericBtn = hasGeneric
      ? `<button class="btn btn-success btn-small" onclick="doEatMeal(${healAmount}, '${healStat}')">Eat ${provLabel}</button>`
      : '';
    area.innerHTML = `
      <h3>Eat a Meal</h3>
      <p>${isRequired ? 'You must eat a meal here.' : 'You may eat a meal.'}</p>
      ${hasGeneric ? `<p style="color:var(--text-dim)">Eating a generic ${provLabel.replace(/s$/,'').toLowerCase()} restores ${healAmount} ${healStat.toUpperCase()}. ${provLabel} remaining: ${state.provisions}.</p>` : `<p style="color:var(--text-dim)">You have no generic ${provLabel.toLowerCase()} left, but a named consumable is available.</p>`}
      <div class="mt-1">
        ${genericBtn}
        ${renderNamedButtons()}
        ${isRequired ? '' : '<button class="btn btn-small" onclick="skipMeal()">Skip</button>'}
      </div>
    `;
  } else {
    // Zero-food path (no generic provisions and no named consumables).
    // Before v2.9.0 this branch silently displayed "You have no
    // provisions to eat" and auto-proceeded — which was the documented
    // LW1 section 235 bug in known_issues.md: a required eat_meal with
    // penalty_amount:-3 fired, no meal was deducted, and the penalty
    // never applied. Fixed: if the event is required and a penalty is
    // defined, apply the penalty here and log it. Rule 15's event-
    // level `condition` field handles the exemption case (e.g. LW
    // Hunting discipline): if the condition evaluates false at event
    // dispatch, this handler is never called.
    const penStat = event.penalty_stat || provRules.heal_stat || 'endurance';
    const penalty = (typeof event.penalty_amount === 'number') ? event.penalty_amount : 0;
    if (isRequired && penalty !== 0) {
      const old = state.stats[penStat] || 0;
      state.stats[penStat] = Math.max(0, old + penalty);
      area.innerHTML = `
        <p style="color:var(--text-dim)">You have no ${provLabel.toLowerCase()} to eat.</p>
        <p style="color:var(--stat-endurance)">${penalty >= 0 ? '+' : ''}${penalty} ${penStat.toUpperCase()}</p>
      `;
      updateStatBar();
    } else {
      area.innerHTML = `
        <p style="color:var(--text-dim)">You have no ${provLabel.toLowerCase()} to eat.</p>
      `;
    }
    setTimeout(() => processNextEvent(), 500);
    return;
  }

  window.doEatMeal = function(heal, stat) {
    // Defense in depth: the zero-food branch returns early, so this
    // code path is only reached when generic provisions are available
    // OR a named consumable is available. Guard the decrement anyway.
    if (state.provisions > 0) state.provisions--;
    const old = state.stats[stat] || 0;
    let newVal = old + heal;
    const statDef = (gameData.rules.stats || []).find(s => s.name === stat);
    if (statDef?.initial_is_max && state.initialStats[stat] !== undefined) {
      newVal = Math.min(newVal, state.initialStats[stat]);
    }
    state.stats[stat] = newVal;

    area.innerHTML = `
      <p>You eat a meal. <span style="color:var(--stat-provisions)">+${heal} ${stat.toUpperCase()}</span></p>
    `;
    updateStatBar();
    processNextEvent();
  };

  window.doEatNamedConsumable = function(itemId) {
    // Rule 25: consume a named consumable as a Meal-substitute. Remove
    // one of the item (auto-unequipping if equipped), dispatch the
    // catalog entry's consume.effects synchronously through the normal
    // event handlers, and satisfy the eat_meal pause WITHOUT
    // decrementing state.provisions — this is a substitute, not a
    // supplement.
    const entry = (gameData.items_catalog || {})[itemId];
    if (!entry || !entry.consume || entry.consume.satisfies_eat_meal !== true || !state.inventory.includes(itemId)) {
      area.innerHTML = `<p style="color:var(--danger)">Cannot consume ${itemId}: not a valid named consumable in inventory</p>`;
      setTimeout(() => processNextEvent(), 500);
      return;
    }
    const idx = state.inventory.indexOf(itemId);
    if (idx >= 0) state.inventory.splice(idx, 1);
    if (state.equipment) {
      for (const slot of Object.keys(state.equipment)) {
        if (state.equipment[slot] === itemId) delete state.equipment[slot];
      }
    }
    const displayName = entry.name || itemId;
    let summary = `<p>You consume the ${displayName} as your meal.</p>`;
    if (Array.isArray(entry.consume.effects)) {
      for (const subEvent of entry.consume.effects) {
        if (subEvent.condition && !evaluateCondition(subEvent.condition)) continue;
        switch (subEvent.type) {
          case 'modify_stat':
            handleModifyStat(subEvent);
            if (subEvent.stat && typeof subEvent.amount === 'number') {
              summary += `<p><span style="color:var(--stat-provisions)">${subEvent.amount >= 0 ? '+' : ''}${subEvent.amount} ${String(subEvent.stat).toUpperCase()}</span></p>`;
            }
            break;
          case 'add_item':
            handleAddItem(subEvent);
            break;
          case 'remove_item':
            handleRemoveItem(subEvent);
            break;
          case 'remove_inventory_category':
            handleRemoveInventoryCategory(subEvent);
            break;
          case 'set_flag':
            handleSetFlag(subEvent);
            break;
          default: {
            summary += `<p class="event-msg info">[Warning: consume.effects do not support '${subEvent.type}' events. Use section-level events for pause-requiring shapes per Rule 25.]</p>`;
          }
        }
      }
    }
    area.innerHTML = summary;
    updateStatBar();
    processNextEvent();
  };

  window.skipMeal = function() {
    // The Skip button is only rendered when !isRequired, so an event
    // with `required: true` cannot reach this handler via the normal
    // UI path. Required-meal penalties are applied in the zero-food
    // branch above (when the player lacks all forms of food) or by
    // the caller via Rule 15 event conditions (when the player has an
    // exempting ability). This branch exists only for the optional-
    // meal case.
    area.innerHTML = `<p style="color:var(--text-dim)">You decide not to eat.</p>`;
    processNextEvent();
  };
}

// ==================== INPUT NUMBER ====================
function handleInputNumber(event) {
  const content = document.getElementById('game-content');
  const area = document.createElement('div');
  area.className = 'input-area';
  content.appendChild(area);

  area.innerHTML = `
    <h3>${event.prompt || 'Enter a number'}</h3>
    ${event.note ? `<p style="font-size:0.85em;color:var(--text-dim);margin-bottom:8px">${event.note}</p>` : ''}
    <div class="mt-1" style="display:flex;gap:8px;align-items:center;justify-content:center;">
      <input type="number" id="number-input" min="1" placeholder="Enter number...">
      <button class="btn btn-small" onclick="submitNumber()">Submit</button>
    </div>
  `;

  window.submitNumber = function() {
    const val = document.getElementById('number-input').value;
    if (!val) return;
    const num = parseInt(val);
    if (isNaN(num)) return;

    if (event.target === 'computed') {
      // Navigate to the entered number as a section
      navigateTo(num);
    } else if (event.target) {
      navigateTo(event.target);
    } else {
      navigateTo(num);
    }
  };
}

// ==================== INPUT TEXT ====================
function handleInputText(event) {
  const content = document.getElementById('game-content');
  const area = document.createElement('div');
  area.className = 'input-area';
  content.appendChild(area);

  area.innerHTML = `
    <h3>${event.prompt || 'Enter text'}</h3>
    <div class="mt-1" style="display:flex;gap:8px;align-items:center;justify-content:center;">
      <input type="text" id="text-input" placeholder="Enter text...">

    </div>
  `;

  window.submitText = function() {
    const val = document.getElementById('text-input').value.trim();
