<!DOCTYPE html>
<!--
  Codex Gamebook Engine — Browser Emulator
  Version: 2.5.0
  Compatible with codex doc >= 2.7 and GBF schema >= 1.4.0
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Emulator</title>
<style>
:root {
  --bg: #1a1510;
  --bg-card: #2a2318;
  --bg-card-hover: #342c20;
  --text: #d4c5a9;
  --text-dim: #8a7e6a;
  --text-bright: #f0e6cc;
  --accent: #c4964a;
  --accent-dim: #8a6a30;
  --danger: #a83232;
  --danger-bg: #3a1515;
  --success: #3a8a3a;
  --success-bg: #152a15;
  --border: #3a3228;
  --border-light: #4a4238;
  --stat-skill: #5a9adb;
  --stat-stamina: #d45a5a;
  --stat-luck: #c4964a;
  --stat-provisions: #6aaa6a;
  --stat-gold: #d4b44a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Georgia', 'Times New Roman', serif;
  line-height: 1.7;
  min-height: 100vh;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px;
}

h1, h2, h3 {
  color: var(--text-bright);
  font-weight: normal;
}

h1 { font-size: 2em; margin-bottom: 0.5em; text-align: center; }
h2 { font-size: 1.4em; margin-bottom: 0.5em; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
h3 { font-size: 1.1em; margin-bottom: 0.4em; }

.screen { display: none; }
.screen.active { display: block; }

/* --- Load Screen --- */
#load-screen { text-align: center; padding-top: 15vh; }
#load-screen h1 { font-size: 2.5em; color: var(--accent); margin-bottom: 0.2em; }
#load-screen .subtitle { color: var(--text-dim); margin-bottom: 2em; font-style: italic; }
/* Bright yellow version + commit-hash badge that sits inline after the
   "Codex Emulator" title on the load screen. Smaller than the h1 so it
   doesn't compete with the title visually, and a distinct bright
   colour so it stands out as build-identification metadata rather than
   decoration. Populated from JS at page load so the machine-readable
   CODEX_EMULATOR_VERSION / CODEX_EMULATOR_COMMIT constants stay the
   single source of truth. */
.emulator-version-badge {
  font-size: 0.38em;
  color: #ffeb3b;
  font-weight: normal;
  font-family: 'Courier New', Courier, monospace;
  letter-spacing: 0.03em;
  vertical-align: middle;
  white-space: nowrap;
}

.file-picker-area {
  border: 2px dashed var(--border-light);
  border-radius: 12px;
  padding: 40px;
  margin: 20px auto;
  max-width: 400px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.file-picker-area:hover { border-color: var(--accent); }
.file-picker-area input { display: none; }
.file-picker-area p { color: var(--text-dim); }

/* --- Character Creation --- */
.stat-roll {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 16px; margin-bottom: 10px;
}
.stat-roll .stat-name {
  font-weight: bold; min-width: 100px; text-transform: uppercase;
  font-size: 0.85em; letter-spacing: 1px;
}
.stat-roll .dice-result { color: var(--text-dim); font-size: 0.9em; }
.stat-roll .stat-value { color: var(--accent); font-size: 1.3em; font-weight: bold; margin-left: auto; }

.potion-choices { display: flex; flex-direction: column; gap: 8px; margin: 12px 0; }
.potion-btn {
  background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
  padding: 12px 16px; border-radius: 8px; cursor: pointer; text-align: left;
  font-family: inherit; font-size: 0.95em; transition: all 0.15s;
}
.potion-btn:hover { border-color: var(--accent); background: var(--bg-card-hover); }
.potion-btn.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--text-bright); }

.equipment-list {
  list-style: none; padding: 0; margin: 12px 0;
  display: flex; flex-wrap: wrap; gap: 8px;
}
.equipment-list li {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 12px; font-size: 0.9em;
}

.btn {
  display: inline-block; background: var(--accent-dim); color: var(--text-bright);
  border: 1px solid var(--accent); border-radius: 8px;
  padding: 10px 24px; cursor: pointer; font-family: inherit;
  font-size: 1em; transition: all 0.15s; text-align: center;
}
.btn:hover { background: var(--accent); color: var(--bg); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn:disabled:hover { background: var(--accent-dim); color: var(--text-bright); }
.btn-large { padding: 14px 36px; font-size: 1.1em; }
.btn-danger { background: var(--danger); border-color: var(--danger); }
.btn-danger:hover { background: #c44; }
.btn-small { padding: 6px 14px; font-size: 0.85em; }
.btn-success { background: var(--success); border-color: var(--success); }
.btn-success:hover { background: #4a4; }

.center { text-align: center; }
.mt-1 { margin-top: 10px; }
.mt-2 { margin-top: 20px; }
.mt-3 { margin-top: 30px; }
.mb-1 { margin-bottom: 10px; }

/* --- Stat Bar --- */
.stat-bar {
  display: flex; flex-wrap: wrap; gap: 6px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; margin-bottom: 16px;
  position: sticky; top: 0; z-index: 10;
}
.stat-item {
  display: flex; align-items: center; gap: 4px;
  font-size: 0.85em; padding: 2px 8px;
  border-radius: 4px; background: rgba(0,0,0,0.2);
}
.stat-item .stat-label {
  text-transform: uppercase; font-size: 0.75em; letter-spacing: 1px;
  color: var(--text-dim);
}
.stat-item .stat-val { font-weight: bold; font-size: 1.1em; }
.stat-item.skill .stat-val { color: var(--stat-skill); }
.stat-item.stamina .stat-val { color: var(--stat-stamina); }
.stat-item.luck .stat-val { color: var(--stat-luck); }
.stat-item.provisions .stat-val { color: var(--stat-provisions); }
.stat-item.gold .stat-val { color: var(--stat-gold); }

.stat-bar-actions {
  margin-left: auto; display: flex; gap: 6px; align-items: center;
}

/* --- Inventory Panel --- */
.inventory-toggle {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; margin-bottom: 16px; overflow: hidden;
}
.inventory-header {
  padding: 10px 14px; cursor: pointer; display: flex;
  align-items: center; justify-content: space-between;
  font-size: 0.9em; color: var(--text-dim);
}
.inventory-header:hover { background: var(--bg-card-hover); }
.inventory-body {
  padding: 0 14px 12px; display: none;
}
.inventory-toggle.open .inventory-body { display: block; }
.inventory-items {
  list-style: none; display: flex; flex-wrap: wrap; gap: 6px;
}
.inventory-items li {
  background: rgba(0,0,0,0.2); border: 1px solid var(--border);
  border-radius: 4px; padding: 3px 10px; font-size: 0.85em;
  display: inline-flex; align-items: center; gap: 6px;
}
.inventory-items .empty { color: var(--text-dim); font-style: italic; }
.inventory-items .equip-btn {
  font-size: 0.8em; padding: 1px 6px; border-radius: 3px;
  background: rgba(0,180,255,0.15); border: 1px solid rgba(0,180,255,0.4);
  color: inherit; cursor: pointer;
}
.inventory-items .equip-btn:hover:not(:disabled) { background: rgba(0,180,255,0.3); }
.inventory-items .equip-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Equipment panel (schema v1.5+). Sits inside the inventory toggle body
   and shows a compact slot → item view. */
.equipment-wrap {
  margin-top: 8px; padding-top: 6px;
  border-top: 1px dashed var(--border);
}
.equipment-header {
  font-size: 0.8em; font-weight: bold; letter-spacing: 1px;
  color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px;
}
.equipment-panel {
  font-size: 0.85em;
}
.equipment-panel .equip-row { padding: 2px 0; }
.equipment-panel .slot-name {
  color: var(--text-dim); text-transform: capitalize; margin-right: 4px;
}
.equipment-panel .slot-item { font-weight: bold; }
.equipment-panel .empty { color: var(--text-dim); font-style: italic; }

/* Damage interactions panel (schema v1.5+). Appears in the combat panel
   next to the combat_modifiers panel. */
.damage-interactions-panel {
  margin: 6px 0; padding: 6px 10px;
  background: rgba(255,80,80,0.08);
  border: 1px solid rgba(255,80,80,0.3);
  border-radius: 4px; font-size: 0.85em;
}
.damage-interactions-panel .di-header {
  font-weight: bold; color: #ff8080; margin-bottom: 3px;
  text-transform: uppercase; letter-spacing: 1px; font-size: 0.8em;
}
.damage-interactions-panel .di-row { padding: 1px 0; }
.damage-interactions-panel .di-kind {
  display: inline-block; min-width: 60px;
  font-weight: bold; text-transform: capitalize;
}
.damage-interactions-panel .di-immunity  { color: #ff6060; }
.damage-interactions-panel .di-resistance { color: #ffa060; }
.damage-interactions-panel .di-weakness  { color: #ffd060; }

/* --- Section Text --- */
.section-header {
  color: var(--accent); font-size: 1em; margin-bottom: 10px;
  font-weight: bold; letter-spacing: 1px; text-transform: uppercase;
}
.section-text {
  margin-bottom: 20px; white-space: pre-wrap;
  font-size: 1.05em;
}
.section-text p { margin-bottom: 0.8em; }

/* --- Choices --- */
.choices { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
.choice-btn {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 16px; cursor: pointer;
  color: var(--text); font-family: inherit; font-size: 0.95em;
  text-align: left; transition: all 0.15s; position: relative;
}
.choice-btn:hover { border-color: var(--accent); background: var(--bg-card-hover); }
.choice-btn.disabled {
  opacity: 0.4; cursor: not-allowed;
  border-style: dashed;
}
.choice-btn.disabled:hover { border-color: var(--border); background: var(--bg-card); }
.choice-btn .condition-tooltip {
  display: none; position: absolute; bottom: 100%; left: 10px;
  background: #111; border: 1px solid var(--border-light); color: var(--text-dim);
  padding: 6px 10px; border-radius: 6px; font-size: 0.8em;
  white-space: nowrap; margin-bottom: 6px; z-index: 20;
}
.choice-btn.disabled:hover .condition-tooltip { display: block; }

/* --- Combat --- */
.combat-area {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; margin-bottom: 16px;
}
.combat-header { text-align: center; margin-bottom: 12px; }
.combat-header h3 { color: var(--danger); font-size: 1.2em; }

.combatants {
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; margin-bottom: 16px;
}
.combatant {
  flex: 1; text-align: center; padding: 10px;
  border-radius: 8px; background: rgba(0,0,0,0.2);
}
.combatant .name { font-weight: bold; margin-bottom: 4px; }
.combatant .hp-bar {
  height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin: 6px 0;
}
.combatant .hp-fill {
  height: 100%; border-radius: 4px; transition: width 0.3s;
}
.combatant.player .hp-fill { background: var(--stat-stamina); }
.combatant.enemy .hp-fill { background: var(--danger); }
.combatant .stats-line { font-size: 0.85em; color: var(--text-dim); }

.combat-log {
  max-height: 200px; overflow-y: auto; margin-bottom: 12px;
  font-size: 0.9em; border: 1px solid var(--border); border-radius: 6px;
  padding: 8px; background: rgba(0,0,0,0.2);
}
.combat-log .round { margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.combat-log .round:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.combat-log .hit { color: var(--danger); }
.combat-log .miss { color: var(--text-dim); }
.combat-log .lucky { color: var(--stat-luck); }

.combat-actions { text-align: center; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

.special-rules-box {
  background: rgba(196, 150, 74, 0.1); border: 1px solid var(--accent-dim);
  border-radius: 6px; padding: 10px 14px; margin-bottom: 12px;
  font-size: 0.85em; color: var(--accent);
}
.special-rules-box strong { color: var(--text-bright); }

/* --- Stat Test / Dice Roll --- */
.test-area, .dice-roll-area {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; margin-bottom: 16px; text-align: center;
}
.dice-display {
  font-size: 2em; color: var(--accent); margin: 12px 0;
  font-weight: bold;
}
.test-result { margin: 12px 0; font-size: 1.1em; }
.test-result.success { color: var(--success); }
.test-result.failure { color: var(--danger); }

/* --- Input --- */
.input-area {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; margin-bottom: 16px;
}
.input-area input[type="text"], .input-area input[type="number"] {
  background: rgba(0,0,0,0.3); border: 1px solid var(--border-light);
  color: var(--text-bright); padding: 10px 14px; border-radius: 6px;
  font-family: inherit; font-size: 1em; width: 200px; text-align: center;
}
.input-area input:focus { outline: none; border-color: var(--accent); }

/* --- Ending --- */
.ending-death {
  border: 2px solid var(--danger); background: var(--danger-bg);
  border-radius: 12px; padding: 24px; text-align: center;
}
.ending-victory {
  border: 2px solid var(--stat-gold); background: rgba(60, 50, 20, 0.5);
  border-radius: 12px; padding: 24px; text-align: center;
}
.ending-death h2 { color: var(--danger); }
.ending-victory h2 { color: var(--stat-gold); }

/* --- Event Log --- */
.event-msg {
  background: rgba(0,0,0,0.2); border-left: 3px solid var(--accent);
  padding: 8px 12px; margin-bottom: 8px; font-size: 0.9em;
  border-radius: 0 6px 6px 0;
}
.event-msg.gain { border-left-color: var(--success); }
.event-msg.loss { border-left-color: var(--danger); }
.event-msg.info { border-left-color: var(--stat-skill); }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

/* Potion use button in stat bar */
.potion-info {
  font-size: 0.8em; color: var(--text-dim);
  background: rgba(0,0,0,0.2); border-radius: 4px;
  padding: 2px 8px; cursor: pointer;
}
.potion-info:hover { color: var(--accent); }

/* Eat meal area */
.eat-meal-area {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; margin-bottom: 16px; text-align: center;
}

/* --- Frontmatter --- */
.frontmatter-page { margin-bottom: 20px; }
.frontmatter-page h3 {
  color: var(--accent); margin-bottom: 12px;
  border-bottom: 1px solid var(--border); padding-bottom: 6px;
}
.frontmatter-page .fm-text {
  font-size: 1.05em; line-height: 1.8; white-space: pre-wrap;
}
.frontmatter-page .fm-text p { margin-bottom: 0.8em; }
.fm-type-tag {
  display: inline-block; font-size: 0.7em; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-dim); background: rgba(0,0,0,0.2);
  padding: 2px 8px; border-radius: 3px; margin-bottom: 8px;
}
.fm-page-indicator {
  text-align: center; color: var(--text-dim); font-size: 0.85em;
  margin-bottom: 12px;
}
.frontmatter-page-nav {
  display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
  margin-bottom: 16px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.frontmatter-page-nav button {
  background: var(--bg-card); color: var(--text); border: 1px solid var(--border);
  padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.85em;
}
.frontmatter-page-nav button:hover {
  background: var(--bg-card-hover); border-color: var(--accent-dim);
}
.frontmatter-page-nav button.current {
  background: var(--accent); color: var(--bg); border-color: var(--accent);
}

/* --- Choose Items --- */
.choose-items-area {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; margin-bottom: 16px;
}
.choose-items-grid {
  display: flex; flex-direction: column; gap: 6px; margin: 12px 0;
}
.choose-item-btn {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 14px; cursor: pointer;
  color: var(--text); font-family: inherit; font-size: 0.9em;
  text-align: left; transition: all 0.15s;
}
.choose-item-btn:hover { border-color: var(--accent); background: var(--bg-card-hover); }
.choose-item-btn.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--text-bright); }
.choose-item-btn .item-desc { font-size: 0.8em; color: var(--text-dim); margin-top: 2px; }
.choose-items-count { font-size: 0.85em; color: var(--text-dim); margin-bottom: 8px; }

/* --- Debug Panel --- */
.debug-toggle {
  position: fixed; bottom: 10px; right: 10px; z-index: 100;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-dim); font-size: 0.75em; padding: 4px 8px;
  border-radius: 4px; cursor: pointer; font-family: monospace;
}
.debug-toggle:hover { color: var(--accent); border-color: var(--accent); }
.debug-panel {
  display: none; position: fixed; bottom: 36px; right: 10px; z-index: 100;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px; font-family: monospace;
  font-size: 0.75em; width: 480px; max-width: 90vw; max-height: 80vh;
  overflow-y: auto; color: var(--text-dim);
}
.debug-panel.open { display: block; }
.debug-panel div { margin-bottom: 4px; }
.debug-panel .debug-label { color: var(--accent); }
.debug-panel .debug-section-header {
  color: var(--accent); text-transform: uppercase; font-size: 0.9em;
  border-top: 1px solid var(--border); padding-top: 8px; margin-top: 8px;
  cursor: pointer; user-select: none;
}
.debug-panel .debug-section-header:first-child { border-top: none; margin-top: 0; padding-top: 0; }
.debug-panel .debug-section-header::before { content: '\25B6 '; display: inline-block; transition: transform 0.1s; }
.debug-panel .debug-section-header.open::before { transform: rotate(90deg); }
.debug-panel .debug-section-body { display: none; padding-top: 6px; }
.debug-panel .debug-section-header.open + .debug-section-body { display: block; }
.debug-panel .debug-row {
  display: flex; gap: 4px; align-items: center; margin-bottom: 6px;
  flex-wrap: wrap;
}
.debug-panel .debug-row label { color: var(--text-dim); min-width: 70px; }
.debug-panel input, .debug-panel select {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: monospace; font-size: 1em;
  padding: 3px 6px; border-radius: 3px; min-width: 60px;
}
.debug-panel input[type="text"], .debug-panel input[type="number"] {
  flex: 1; min-width: 80px;
}
.debug-panel button.debug-btn {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--accent); font-family: monospace; font-size: 0.95em;
  padding: 3px 8px; border-radius: 3px; cursor: pointer;
}
.debug-panel button.debug-btn:hover { border-color: var(--accent); background: var(--bg-card); }
.debug-panel .debug-flag-tag {
  display: inline-block; padding: 2px 6px; margin: 2px 3px 2px 0;
  background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
}
.debug-panel .debug-flag-tag .remove-btn {
  margin-left: 4px; cursor: pointer; color: var(--danger);
}
.debug-panel .debug-flag-tag .remove-btn:hover { font-weight: bold; }
.debug-panel pre.debug-json {
  background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
  padding: 6px; max-height: 240px; overflow: auto; font-size: 0.9em;
  white-space: pre-wrap; word-break: break-word;
}
.debug-panel .debug-note { color: var(--text-dim); font-style: italic; font-size: 0.9em; }
.debug-panel .debug-status {
  margin-top: 4px; font-size: 0.9em; color: var(--accent);
  min-height: 1em;
}

/* --- Save/Load Bar --- */
.save-bar {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-bottom: 12px;
}
.save-bar button {
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-dim); font-family: monospace; font-size: 0.75em;
  padding: 4px 10px; border-radius: 4px; cursor: pointer;
}
.save-bar button:hover { color: var(--accent); border-color: var(--accent); }
.save-bar .save-status {
  font-size: 0.75em; color: var(--text-dim); align-self: center;
  font-family: monospace; opacity: 0; transition: opacity 0.3s;
}
.save-bar .save-status.show { opacity: 1; }

.continue-btn-area {
  margin-top: 16px;
}
.continue-btn-area button {
  background: none; border: 1px solid var(--border);
  color: var(--text-dim); padding: 10px 20px; border-radius: 8px;
  cursor: pointer; font-family: inherit; font-size: 0.9em;
}
.continue-btn-area button:hover { border-color: var(--accent); color: var(--text); }
.continue-btn-area .save-info {
  font-size: 0.8em; color: var(--text-dim); margin-top: 6px;
}
</style>
</head>
<body>
<div class="container">

  <!-- LOAD SCREEN -->
  <div id="load-screen" class="screen active">
    <h1>Codex Emulator <span id="emulator-version-badge" class="emulator-version-badge"></span></h1>
    <p class="subtitle">A universal gamebook engine &mdash; <a href="https://github.com/robesris/codex-gamebook-engine" style="color:var(--accent);">GitHub</a></p>
    <div class="file-picker-area" id="file-picker">
      <p>Click to load a game data file (.json)</p>
      <input type="file" id="file-input" accept=".json">
    </div>
    <p id="load-error" style="color: var(--danger); margin-top: 12px;"></p>
    <div id="continue-area" class="continue-btn-area" style="display:none;"></div>
    <div class="mt-2 center">
      <label style="font-size:0.85em;color:var(--text-dim);cursor:pointer;">
        Import save file (.json)
        <input type="file" id="import-input" accept=".json" style="display:none;">
      </label>
    </div>
  </div>

  <!-- FRONTMATTER -->
  <div id="frontmatter-screen" class="screen">
    <h1 id="frontmatter-title"></h1>
    <div id="frontmatter-page-nav" class="frontmatter-page-nav"></div>
    <div id="frontmatter-content"></div>
    <div class="center mt-3">
      <button id="frontmatter-prev-btn" class="btn btn-small" style="display:none;" onclick="prevFrontmatterPage()">&laquo; Previous</button>
      <button id="frontmatter-close-btn" class="btn btn-small" style="display:none;" onclick="closeFrontmatterFromGame()">Close</button>
      <button id="frontmatter-next-btn" class="btn btn-large" onclick="nextFrontmatterPage()">Continue</button>
    </div>
  </div>

  <!-- CHARACTER CREATION -->
  <div id="creation-screen" class="screen">
    <h1 id="game-title"></h1>
    <h2>Character Creation</h2>
    <div id="stat-rolls"></div>
    <div id="potion-section" class="mt-2" style="display:none;">
      <h3>Choose Your Potion</h3>
      <p style="font-size:0.9em; color:var(--text-dim); margin-bottom:8px;">You may take one potion with you on your adventure (2 doses).</p>
      <div id="potion-choices" class="potion-choices"></div>
    </div>
    <div id="equipment-section" class="mt-2" style="display:none;">
      <h3>Starting Equipment</h3>
      <ul id="equipment-list" class="equipment-list"></ul>
    </div>
    <div class="center mt-3">
      <button id="begin-btn" class="btn btn-large" style="display:none;" onclick="beginAdventure()">Begin Adventure</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <div class="stat-bar" id="stat-bar"></div>
    <div class="save-bar">
      <button onclick="saveGame()">Save</button>
      <button onclick="loadSavedGame()">Load</button>
      <button onclick="exportState()">Export</button>
      <button onclick="document.getElementById('import-game-input').click()">Import</button>
      <input type="file" id="import-game-input" accept=".json" style="display:none;">
      <button id="reference-btn" style="display:none;" onclick="openReferenceFromGame()">Reference</button>
      <span class="save-status" id="save-status"></span>
    </div>
    <div class="inventory-toggle" id="inventory-panel">
      <div class="inventory-header" onclick="toggleInventory()">
        <span>Inventory</span>
        <span id="inv-arrow">&#9654;</span>
      </div>
      <div class="inventory-body">
        <ul class="inventory-items" id="inventory-list"></ul>
        <!-- Equipment panel — schema v1.5+. Shows each currently
             occupied equipment slot. Populated by renderEquipmentPanel(). -->
        <div class="equipment-wrap">
          <div class="equipment-header">Equipped</div>
          <div class="equipment-panel" id="equipment-panel"></div>
        </div>
      </div>
    </div>
    <div id="game-content"></div>
  </div>

  <!-- ENDING SCREEN -->
  <div id="ending-screen" class="screen"></div>

</div>

<!-- Debug Panel -->
<div class="debug-toggle" onclick="toggleDebug()">DEBUG</div>
<div class="debug-panel" id="debug-panel"></div>

<script src="fengari-web.js"></script>
<script>
const CODEX_EMULATOR_VERSION = '3.4.0';
// Short SHA of the git commit this emulator binary was built on top of.
// Updated via `scripts/stamp-emulator-commit.sh` immediately before
// making a commit that touches the emulator — the script reads
// `git rev-parse --short HEAD` and stamps the result here, so the
// resulting commit's CODEX_EMULATOR_COMMIT value is the short SHA of
// the commit's PARENT (semantically: "this emulator binary was built
// on top of commit X"). The stamp is one-off from the emitting
// commit's own hash, but that's unavoidable without a post-commit
// amend — and this way a downstream user opening the running
// emulator in a browser can see exactly which known-good release
// their binary was built on top of. Displayed in the Codex Emulator
// header on the load screen next to the version string.
const CODEX_EMULATOR_COMMIT = '4d4d612';

// Populate the load-screen version badge from the two constants above
// so the machine-readable constants stay the single source of truth.
// Runs synchronously because this script tag lives at the bottom of
// <body> — by the time it executes, #emulator-version-badge has
// already been parsed into the DOM.
(function initEmulatorVersionBadge() {
  const el = document.getElementById('emulator-version-badge');
  if (el) {
    el.textContent = 'v' + CODEX_EMULATOR_VERSION + ' @' + CODEX_EMULATOR_COMMIT;
    el.title = 'Codex Emulator v' + CODEX_EMULATOR_VERSION + ', built on top of commit ' + CODEX_EMULATOR_COMMIT;
  }
})();
// Pinned Lua runtime. The fengari-web.js bundle in this repo is a
// committed static file (not installed via npm) built by webpack from
// the fengari-web@0.1.4 source tree with its `fengari` core dep
// overridden to 0.1.5 (via npm overrides) so the bundled VM matches
// the CLI emulator's pin. The bundle's internal FENGARI_VERSION
// constant reads "Fengari 0.1.5". If we ever rebuild or upgrade,
// update this pin and re-run the full regression harness.
const FENGARI_RUNTIME_PIN = 'Fengari 0.1.5 (bundled)';
// ==================== GAME STATE ====================
let gameData = null;
let state = {
  stats: {},
  initialStats: {},
  inventory: [],
  // Equipment map {slot -> item_id}. Schema v1.5+.
  equipment: {},
  flags: new Set(),
  abilities: [],
  // Per-ability remaining-uses counters, populated by set_ability_uses
  // character creation steps and by book scripts. Keyed by ability name.
  // Empty by default; absent when no ability needs use tracking.
  abilityUses: {},
  provisions: 0,
  gold: 0,
  potion: null,
  potionDoses: 0,
  currentSection: null,
  previousSection: null,
  visitedSections: new Set(),
  // Stack of caller section ids pushed when the player navigates INTO a
  // section with `is_subroutine_entry: true`. Popped by the return_to_caller
  // event handler. Empty by default. See codex section 7.6.8.
  returnStack: [],
};

// ==================== UTILITY ====================
// Forced-roll queue used by the Debug panel's "Force Rolls" tool.
// Populated via debugQueueRolls() with individual per-die values. Every
// call into rollDice() drains values from the front of the queue first;
// when the queue runs out, rolls fall back to Math.random(). Both the
// JS event handlers (stat_test, roll_dice, combat round_script, etc.)
// and the Lua sandbox's roll() function route through rollDice(), so a
// single queue drives every dice roll in the game regardless of source.
// FIFO order. R10 values should be 0..9; dN values should be 1..N.
window._forcedRollQueue = [];

function rollDice(formula) {
  // Handle R10 (Lone Wolf random number table: 0-9)
  const r10 = formula.match(/^R10(?:\+(\d+))?$/);
  if (r10) {
    const bonus = r10[1] ? parseInt(r10[1]) : 0;
    const roll = window._forcedRollQueue.length > 0
      ? window._forcedRollQueue.shift()
      : Math.floor(Math.random() * 10); // 0-9
    return { total: roll + bonus, rolls: [roll], bonus };
  }
  // Parse "NdX+Y", "NdX*Y", "NdX-Y", or "NdX"
  const m = formula.match(/(\d+)d(\d+)(?:([+\-*])(\d+))?/);
  if (!m) return { total: 0, rolls: [], bonus: 0 };
  const count = parseInt(m[1]);
  const sides = parseInt(m[2]);
  const op = m[3] || '+';
  const modifier = m[4] ? parseInt(m[4]) : 0;
  const rolls = [];
  for (let i = 0; i < count; i++) {
    const r = window._forcedRollQueue.length > 0
      ? window._forcedRollQueue.shift()
      : Math.floor(Math.random() * sides) + 1;
    rolls.push(r);
  }
  const sum = rolls.reduce((a, b) => a + b, 0);
  const total = op === '*' ? sum * modifier :
                op === '-' ? sum - modifier :
                sum + modifier;
  return { total, rolls, bonus: modifier, op };
}

function roll2d6() {
  const r = rollDice('2d6');
  return r;
}

function getEnemy(ref) {
  return gameData.enemies_catalog[ref] || null;
}

// Schema v1.7+ duration-aware modifier filtering. Given a frozen modifier
// entry and a 1-based combat round number, return true if the modifier
// participates in that round. Round 0 is pre-first-round (nothing applies
// yet); round 1 is the first fighting round; round 2+ are subsequent
// rounds. Undefined duration means 'fight' (backward-compatible default).
// 'round' is reserved for a future per-round dynamic semantic and is
// currently treated as 'fight'.
function modifierAppliesAtRound(mod, round) {
  if (round < 1) return false;
  const dur = (mod && mod.duration) || 'fight';
  if (dur === 'first_round') return round === 1;
  if (dur === 'after_first_round') return round >= 2;
  return true;
}

// Resolve combat stat names from the game data's rules.attack_stat and rules.health_stat
function getCombatStats() {
  const rules = gameData.rules || {};
  return {
    attackStat: rules.attack_stat || null,
    healthStat: rules.health_stat || null,
  };
}

// Get the player's current attack stat value
function getPlayerAttack() {
  const { attackStat } = getCombatStats();
  return attackStat ? (state.stats[attackStat] || 0) : 0;
}

// Get the player's current health stat value
function getPlayerHealth() {
  const { healthStat } = getCombatStats();
  return healthStat ? (state.stats[healthStat] || 0) : 0;
}

// Set the player's health stat
function setPlayerHealth(val) {
  const { healthStat } = getCombatStats();
  if (healthStat) state.stats[healthStat] = val;
}

// Get enemy's attack stat value using the game's attack_stat name
function getEnemyAttack(enemy) {
  const { attackStat } = getCombatStats();
  if (!attackStat) return 0;
  const key = attackStat.toLowerCase().replace(/ /g, '_');
  return enemy[attackStat] ?? enemy[key] ?? 0;
}

// Get enemy's health stat value using the game's health_stat name
function getEnemyHealth(enemy) {
  const { healthStat } = getCombatStats();
  if (!healthStat) return 0;
  const key = healthStat.toLowerCase().replace(/ /g, '_');
  return enemy[healthStat] ?? enemy[key] ?? 0;
}

function getItemName(itemId) {
  const cat = gameData.items_catalog[itemId];
  return cat ? cat.name : itemId.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ==================== FILE LOADING ====================
document.getElementById('file-picker').addEventListener('click', () => {
  document.getElementById('file-input').click();
});

document.getElementById('file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      gameData = JSON.parse(ev.target.result);
      if (!gameData.sections || !gameData.rules) throw new Error('Invalid game data');
      // Check for existing save before starting new game
      const existingSave = localStorage.getItem(getSaveKey());
      if (existingSave) {
        offerSaveRestore(JSON.parse(existingSave));
      } else {
        startGame();
      }
    } catch (err) {
      document.getElementById('load-error').textContent = 'Error: ' + err.message;
    }
  };
  reader.readAsText(file);
});

// ==================== CHARACTER CREATION ====================
// ==================== LUA SANDBOX ====================
const LuaEngine = (function() {
  // Check if Fengari is available
  if (typeof fengari === 'undefined') {
    return {
      available: false,
      runCombatRound: () => ({ error: 'Lua engine not loaded' }),
    };
  }

  const lua = fengari.lua;
  const lauxlib = fengari.lauxlib;
  const lualib = fengari.lualib;
  const { to_luastring, to_jsstring } = fengari;

  function createSandbox() {
    const L = lauxlib.luaL_newstate();
    // Only open safe libs (math, string, table) — no io, os, debug
    lauxlib.luaL_requiref(L, to_luastring('_G'), lualib.luaopen_base, 1); lua.lua_pop(L, 1);
    lauxlib.luaL_requiref(L, to_luastring('math'), lualib.luaopen_math, 1); lua.lua_pop(L, 1);
    lauxlib.luaL_requiref(L, to_luastring('string'), lualib.luaopen_string, 1); lua.lua_pop(L, 1);
    lauxlib.luaL_requiref(L, to_luastring('table'), lualib.luaopen_table, 1); lua.lua_pop(L, 1);

    // Remove dangerous globals. os/io/debug are not even loaded here
    // (we only requiref base/math/string/table above), but we nil them
    // explicitly to match the CLI emulator's sandbox semantics so that
    // scripts which accidentally reference os.date() fail the same way
    // in both emulators. Time-of-day mechanics must go through the
    // sandbox-provided get_clock() function below, never os.date.
    for (const name of ['dofile', 'loadfile', 'require', 'collectgarbage', 'rawset', 'rawget', 'io', 'os', 'debug']) {
      lua.lua_pushnil(L);
      lua.lua_setglobal(L, to_luastring(name));
    }

    return L;
  }

  // Push a JS object as a Lua table
  function pushTable(L, obj) {
    lua.lua_createtable(L, 0, Object.keys(obj).length);
    for (const [key, val] of Object.entries(obj)) {
      lua.lua_pushstring(L, to_luastring(String(key)));
      if (typeof val === 'number') lua.lua_pushnumber(L, val);
      else if (typeof val === 'string') lua.lua_pushstring(L, to_luastring(val));
      else if (typeof val === 'boolean') lua.lua_pushboolean(L, val);
      else if (val === null || val === undefined) lua.lua_pushnil(L);
      else if (typeof val === 'object' && !Array.isArray(val)) pushTable(L, val);
      else if (Array.isArray(val)) {
        lua.lua_createtable(L, val.length, 0);
        for (let i = 0; i < val.length; i++) {
          if (typeof val[i] === 'number') lua.lua_pushnumber(L, val[i]);
          else if (typeof val[i] === 'string') lua.lua_pushstring(L, to_luastring(val[i]));
          else lua.lua_pushnil(L);
          lua.lua_rawseti(L, -2, i + 1);
        }
      }
      else lua.lua_pushnil(L);
      lua.lua_settable(L, -3);
    }
  }

  // Read a Lua table back to JS object
  function readTable(L, idx) {
    const obj = {};
    lua.lua_pushnil(L);
    while (lua.lua_next(L, idx < 0 ? idx - 1 : idx) !== 0) {
      const key = lua.lua_isstring(L, -2) ? to_jsstring(lua.lua_tostring(L, -2)) :
                  lua.lua_isnumber(L, -2) ? lua.lua_tonumber(L, -2) : null;
      let val;
      if (lua.lua_isnumber(L, -1)) val = lua.lua_tonumber(L, -1);
      else if (lua.lua_isstring(L, -1)) val = to_jsstring(lua.lua_tostring(L, -1));
      else if (lua.lua_isboolean(L, -1)) val = lua.lua_toboolean(L, -1);
      else if (lua.lua_istable(L, -1)) val = readTable(L, lua.lua_gettop(L));
      else val = null;
      if (key !== null) obj[key] = val;
      lua.lua_pop(L, 1);
    }
    return obj;
  }

  // Run a combat round script
  // Returns: { logs: string[], player: {health, attack}, enemy: {health, attack, name}, combat: {last_result, last_damage, ...} }
  function runCombatRound(script, playerData, enemyData, combatData, extraContext) {
    const L = createSandbox();
    const logs = [];

    // Register roll() function.
    //
    // Dice results (`total` and the per-die values in `rolls`) are
    // pushed as Lua INTEGERS, not floats. The Lone Wolf round_script
    // (and any other combat system that looks up a combat-results
    // table by the roll value as a string key) does
    //     combat_results_table[cr_key][tostring(rval)]
    // and Lua 5.3's tostring() distinguishes integers from floats —
    // tostring(9) is "9" but tostring(9.0) is "9.0". If we pushed die
    // rolls as lua_pushnumber (which promotes to double) the lookup
    // would silently miss every row of the CRT, dealing zero damage
    // to both sides and hanging the combat forever.
    lua.lua_pushcfunction(L, function(L) {
      const formula = to_jsstring(lua.lua_tostring(L, 1));
      const result = rollDice(formula);
      lua.lua_createtable(L, 0, 3);
      lua.lua_pushstring(L, to_luastring('total'));
      lua.lua_pushinteger(L, result.total);
      lua.lua_settable(L, -3);
      lua.lua_pushstring(L, to_luastring('rolls'));
      lua.lua_createtable(L, result.rolls.length, 0);
      for (let i = 0; i < result.rolls.length; i++) {
        lua.lua_pushinteger(L, result.rolls[i]);
        lua.lua_rawseti(L, -2, i + 1);
      }
      lua.lua_settable(L, -3);
      lua.lua_pushstring(L, to_luastring('text'));
      lua.lua_pushstring(L, to_luastring(result.rolls.join(', ')));
      lua.lua_settable(L, -3);
      return 1;
    });
    lua.lua_setglobal(L, to_luastring('roll'));

    // Register log() function
    lua.lua_pushcfunction(L, function(L) {
      const msg = to_jsstring(lua.lua_tostring(L, 1));
      logs.push(msg);
      return 0;
    });
    lua.lua_setglobal(L, to_luastring('log'));

    // Register lookup() for table lookups (e.g., Combat Results Table)
    lua.lua_pushcfunction(L, function(L) {
      // lookup(table, col_key, row_key) -> value
      if (!lua.lua_istable(L, 1)) { lua.lua_pushnil(L); return 1; }
      const tbl = readTable(L, 1);
      const col = lua.lua_isstring(L, 2) ? to_jsstring(lua.lua_tostring(L, 2)) : String(lua.lua_tonumber(L, 2));
      const row = lua.lua_isstring(L, 3) ? to_jsstring(lua.lua_tostring(L, 3)) : String(lua.lua_tonumber(L, 3));
      const result = tbl?.[col]?.[row];
      if (result && typeof result === 'object') {
        pushTable(L, result);
      } else if (typeof result === 'number') {
        lua.lua_pushnumber(L, result);
      } else {
        lua.lua_pushnil(L);
      }
      return 1;
    });
    lua.lua_setglobal(L, to_luastring('lookup'));

    // Register get_clock() — returns {wday=1..7 (1=Sunday), hour=0..23,
    // minute=0..59} from the browser's real wall clock. This is the only
    // supported way for a script event to read the current time; os.date
    // is nilled out in the sandbox. Time-of-day mechanics in books that
    // ask the reader "if you are reading this on Monday morning, turn to
    // X" must call get_clock() and branch on the returned fields.
    lua.lua_pushcfunction(L, function(L) {
      const d = new Date();
      lua.lua_createtable(L, 0, 3);
      lua.lua_pushstring(L, to_luastring('wday'));
      lua.lua_pushinteger(L, d.getDay() + 1); // JS 0..6 (Sun..Sat) -> 1..7
      lua.lua_settable(L, -3);
      lua.lua_pushstring(L, to_luastring('hour'));
      lua.lua_pushinteger(L, d.getHours());
      lua.lua_settable(L, -3);
      lua.lua_pushstring(L, to_luastring('minute'));
      lua.lua_pushinteger(L, d.getMinutes());
      lua.lua_settable(L, -3);
      return 1;
    });
    lua.lua_setglobal(L, to_luastring('get_clock'));

    // Push player, enemy, combat tables
    pushTable(L, playerData);
    lua.lua_setglobal(L, to_luastring('player'));

    pushTable(L, enemyData);
    lua.lua_setglobal(L, to_luastring('enemy'));

    pushTable(L, combatData);
    lua.lua_setglobal(L, to_luastring('combat'));

    // Push any extra context (e.g., combat_results_table)
    if (extraContext) {
      for (const [key, val] of Object.entries(extraContext)) {
        if (typeof val === 'object') pushTable(L, val);
        else if (typeof val === 'number') lua.lua_pushnumber(L, val);
        else if (typeof val === 'string') lua.lua_pushstring(L, to_luastring(val));
        else lua.lua_pushnil(L);
        lua.lua_setglobal(L, to_luastring(key));
      }
    }

    // Execute the script
    const status = lauxlib.luaL_dostring(L, to_luastring(script));
    if (status !== 0) {
      const err = to_jsstring(lua.lua_tostring(L, -1));
      lua.lua_close(L);
      return { error: err, logs };
    }

    // Read back player, enemy, combat tables
    lua.lua_getglobal(L, to_luastring('player'));
    const newPlayer = lua.lua_istable(L, -1) ? readTable(L, lua.lua_gettop(L)) : playerData;
    lua.lua_pop(L, 1);

    lua.lua_getglobal(L, to_luastring('enemy'));
    const newEnemy = lua.lua_istable(L, -1) ? readTable(L, lua.lua_gettop(L)) : enemyData;
    lua.lua_pop(L, 1);

    lua.lua_getglobal(L, to_luastring('combat'));
    const newCombat = lua.lua_istable(L, -1) ? readTable(L, lua.lua_gettop(L)) : combatData;
    lua.lua_pop(L, 1);

    lua.lua_close(L);
    return { player: newPlayer, enemy: newEnemy, combat: newCombat, logs, error: null };
  }

  return { available: true, runCombatRound };
})();

// ==================== FRONTMATTER + IN-GAME REFERENCE ====================
let frontmatterPages = [];
let frontmatterIdx = 0;
// True when the frontmatter screen was opened from inside the game via the
// Reference button rather than from the initial pre-character-creation
// walkthrough. Determines which buttons are visible (Close vs. Continue) and
// where finishing the last page returns to (game screen vs. character creation).
let frontmatterOpenedFromGame = false;

function offerSaveRestore(save) {
  showScreen('load-screen');
  const title = gameData.metadata?.title || 'Unknown';
  const date = new Date(save.timestamp);
  const timeStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const section = save.state?.currentSection || '?';

  const area = document.getElementById('continue-area');
  area.style.display = '';
  area.innerHTML = `
    <h3>Save Found</h3>
    <p style="font-size:0.9em;color:var(--text-dim);margin-bottom:12px;">${title} — Section ${section} (${timeStr})</p>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button class="btn" onclick="restoreSave()">Continue Saved Game</button>
      <button class="btn btn-small" onclick="startGame()">New Game</button>
    </div>
  `;

  window.restoreSave = function() {
    const raw = localStorage.getItem(getSaveKey());
    if (!raw) return;
    loadGame(JSON.parse(raw));
  };
}

// Returns the subset of frontmatter pages that should be shown on the
// pre-character-creation walkthrough at game start. Defaults to "all pages"
// for backward compatibility with books that don't set show_at_start.
function startupFrontmatterPages() {
  const fm = gameData?.frontmatter;
  if (!fm?.pages) return [];
  return fm.pages.filter(p => p.show_at_start !== false);
}

// Returns the subset of frontmatter pages that the player can access during
// play via the in-game Reference button. Defaults to "all pages" for backward
// compatibility with books that don't set accessible_during_play.
function inGameFrontmatterPages() {
  const fm = gameData?.frontmatter;
  if (!fm?.pages) return [];
  return fm.pages.filter(p => p.accessible_during_play !== false);
}

function startGame() {
  const startupPages = startupFrontmatterPages();
  if (startupPages.length > 0) {
    frontmatterPages = startupPages;
    frontmatterIdx = 0;
    frontmatterOpenedFromGame = false;
    showFrontmatterPage();
  } else {
    startCharacterCreation();
  }
}

// Open the frontmatter pages from inside the game without losing the player's
// current section, inventory, or stats. The player can browse all pages marked
// accessible_during_play, then click Close to return exactly where they left
// off. Wired to the Reference button in the game-screen save bar.
function openReferenceFromGame() {
  const refPages = inGameFrontmatterPages();
  if (refPages.length === 0) {
    return; // Reference button shouldn't have been visible; defensive.
  }
  frontmatterPages = refPages;
  frontmatterIdx = 0;
  frontmatterOpenedFromGame = true;
  showFrontmatterPage();
}

// Returns the player to the game screen with the active section preserved.
function closeFrontmatterFromGame() {
  frontmatterOpenedFromGame = false;
  showScreen('game-screen');
}

function showFrontmatterPage() {
  showScreen('frontmatter-screen');
  const page = frontmatterPages[frontmatterIdx];
  document.getElementById('frontmatter-title').textContent = gameData.metadata?.title || 'Gamebook';

  // Page-jump nav: a row of small buttons, one per page, so the player can
  // jump straight to the page they want without paging through every one.
  // Especially useful for books with many reference pages (maps, glossaries,
  // appendices). Hidden when there's only one page.
  const nav = document.getElementById('frontmatter-page-nav');
  if (frontmatterPages.length > 1) {
    nav.innerHTML = frontmatterPages.map((p, i) => {
      const cls = i === frontmatterIdx ? ' class="current"' : '';
      const label = p.title || `Page ${i + 1}`;
      return `<button${cls} onclick="jumpToFrontmatterPage(${i})">${label}</button>`;
    }).join('');
    nav.style.display = '';
  } else {
    nav.style.display = 'none';
  }

  const content = document.getElementById('frontmatter-content');
  const total = frontmatterPages.length;
  content.innerHTML = `
    <div class="fm-page-indicator">Page ${frontmatterIdx + 1} of ${total}</div>
    <div class="frontmatter-page">
      ${page.type ? `<span class="fm-type-tag">${page.type}</span>` : ''}
      <h3>${page.title}</h3>
      <div class="fm-text">${formatText(page.text)}</div>
    </div>
  `;

  // Button visibility depends on whether we're in the pre-character-creation
  // walkthrough or in the in-game reference panel.
  const nextBtn = document.getElementById('frontmatter-next-btn');
  const prevBtn = document.getElementById('frontmatter-prev-btn');
  const closeBtn = document.getElementById('frontmatter-close-btn');

  prevBtn.style.display = frontmatterIdx > 0 ? '' : 'none';

  if (frontmatterOpenedFromGame) {
    // In-game reference: Close button visible. Continue advances within the
    // pages and disappears on the last page (Close is the only exit).
    closeBtn.style.display = '';
    if (frontmatterIdx < total - 1) {
      nextBtn.textContent = 'Next \u00bb';
      nextBtn.style.display = '';
    } else {
      nextBtn.style.display = 'none';
    }
  } else {
    // Startup walkthrough: original behaviour. Continue paginates and the
    // last-page button starts character creation.
    closeBtn.style.display = 'none';
    nextBtn.style.display = '';
    if (frontmatterIdx < total - 1) {
      nextBtn.textContent = 'Continue';
    } else {
      nextBtn.textContent = 'Begin Character Creation';
    }
  }
}

function jumpToFrontmatterPage(idx) {
  if (idx < 0 || idx >= frontmatterPages.length) return;
  frontmatterIdx = idx;
  showFrontmatterPage();
}

function prevFrontmatterPage() {
  if (frontmatterIdx > 0) {
    frontmatterIdx--;
    showFrontmatterPage();
  }
}

function nextFrontmatterPage() {
  frontmatterIdx++;
  if (frontmatterIdx < frontmatterPages.length) {
    showFrontmatterPage();
  } else if (frontmatterOpenedFromGame) {
    // Past the last page in in-game reference mode. Just close.
    closeFrontmatterFromGame();
  } else {
    // Past the last page in startup walkthrough mode. Move to character
    // creation as before.
    startCharacterCreation();
  }
}

// ==================== CHARACTER CREATION ====================
function startCharacterCreation() {
  // Reset state for a fresh character.
  // Codex v2.9 / schema v1.6: provisions auto-init from
  // rules.provisions.starting_amount when present. See Rule 21 for
  // the full story and the CLI emulator's startCharacterCreation
  // for the matching logic.
  const startingProvisions =
    (typeof gameData?.rules?.provisions?.starting_amount === 'number' &&
     gameData.rules.provisions.starting_amount >= 0)
      ? gameData.rules.provisions.starting_amount
      : 0;
  state = {
    stats: {},
    initialStats: {},
    inventory: [],
    equipment: {},
    flags: new Set(),
    provisions: startingProvisions,
    gold: 0,
    meals: 0,
    potion: null,
    potionDoses: 0,
    abilities: [],
    currentSection: null,
    visitedSections: new Set(),
  };
  window._lastTestResult = null;

  showScreen('creation-screen');
  document.getElementById('game-title').textContent = gameData.metadata?.title || 'Gamebook';

  const steps = gameData.character_creation?.steps || [];
  const rollContainer = document.getElementById('stat-rolls');
  rollContainer.innerHTML = '';

  // Process steps that are immediate (rolls, items, resources)
  // Collect interactive steps (potion choice, ability choice) for later
  let interactiveSteps = [];
  const items = [];

  for (const step of steps) {
    // Schema v1.6+: character_creation_step.condition. If the step
    // carries a condition, we cannot safely evaluate it in this
    // pre-pass because the pre-pass runs before the interactive
    // choose_abilities / choose_one steps have produced their outputs.
    // A condition like `has_ability "Weaponskill"` must be evaluated
    // AFTER the player's discipline picks, not before. Defer the
    // conditional step into interactiveSteps where phase 2's
    // processCreationSteps loop will evaluate the condition at the
    // moment the step is reached (by which point earlier interactive
    // steps have run and their outputs are visible in state).
    //
    // Limitation of the current two-phase HTML flow: conditions that
    // depend on rolls made LATER than their dependency in phase 1 are
    // still not supported, because phase 1 runs all rolls before any
    // interactive step. This is not a concern for existing books
    // (LW1's only condition, post-v1.6, is `has_ability "Weaponskill"`
    // on step 3 gated by step 2's choose_abilities — exactly the
    // pattern this defer path handles). A full fix for
    // condition-on-earlier-roll patterns would require restructuring
    // the creation flow into a single sequential loop — tracked as a
    // backlog item, non-blocking for LW iter 13.
    if (step.condition) {
      interactiveSteps.push({ type: 'deferred_conditional_step', step });
      continue;
    }
    if (step.action === 'roll_stat') {
      const result = rollDice(step.formula);
      state.stats[step.stat] = result.total;
      state.initialStats[step.stat] = result.total;

      const div = document.createElement('div');
      div.className = 'stat-roll';
      const rollLabel = step.formula.startsWith('R10') ? `R10 = [${result.rolls[0]}]` : `${step.formula} = [${result.rolls.join(', ')}]`;
      div.innerHTML = `
        <span class="stat-name">${step.stat}</span>
        <span class="dice-result">${rollLabel}${result.bonus ? ` ${result.op || '+'} ${result.bonus}` : ''}</span>
        <span class="stat-value">${result.total}</span>
      `;
      rollContainer.appendChild(div);
    } else if (step.action === 'roll_resource') {
      // Schema v1.6+ / codex v2.9+. Roll into a canonical resource
      // slot (gold/provisions/meals) or a declared-stat-currency.
      // See Rule 11 in gamebook_codex_v2.md and the CLI emulator's
      // character_creation_roll_resource pause handler for the full
      // routing story.
      const result = rollDice(step.formula);
      const total = result.total;
      const rname = step.resource;
      let displayLabel = rname;
      if (rname === 'gold') {
        state.gold = total;
        displayLabel = gameData.rules?.inventory?.currency_display_name || 'Gold';
      } else if (rname === 'provisions') {
        state.provisions = total;
        displayLabel = gameData.rules?.provisions?.display_name || 'Provisions';
      } else if (rname === 'meals') {
        state.meals = total;
        displayLabel = 'Meals';
      } else {
        const statDefs = gameData.rules?.stats || [];
        const matchingStat = statDefs.find(s => s.name === rname);
        if (matchingStat) {
          state.stats[rname] = total;
          if (matchingStat.initial_is_max) state.initialStats[rname] = total;
        } else {
          console.warn(`roll_resource: unknown resource "${rname}" (not canonical, not a declared stat); value ${total} discarded`);
        }
      }
      const div = document.createElement('div');
      div.className = 'stat-roll';
      const rollLabel = step.formula.startsWith('R10') ? `R10 = [${result.rolls[0]}]` : `${step.formula} = [${result.rolls.join(', ')}]`;
      div.innerHTML = `
        <span class="stat-name">${displayLabel}</span>
        <span class="dice-result">${rollLabel}${result.bonus ? ` ${result.op || '+'} ${result.bonus}` : ''}</span>
        <span class="stat-value">${total}</span>
      `;
      rollContainer.appendChild(div);
    } else if (step.action === 'choose_one') {
      interactiveSteps.push({ type: 'choose_one', step });
    } else if (step.action === 'choose_abilities') {
      interactiveSteps.push({ type: 'abilities', step });
    } else if (step.action === 'add_item') {
      items.push(step.item);
    } else if (step.action === 'set_resource') {
      // Canonical resource slots first. If the name doesn't match any of
      // them, fall through to check whether it matches a declared stat —
      // this handles books that carry their currency or experience as a
      // first-class stat rather than using the canonical `gold` /
      // `provisions` / `meals` slots (e.g., GrailQuest declares GOLD
      // and EXPERIENCE as stats in rules.stats). Without the fallthrough
      // the value is silently dropped.
      if (step.resource === 'provisions') {
        state.provisions = step.amount;
      } else if (step.resource === 'gold') {
        state.gold = step.amount;
      } else if (step.resource === 'meals') {
        state.meals = step.amount;
      } else {
        const statDefs = gameData.rules?.stats || [];
        const matchingStat = statDefs.find(s => s.name === step.resource);
        if (matchingStat) {
          state.stats[step.resource] = step.amount;
          if (matchingStat.initial_is_max) {
            state.initialStats[step.resource] = step.amount;
          }
        }
      }
    } else if (step.action === 'set_ability_uses') {
      // Initialize per-ability remaining-use counters (e.g., limited-use
      // spell castings, rationed potions, per-adventure talents). Stored
      // in state.abilityUses so later events and conditions can read the
      // remaining count. Schema v1.3.
      if (!state.abilityUses) state.abilityUses = {};
      state.abilityUses[step.ability] = step.uses;
    }
  }

  // Add starting items. Auto-equip any equippable ones so the character
  // starts wearing the Helmet, Chainmail, etc. declared in character_creation.
  for (const item of items) {
    if (!state.inventory.includes(item)) state.inventory.push(item);
    autoEquipOnAdd(item);
  }

  // Process interactive steps sequentially
  processCreationSteps(interactiveSteps, items);
}

function processCreationSteps(steps, items) {
  if (steps.length === 0) {
    showEquipmentAndBegin();
    return;
  }

  const current = steps.shift();
  const rollContainer = document.getElementById('stat-rolls');

  // Schema v1.6+: deferred conditional step. These are character
  // creation steps that carried a `condition` field in the book's
  // data. The pre-pass deferred them here so we can evaluate the
  // condition against state that now includes outputs from earlier
  // interactive steps (ability picks, choose_one results). If the
  // condition evaluates false, skip the step entirely and recurse.
  // If true, execute the step's action inline — the supported
  // actions for conditional deferral are the same as the pre-pass's
  // immediate-action set (roll_stat, add_item, set_resource,
  // set_ability_uses). Conditional choose_one / choose_abilities
  // would be unusual and are not handled here; they fall through to
  // a skip with a log line.
  if (current.type === 'deferred_conditional_step') {
    const step = current.step;
    if (!evaluateCondition(step.condition)) {
      // Condition false — skip entirely and advance to the next step.
      processCreationSteps(steps, items);
      return;
    }
    // Condition true — execute the step's action inline.
    if (step.action === 'roll_stat') {
      const result = rollDice(step.formula);
      state.stats[step.stat] = result.total;
      state.initialStats[step.stat] = result.total;
      const div = document.createElement('div');
      div.className = 'stat-roll';
      const rollLabel = step.formula.startsWith('R10') ? `R10 = [${result.rolls[0]}]` : `${step.formula} = [${result.rolls.join(', ')}]`;
      div.innerHTML = `
        <span class="stat-name">${step.stat}</span>
        <span class="dice-result">${rollLabel}${result.bonus ? ` ${result.op || '+'} ${result.bonus}` : ''}</span>
        <span class="stat-value">${result.total}</span>
      `;
      rollContainer.appendChild(div);
    } else if (step.action === 'roll_resource') {
      const result = rollDice(step.formula);
      const total = result.total;
      const rname = step.resource;
      let displayLabel = rname;
      if (rname === 'gold') { state.gold = total; displayLabel = gameData.rules?.inventory?.currency_display_name || 'Gold'; }
      else if (rname === 'provisions') { state.provisions = total; displayLabel = gameData.rules?.provisions?.display_name || 'Provisions'; }
      else if (rname === 'meals') { state.meals = total; displayLabel = 'Meals'; }
      else {
        const statDefs = gameData.rules?.stats || [];
        const matchingStat = statDefs.find(s => s.name === rname);
        if (matchingStat) {
          state.stats[rname] = total;
          if (matchingStat.initial_is_max) state.initialStats[rname] = total;
        } else {
          console.warn(`deferred roll_resource: unknown resource "${rname}" (value ${total} discarded)`);
        }
      }
      const div = document.createElement('div');
      div.className = 'stat-roll';
      const rollLabel = step.formula.startsWith('R10') ? `R10 = [${result.rolls[0]}]` : `${step.formula} = [${result.rolls.join(', ')}]`;
      div.innerHTML = `
        <span class="stat-name">${displayLabel}</span>
        <span class="dice-result">${rollLabel}${result.bonus ? ` ${result.op || '+'} ${result.bonus}` : ''}</span>
        <span class="stat-value">${total}</span>
      `;
      rollContainer.appendChild(div);
    } else if (step.action === 'add_item') {
      if (!state.inventory.includes(step.item)) state.inventory.push(step.item);
      autoEquipOnAdd(step.item);
      items.push(step.item);
    } else if (step.action === 'set_resource') {
      if (step.resource === 'provisions') state.provisions = step.amount;
      else if (step.resource === 'gold') state.gold = step.amount;
      else if (step.resource === 'meals') state.meals = step.amount;
      else {
        const statDefs = gameData.rules?.stats || [];
        const matchingStat = statDefs.find(s => s.name === step.resource);
        if (matchingStat) {
          state.stats[step.resource] = step.amount;
          if (matchingStat.initial_is_max) state.initialStats[step.resource] = step.amount;
        }
      }
    } else if (step.action === 'set_ability_uses') {
      if (!state.abilityUses) state.abilityUses = {};
      state.abilityUses[step.ability] = step.uses;
    } else {
      // Unsupported action for conditional deferral — log and advance.
      console.warn('Conditional char-creation step with unsupported action:', step.action);
    }
    processCreationSteps(steps, items);
    return;
  }

  if (current.type === 'choose_one') {
    const choiceStep = current.step;
    const category = choiceStep.category || 'choice';
    const options = choiceStep.options || [];

    // Check if this is a potion choice (special handling for potion mechanics)
    const isPotion = category === 'potion';
    const potionDefs = isPotion ? (gameData.rules.potion?.choose_one_of || []) : [];

    const section = document.getElementById('potion-section');
    section.style.display = '';
    // Repurpose the potion section UI for any choose_one
    section.querySelector('h3').textContent = isPotion ? 'Choose Your Potion' : `Choose: ${category.charAt(0).toUpperCase() + category.slice(1)}`;
    section.querySelector('p').textContent = isPotion
      ? `You may take one potion with you on your adventure (${gameData.rules.potion?.doses || 2} doses).`
      : `Select one option.`;
    const container = document.getElementById('potion-choices');
    container.innerHTML = '';

    for (const opt of options) {
      const def = potionDefs.find(p => p.name === opt);
      const btn = document.createElement('button');
      btn.className = 'potion-btn';
      btn.textContent = opt + (def?.detail ? ` — ${def.detail}` : def ? ` — Restores ${def.stat} to initial value` : '');
      btn.addEventListener('click', () => {
        container.querySelectorAll('.potion-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');

        if (isPotion) {
          if (state.potion) {
            const prevId = state.potion.toLowerCase().replace(/ /g, '_');
            const idx = state.inventory.indexOf(prevId);
            if (idx >= 0) state.inventory.splice(idx, 1);
            autoUnequipOnRemove(prevId);
          }
          state.potion = opt;
          state.potionDoses = gameData.rules.potion?.doses || 2;
          const newPotionId = opt.toLowerCase().replace(/ /g, '_');
          state.inventory.push(newPotionId);
          autoEquipOnAdd(newPotionId);
        } else {
          // Generic choose_one: set a flag for the choice
          const flagName = category + '_' + opt.toLowerCase().replace(/ /g, '_');
          state.flags.add(flagName);
        }
        processCreationSteps(steps, items);
      });
      container.appendChild(btn);
    }
  } else if (current.type === 'abilities') {
    const abStep = current.step;
    const abRules = gameData.rules.abilities || {};
    const available = abRules.available || [];
    const count = abStep.count || abRules.choose_count || 5;
    const selected = new Set();

    const section = document.createElement('div');
    section.className = 'mt-2';
    section.id = 'abilities-section';
    rollContainer.parentNode.insertBefore(section, document.getElementById('equipment-section'));

    function renderAbilities() {
      let html = `<h3>Choose ${count} Disciplines</h3>`;
      html += `<div class="choose-items-count">Selected: ${selected.size} / ${count}</div>`;
      html += `<div class="choose-items-grid">`;
      for (const ab of available) {
        const isSel = selected.has(ab.name);
        html += `<div class="choose-item-btn ${isSel ? 'selected' : ''}" data-ability="${ab.name}">
          <strong>${ab.name}</strong>
          <div class="item-desc">${ab.description || ''}${ab.mechanical_effect ? ' (' + ab.mechanical_effect + ')' : ''}</div>
        </div>`;
      }
      html += `</div>`;
      if (selected.size === count) {
        html += `<div class="center mt-1"><button class="btn" id="confirm-abilities-btn">Confirm Disciplines</button></div>`;
      }
      section.innerHTML = html;

      section.querySelectorAll('.choose-item-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const name = btn.dataset.ability;
          if (selected.has(name)) {
            selected.delete(name);
          } else if (selected.size < count) {
            selected.add(name);
          }
          renderAbilities();
        });
      });
      const confirmBtn = section.querySelector('#confirm-abilities-btn');
      if (confirmBtn) {
        confirmBtn.addEventListener('click', () => {
          state.abilities = [...selected];
          for (const name of selected) {
            state.flags.add('ability_' + name.toLowerCase().replace(/ /g, '_'));
          }

          // Check if any selected abilities require a roll
          const rollAbilities = available.filter(ab => selected.has(ab.name) && ab.requires_roll);
          if (rollAbilities.length > 0) {
            processAbilityRolls(section, rollAbilities, 0, steps, items);
          } else {
            section.innerHTML = `<div class="event-msg gain">Disciplines: ${[...selected].join(', ')}</div>`;
            processCreationSteps(steps, items);
          }
        });
      }
    }
    renderAbilities();
  }
}

function processAbilityRolls(section, rollAbilities, idx, steps, items) {
  if (idx >= rollAbilities.length) {
    section.innerHTML = `<div class="event-msg gain">Disciplines: ${state.abilities.join(', ')}</div>`;
    processCreationSteps(steps, items);
    return;
  }

  const ab = rollAbilities[idx];
  const roll = ab.requires_roll;
  section.innerHTML = `
    <div class="test-area">
      <h3>${ab.name}</h3>
      <p>${roll.prompt || 'Roll to determine your result'}</p>
      <div class="mt-2">
        <button class="btn" id="ability-roll-btn">Roll</button>
      </div>
    </div>
  `;

  section.querySelector('#ability-roll-btn').addEventListener('click', () => {
    const result = rollDice(roll.formula || 'R10');
    const resultLabel = roll.results?.[String(result.total)] || String(result.total);

    // Store the result as a flag
    const flagName = ab.name.toLowerCase().replace(/ /g, '_') + '_' + resultLabel.toLowerCase().replace(/ /g, '_');
    state.flags.add(flagName);

    section.innerHTML = `
      <div class="test-area">
        <h3>${ab.name}</h3>
        <div class="dice-display">[${result.rolls[0]}]</div>
        <p><strong>${resultLabel}</strong></p>
      </div>
    `;

    setTimeout(() => processAbilityRolls(section, rollAbilities, idx + 1, steps, items), 1500);
  });
}

function showEquipmentAndBegin() {
  const section = document.getElementById('equipment-section');
  section.style.display = '';
  const list = document.getElementById('equipment-list');
  list.innerHTML = '';
  for (const item of state.inventory) {
    const li = document.createElement('li');
    li.textContent = getItemName(item);
    list.appendChild(li);
  }
  // Codex v2.9 / schema v1.6: provisions are the canonical slot, with
  // rules.provisions.display_name providing the book-specific label
  // ("Meals" for LW, "Rations" elsewhere). Read state.provisions only;
  // legacy state.meals is intentionally not rendered here because
  // every correct encoding routes to state.provisions. See Rule 21 in
  // gamebook_codex_v2.md and the known_issues.md entry on LW1's three
  // disjoint provisions slots for the motivation.
  if (state.provisions > 0) {
    const li = document.createElement('li');
    const provLabel = gameData.rules?.provisions?.display_name || 'Provisions';
    li.textContent = `${provLabel} (${state.provisions})`;
    list.appendChild(li);
  }
  if (state.gold > 0) {
    const li = document.createElement('li');
    const gLabel = gameData.rules?.inventory?.currency_display_name || 'Gold';
    li.textContent = `${gLabel} (${state.gold})`;
    list.appendChild(li);
  }
  if (state.abilities.length > 0) {
    const li = document.createElement('li');
    li.textContent = `Disciplines: ${state.abilities.join(', ')}`;
    list.appendChild(li);
  }
  document.getElementById('begin-btn').style.display = '';
}

// ==================== BEGIN ADVENTURE ====================
function beginAdventure() {
  showScreen('game-screen');
  updateReferenceButton();
  navigateTo('1');
}

// Show or hide the Reference button in the game-screen save bar based on
// whether the loaded book has any frontmatter pages flagged as
// accessible-during-play. Books with no frontmatter, or with all pages opted
// out via accessible_during_play: false, get no Reference button (rather than
// a button that opens an empty panel). Called from beginAdventure and from
// loadGame so the button is correct on both new games and restored saves.
function updateReferenceButton() {
  const btn = document.getElementById('reference-btn');
  if (!btn) return;
  const refPages = inGameFrontmatterPages();
  btn.style.display = refPages.length > 0 ? '' : 'none';
}

// ==================== STAT BAR ====================
function updateStatBar() {
  const bar = document.getElementById('stat-bar');
  const statDefs = gameData.rules.stats || [];

  let html = '';
  // Render every declared stat. This covers both profiled series (LW
  // COMBAT SKILL / ENDURANCE, FF SKILL / STAMINA / LUCK) and unprofiled
  // series that may declare additional stats like EXPERIENCE, HONOUR,
  // MAGIC, LIFE POINTS, or their own currency-as-a-stat.
  for (const sd of statDefs) {
    const val = state.stats[sd.name] || 0;
    const initial = state.initialStats[sd.name] || val;
    html += `<div class="stat-item ${sd.name}">
      <span class="stat-label">${sd.name}</span>
      <span class="stat-val">${val}/${initial}</span>
    </div>`;
  }

  // Render the canonical provisions row if provisions are enabled for
  // this book. Books that set provisions.enabled: false (GrailQuest,
  // some other series) don't get this row — avoiding a perpetually
  // zero-valued Provisions label in the stat bar.
  const provRules = gameData.rules?.provisions;
  if (provRules?.enabled) {
    const provLabel = provRules.display_name || 'Provisions';
    html += `<div class="stat-item provisions">
      <span class="stat-label">${provLabel}</span>
      <span class="stat-val">${state.provisions}</span>
    </div>`;
  }

  // Render the canonical gold row only when there is no declared stat
  // that's already carrying the book's currency. Books that treat
  // currency as a first-class stat (GrailQuest declares GOLD in
  // rules.stats[]) have it shown by the loop above and should not get
  // a duplicate canonical row. Books that use the canonical state.gold
  // slot (LW, Warlock) will match neither of the currency-name regex
  // checks in their rules.stats[] and get the canonical row as before.
  const currencyRegex = /^(gold|coin|crown|piece|credit|cap|doubloon|money|silver|bit)s?$/i;
  const hasCurrencyStat = statDefs.some(sd =>
    typeof sd.name === 'string' && currencyRegex.test(sd.name.trim())
  );
  if (!hasCurrencyStat) {
    const goldLabel = gameData.rules?.inventory?.currency_display_name || 'Gold';
    html += `<div class="stat-item gold">
      <span class="stat-label">${goldLabel}</span>
      <span class="stat-val">${state.gold}</span>
    </div>`;
  }

  if (state.potion && state.potionDoses > 0) {
    html += `<div class="stat-bar-actions">
      <span class="potion-info" onclick="usePotion()" title="Click to drink">${state.potion} (${state.potionDoses})</span>
    </div>`;
  }

  bar.innerHTML = html;
}

function updateInventory() {
  const list = document.getElementById('inventory-list');
  list.innerHTML = '';
  // Hide potion from inventory list — it's shown in the stat bar
  const potionId = state.potion ? state.potion.toLowerCase().replace(/ /g, '_') : null;
  const displayItems = state.inventory.filter(i => i !== potionId);
  if (displayItems.length === 0) {
    list.innerHTML = '<li class="empty">Empty</li>';
    renderEquipmentPanel();
    return;
  }
  const catalog = gameData?.items_catalog || {};
  for (const item of displayItems) {
    const li = document.createElement('li');
    const def = catalog[item];
    const equipped = isItemEquipped(item);
    const label = document.createElement('span');
    label.textContent = getItemName(item) + (equipped ? ' (equipped)' : '');
    li.appendChild(label);
    // Add equip/unequip button for equippable items.
    if (def && def.equippable) {
      const btn = document.createElement('button');
      btn.className = 'btn btn-sm equip-btn';
      if (equipped) {
        const chk = canUnequipItem(item);
        btn.textContent = 'Unequip';
        btn.disabled = !chk.ok;
        btn.title = chk.reason || '';
        btn.addEventListener('click', () => playerUnequipItem(item));
      } else {
        const chk = canEquipItem(item, false);
        btn.textContent = 'Equip';
        btn.disabled = !chk.ok;
        btn.title = chk.reason || '';
        btn.addEventListener('click', () => playerEquipItem(item));
      }
      li.appendChild(btn);
    }
    list.appendChild(li);
  }
  renderEquipmentPanel();
}

// Render the Equipment slot panel in the sidebar. Shows each slot that
// has an occupant, with an Unequip button if the item allows it.
function renderEquipmentPanel() {
  const panel = document.getElementById('equipment-panel');
  if (!panel) return;
  const eq = state.equipment || {};
  const slots = Object.keys(eq).filter(k => eq[k]);
  if (slots.length === 0) {
    panel.innerHTML = '<div class="empty">Nothing equipped</div>';
    return;
  }
  const lines = slots.map(slot => {
    const itemId = eq[slot];
    const name = getItemName(itemId);
    return `<div class="equip-row"><span class="slot-name">${slot}:</span> <span class="slot-item">${name}</span></div>`;
  });
  panel.innerHTML = lines.join('');
}

// Convenience wrapper: stat bar + inventory + equipment.
function updateStatDisplay() {
  updateStatBar();
  updateInventory();
  renderEquipmentPanel();
}

function toggleInventory() {
  const panel = document.getElementById('inventory-panel');
  panel.classList.toggle('open');
  document.getElementById('inv-arrow').textContent = panel.classList.contains('open') ? '\u25BC' : '\u25B6';
}

// ==================== POTION USE ====================
function usePotion() {
  if (!state.potion || state.potionDoses <= 0) return;
  const potionDefs = gameData.rules.potion?.choose_one_of || [];
  const def = potionDefs.find(p => p.name === state.potion);
  if (!def) return;

  state.potionDoses--;

  if (def.effect === 'restore_to_initial') {
    state.stats[def.stat] = state.initialStats[def.stat];
  } else if (def.effect === 'restore_to_initial_plus_one') {
    state.initialStats[def.stat] = (state.initialStats[def.stat] || 0) + 1;
    state.stats[def.stat] = state.initialStats[def.stat];
  }

  if (state.potionDoses <= 0) {
    const idx = state.inventory.indexOf(state.potion.toLowerCase().replace(/ /g, '_'));
    if (idx >= 0) state.inventory.splice(idx, 1);
  }

  updateStatBar();
  updateInventory();
}

// ==================== NAVIGATION ====================
function navigateTo(sectionId) {
  const sid = String(sectionId);
  const section = gameData.sections[sid];
  if (!section) {
    document.getElementById('game-content').innerHTML = `<p style="color:var(--danger)">Section ${sid} not found!</p>`;
    return;
  }

  // Capture the caller before updating currentSection. previousSection
  // is the section we're LEAVING as this call runs; it will become the
  // "caller" that's pushed onto the return stack if the destination is
  // a subroutine entry (codex 7.6.8).
  const callerId = state.currentSection;
  state.previousSection = callerId;
  state.currentSection = sid;
  state.visitedSections.add(sid);

  // Codex 7.6.8 subroutine-entry handling. If the destination section
  // is marked is_subroutine_entry: true, push the caller onto the
  // return stack so a later return_to_caller event can pop it. Guard
  // against pushing null — a missing caller just means the player got
  // here via an unusual path (debug jump, fresh save resume) and the
  // return_to_caller handler will fall back to a prompt.
  if (section.is_subroutine_entry && callerId != null) {
    if (!Array.isArray(state.returnStack)) state.returnStack = [];
    state.returnStack.push(callerId);
  }

  // Check for ending — ending sections always pause for the player
  // via showEnding's own Play Again button.
  if (section.is_ending) {
    showEnding(section);
    return;
  }

  updateStatBar();
  updateInventory();
  updateDebug();

  const content = document.getElementById('game-content');
  content.innerHTML = '';

  // Render the section header and text BEFORE checking for death. If
  // the player arrives here already at 0 health (e.g. they walked into
  // this section via a choice after a prior event dropped them), we
  // still want them to see the section's text and then click through
  // to the ending screen rather than having the screen snap away from
  // the previous section directly to the death screen.
  const _header = document.createElement('div');
  _header.className = 'section-header';
  _header.textContent = `\u2014 ${sid} \u2014`;
  content.appendChild(_header);
  const _textDiv = document.createElement('div');
  _textDiv.className = 'section-text';
  _textDiv.innerHTML = formatText(section.text);
  content.appendChild(_textDiv);

  const { healthStat: _hs } = getCombatStats();
  if (_hs && state.stats[_hs] !== undefined && state.stats[_hs] <= 0) {
    renderContinueToEnding(
      { text: `Your ${_hs} has reached zero. Your adventure is over.`, ending_type: 'death', events: [], choices: [] },
      `${_hs.toUpperCase()} has reached zero — your adventure is over.`
    );
    return;
  }

  // Process events (section header and text were already rendered above)
  processEvents(section.events || [], section.choices || []);
}

function formatText(text) {
  if (!text) return '';
  return text.split('\n\n').map(p => `<p>${p}</p>`).join('');
}

// ==================== EVENT PROCESSING ====================
let pendingEvents = [];
let pendingChoices = [];

function processEvents(events, choices) {
  pendingEvents = [...events];
  pendingChoices = choices;
  processNextEvent();
}

function processNextEvent() {
  if (pendingEvents.length === 0) {
    // All events processed, show choices
    showChoices(pendingChoices);
    return;
  }

  const event = pendingEvents.shift();
  const content = document.getElementById('game-content');

  // Event-level condition gate (schema v1.2+). If the event carries a
  // `condition` field and it evaluates to false at dispatch time, skip
  // the event entirely: no state mutation, no pause, no UI. This is the
  // primary mechanism for discipline- and item-driven exemptions from
  // rule-mandated mechanics (e.g. Lone Wolf's Hunting discipline
  // exempting the player from eat_meal requirements). Absent or null
  // `condition` means the event always fires, so pre-v1.2 books remain
  // valid.
  if (event.condition && !evaluateCondition(event.condition)) {
    processNextEvent();
    return;
  }

  switch (event.type) {
    case 'modify_stat':
      handleModifyStat(event);
      processNextEvent();
      break;
    case 'add_item':
      handleAddItem(event);
      processNextEvent();
      break;
    case 'remove_item':
      handleRemoveItem(event);
      processNextEvent();
      break;
    case 'remove_inventory_category':
      handleRemoveInventoryCategory(event);
      processNextEvent();
      break;
    case 'set_flag':
      handleSetFlag(event);
      processNextEvent();
      break;
    case 'combat':
      handleCombat(event);
      break;
    case 'stat_test':
      handleStatTest(event);
      break;
    case 'roll_dice':
      handleRollDice(event);
      break;
    case 'eat_meal':
      handleEatMeal(event);
      break;
    case 'input_number':
