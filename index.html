<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Emulator</title>
<style>
:root {
  --bg: #1a1510;
  --bg-card: #2a2318;
  --bg-card-hover: #342c20;
  --text: #d4c5a9;
  --text-dim: #8a7e6a;
  --text-bright: #f0e6cc;
  --accent: #c4964a;
  --accent-dim: #8a6a30;
  --danger: #a83232;
  --danger-bg: #3a1515;
  --success: #3a8a3a;
  --success-bg: #152a15;
  --border: #3a3228;
  --border-light: #4a4238;
  --stat-skill: #5a9adb;
  --stat-stamina: #d45a5a;
  --stat-luck: #c4964a;
  --stat-provisions: #6aaa6a;
  --stat-gold: #d4b44a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Georgia', 'Times New Roman', serif;
  line-height: 1.7;
  min-height: 100vh;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px;
}

h1, h2, h3 {
  color: var(--text-bright);
  font-weight: normal;
}

h1 { font-size: 2em; margin-bottom: 0.5em; text-align: center; }
h2 { font-size: 1.4em; margin-bottom: 0.5em; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
h3 { font-size: 1.1em; margin-bottom: 0.4em; }

.screen { display: none; }
.screen.active { display: block; }

/* --- Load Screen --- */
#load-screen { text-align: center; padding-top: 15vh; }
#load-screen h1 { font-size: 2.5em; color: var(--accent); margin-bottom: 0.2em; }
#load-screen .subtitle { color: var(--text-dim); margin-bottom: 2em; font-style: italic; }

.file-picker-area {
  border: 2px dashed var(--border-light);
  border-radius: 12px;
  padding: 40px;
  margin: 20px auto;
  max-width: 400px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.file-picker-area:hover { border-color: var(--accent); }
.file-picker-area input { display: none; }
.file-picker-area p { color: var(--text-dim); }

/* --- Character Creation --- */
.stat-roll {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 16px; margin-bottom: 10px;
}
.stat-roll .stat-name {
  font-weight: bold; min-width: 100px; text-transform: uppercase;
  font-size: 0.85em; letter-spacing: 1px;
}
.stat-roll .dice-result { color: var(--text-dim); font-size: 0.9em; }
.stat-roll .stat-value { color: var(--accent); font-size: 1.3em; font-weight: bold; margin-left: auto; }

.potion-choices { display: flex; flex-direction: column; gap: 8px; margin: 12px 0; }
.potion-btn {
  background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
  padding: 12px 16px; border-radius: 8px; cursor: pointer; text-align: left;
  font-family: inherit; font-size: 0.95em; transition: all 0.15s;
}
.potion-btn:hover { border-color: var(--accent); background: var(--bg-card-hover); }
.potion-btn.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--text-bright); }

.equipment-list {
  list-style: none; padding: 0; margin: 12px 0;
  display: flex; flex-wrap: wrap; gap: 8px;
}
.equipment-list li {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 12px; font-size: 0.9em;
}

.btn {
  display: inline-block; background: var(--accent-dim); color: var(--text-bright);
  border: 1px solid var(--accent); border-radius: 8px;
  padding: 10px 24px; cursor: pointer; font-family: inherit;
  font-size: 1em; transition: all 0.15s; text-align: center;
}
.btn:hover { background: var(--accent); color: var(--bg); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn:disabled:hover { background: var(--accent-dim); color: var(--text-bright); }
.btn-large { padding: 14px 36px; font-size: 1.1em; }
.btn-danger { background: var(--danger); border-color: var(--danger); }
.btn-danger:hover { background: #c44; }
.btn-small { padding: 6px 14px; font-size: 0.85em; }
.btn-success { background: var(--success); border-color: var(--success); }
.btn-success:hover { background: #4a4; }

.center { text-align: center; }
.mt-1 { margin-top: 10px; }
.mt-2 { margin-top: 20px; }
.mt-3 { margin-top: 30px; }
.mb-1 { margin-bottom: 10px; }

/* --- Stat Bar --- */
.stat-bar {
  display: flex; flex-wrap: wrap; gap: 6px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; margin-bottom: 16px;
  position: sticky; top: 0; z-index: 10;
}
.stat-item {
  display: flex; align-items: center; gap: 4px;
  font-size: 0.85em; padding: 2px 8px;
  border-radius: 4px; background: rgba(0,0,0,0.2);
}
.stat-item .stat-label {
  text-transform: uppercase; font-size: 0.75em; letter-spacing: 1px;
  color: var(--text-dim);
}
.stat-item .stat-val { font-weight: bold; font-size: 1.1em; }
.stat-item.skill .stat-val { color: var(--stat-skill); }
.stat-item.stamina .stat-val { color: var(--stat-stamina); }
.stat-item.luck .stat-val { color: var(--stat-luck); }
.stat-item.provisions .stat-val { color: var(--stat-provisions); }
.stat-item.gold .stat-val { color: var(--stat-gold); }

.stat-bar-actions {
  margin-left: auto; display: flex; gap: 6px; align-items: center;
}

/* --- Inventory Panel --- */
.inventory-toggle {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; margin-bottom: 16px; overflow: hidden;
}
.inventory-header {
  padding: 10px 14px; cursor: pointer; display: flex;
  align-items: center; justify-content: space-between;
  font-size: 0.9em; color: var(--text-dim);
}
.inventory-header:hover { background: var(--bg-card-hover); }
.inventory-body {
  padding: 0 14px 12px; display: none;
}
.inventory-toggle.open .inventory-body { display: block; }
.inventory-items {
  list-style: none; display: flex; flex-wrap: wrap; gap: 6px;
}
.inventory-items li {
  background: rgba(0,0,0,0.2); border: 1px solid var(--border);
  border-radius: 4px; padding: 3px 10px; font-size: 0.85em;
}
.inventory-items .empty { color: var(--text-dim); font-style: italic; }

/* --- Section Text --- */
.section-header {
  color: var(--accent); font-size: 1em; margin-bottom: 10px;
  font-weight: bold; letter-spacing: 1px; text-transform: uppercase;
}
.section-text {
  margin-bottom: 20px; white-space: pre-wrap;
  font-size: 1.05em;
}
.section-text p { margin-bottom: 0.8em; }

/* --- Choices --- */
.choices { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
.choice-btn {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 16px; cursor: pointer;
  color: var(--text); font-family: inherit; font-size: 0.95em;
  text-align: left; transition: all 0.15s; position: relative;
}
.choice-btn:hover { border-color: var(--accent); background: var(--bg-card-hover); }
.choice-btn.disabled {
  opacity: 0.4; cursor: not-allowed;
  border-style: dashed;
}
.choice-btn.disabled:hover { border-color: var(--border); background: var(--bg-card); }
.choice-btn .condition-tooltip {
  display: none; position: absolute; bottom: 100%; left: 10px;
  background: #111; border: 1px solid var(--border-light); color: var(--text-dim);
  padding: 6px 10px; border-radius: 6px; font-size: 0.8em;
  white-space: nowrap; margin-bottom: 6px; z-index: 20;
}
.choice-btn.disabled:hover .condition-tooltip { display: block; }

/* --- Combat --- */
.combat-area {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; margin-bottom: 16px;
}
.combat-header { text-align: center; margin-bottom: 12px; }
.combat-header h3 { color: var(--danger); font-size: 1.2em; }

.combatants {
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; margin-bottom: 16px;
}
.combatant {
  flex: 1; text-align: center; padding: 10px;
  border-radius: 8px; background: rgba(0,0,0,0.2);
}
.combatant .name { font-weight: bold; margin-bottom: 4px; }
.combatant .hp-bar {
  height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin: 6px 0;
}
.combatant .hp-fill {
  height: 100%; border-radius: 4px; transition: width 0.3s;
}
.combatant.player .hp-fill { background: var(--stat-stamina); }
.combatant.enemy .hp-fill { background: var(--danger); }
.combatant .stats-line { font-size: 0.85em; color: var(--text-dim); }

.combat-log {
  max-height: 200px; overflow-y: auto; margin-bottom: 12px;
  font-size: 0.9em; border: 1px solid var(--border); border-radius: 6px;
  padding: 8px; background: rgba(0,0,0,0.2);
}
.combat-log .round { margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.combat-log .round:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.combat-log .hit { color: var(--danger); }
.combat-log .miss { color: var(--text-dim); }
.combat-log .lucky { color: var(--stat-luck); }

.combat-actions { text-align: center; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

.special-rules-box {
  background: rgba(196, 150, 74, 0.1); border: 1px solid var(--accent-dim);
  border-radius: 6px; padding: 10px 14px; margin-bottom: 12px;
  font-size: 0.85em; color: var(--accent);
}
.special-rules-box strong { color: var(--text-bright); }

/* --- Stat Test / Dice Roll --- */
.test-area, .dice-roll-area {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; margin-bottom: 16px; text-align: center;
}
.dice-display {
  font-size: 2em; color: var(--accent); margin: 12px 0;
  font-weight: bold;
}
.test-result { margin: 12px 0; font-size: 1.1em; }
.test-result.success { color: var(--success); }
.test-result.failure { color: var(--danger); }

/* --- Input --- */
.input-area {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; margin-bottom: 16px;
}
.input-area input[type="text"], .input-area input[type="number"] {
  background: rgba(0,0,0,0.3); border: 1px solid var(--border-light);
  color: var(--text-bright); padding: 10px 14px; border-radius: 6px;
  font-family: inherit; font-size: 1em; width: 200px; text-align: center;
}
.input-area input:focus { outline: none; border-color: var(--accent); }

/* --- Ending --- */
.ending-death {
  border: 2px solid var(--danger); background: var(--danger-bg);
  border-radius: 12px; padding: 24px; text-align: center;
}
.ending-victory {
  border: 2px solid var(--stat-gold); background: rgba(60, 50, 20, 0.5);
  border-radius: 12px; padding: 24px; text-align: center;
}
.ending-death h2 { color: var(--danger); }
.ending-victory h2 { color: var(--stat-gold); }

/* --- Event Log --- */
.event-msg {
  background: rgba(0,0,0,0.2); border-left: 3px solid var(--accent);
  padding: 8px 12px; margin-bottom: 8px; font-size: 0.9em;
  border-radius: 0 6px 6px 0;
}
.event-msg.gain { border-left-color: var(--success); }
.event-msg.loss { border-left-color: var(--danger); }
.event-msg.info { border-left-color: var(--stat-skill); }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

/* Potion use button in stat bar */
.potion-info {
  font-size: 0.8em; color: var(--text-dim);
  background: rgba(0,0,0,0.2); border-radius: 4px;
  padding: 2px 8px; cursor: pointer;
}
.potion-info:hover { color: var(--accent); }

/* Eat meal area */
.eat-meal-area {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; margin-bottom: 16px; text-align: center;
}

/* --- Frontmatter --- */
.frontmatter-page { margin-bottom: 20px; }
.frontmatter-page h3 {
  color: var(--accent); margin-bottom: 12px;
  border-bottom: 1px solid var(--border); padding-bottom: 6px;
}
.frontmatter-page .fm-text {
  font-size: 1.05em; line-height: 1.8; white-space: pre-wrap;
}
.frontmatter-page .fm-text p { margin-bottom: 0.8em; }
.fm-type-tag {
  display: inline-block; font-size: 0.7em; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-dim); background: rgba(0,0,0,0.2);
  padding: 2px 8px; border-radius: 3px; margin-bottom: 8px;
}
.fm-page-indicator {
  text-align: center; color: var(--text-dim); font-size: 0.85em;
  margin-bottom: 12px;
}

/* --- Choose Items --- */
.choose-items-area {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; margin-bottom: 16px;
}
.choose-items-grid {
  display: flex; flex-direction: column; gap: 6px; margin: 12px 0;
}
.choose-item-btn {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 14px; cursor: pointer;
  color: var(--text); font-family: inherit; font-size: 0.9em;
  text-align: left; transition: all 0.15s;
}
.choose-item-btn:hover { border-color: var(--accent); background: var(--bg-card-hover); }
.choose-item-btn.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--text-bright); }
.choose-item-btn .item-desc { font-size: 0.8em; color: var(--text-dim); margin-top: 2px; }
.choose-items-count { font-size: 0.85em; color: var(--text-dim); margin-bottom: 8px; }

/* --- Debug Panel --- */
.debug-toggle {
  position: fixed; bottom: 10px; right: 10px; z-index: 100;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-dim); font-size: 0.75em; padding: 4px 8px;
  border-radius: 4px; cursor: pointer; font-family: monospace;
}
.debug-toggle:hover { color: var(--accent); border-color: var(--accent); }
.debug-panel {
  display: none; position: fixed; bottom: 36px; right: 10px; z-index: 100;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px; font-family: monospace;
  font-size: 0.75em; max-width: 320px; max-height: 50vh;
  overflow-y: auto; color: var(--text-dim);
}
.debug-panel.open { display: block; }
.debug-panel div { margin-bottom: 4px; }
.debug-panel .debug-label { color: var(--accent); }

/* --- Save/Load Bar --- */
.save-bar {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-bottom: 12px;
}
.save-bar button {
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-dim); font-family: monospace; font-size: 0.75em;
  padding: 4px 10px; border-radius: 4px; cursor: pointer;
}
.save-bar button:hover { color: var(--accent); border-color: var(--accent); }
.save-bar .save-status {
  font-size: 0.75em; color: var(--text-dim); align-self: center;
  font-family: monospace; opacity: 0; transition: opacity 0.3s;
}
.save-bar .save-status.show { opacity: 1; }

.continue-btn-area {
  margin-top: 16px;
}
.continue-btn-area button {
  background: none; border: 1px solid var(--border);
  color: var(--text-dim); padding: 10px 20px; border-radius: 8px;
  cursor: pointer; font-family: inherit; font-size: 0.9em;
}
.continue-btn-area button:hover { border-color: var(--accent); color: var(--text); }
.continue-btn-area .save-info {
  font-size: 0.8em; color: var(--text-dim); margin-top: 6px;
}
</style>
</head>
<body>
<div class="container">

  <!-- LOAD SCREEN -->
  <div id="load-screen" class="screen active">
    <h1>Codex Emulator</h1>
    <p class="subtitle">A universal gamebook engine &mdash; <a href="https://github.com/robesris/codex-gamebook-engine" style="color:var(--accent);">GitHub</a></p>
    <div class="file-picker-area" id="file-picker">
      <p>Click to load a game data file (.json)</p>
      <input type="file" id="file-input" accept=".json">
    </div>
    <p id="load-error" style="color: var(--danger); margin-top: 12px;"></p>
    <div id="continue-area" class="continue-btn-area" style="display:none;"></div>
    <div class="mt-2 center">
      <label style="font-size:0.85em;color:var(--text-dim);cursor:pointer;">
        Import save file (.json)
        <input type="file" id="import-input" accept=".json" style="display:none;">
      </label>
    </div>
  </div>

  <!-- FRONTMATTER -->
  <div id="frontmatter-screen" class="screen">
    <h1 id="frontmatter-title"></h1>
    <div id="frontmatter-content"></div>
    <div class="center mt-3">
      <button id="frontmatter-next-btn" class="btn btn-large" onclick="nextFrontmatterPage()">Continue</button>
    </div>
  </div>

  <!-- CHARACTER CREATION -->
  <div id="creation-screen" class="screen">
    <h1 id="game-title"></h1>
    <h2>Character Creation</h2>
    <div id="stat-rolls"></div>
    <div id="potion-section" class="mt-2" style="display:none;">
      <h3>Choose Your Potion</h3>
      <p style="font-size:0.9em; color:var(--text-dim); margin-bottom:8px;">You may take one potion with you on your adventure (2 doses).</p>
      <div id="potion-choices" class="potion-choices"></div>
    </div>
    <div id="equipment-section" class="mt-2" style="display:none;">
      <h3>Starting Equipment</h3>
      <ul id="equipment-list" class="equipment-list"></ul>
    </div>
    <div class="center mt-3">
      <button id="begin-btn" class="btn btn-large" style="display:none;" onclick="beginAdventure()">Begin Adventure</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <div class="stat-bar" id="stat-bar"></div>
    <div class="save-bar">
      <button onclick="saveGame()">Save</button>
      <button onclick="loadSavedGame()">Load</button>
      <button onclick="exportState()">Export</button>
      <button onclick="document.getElementById('import-game-input').click()">Import</button>
      <input type="file" id="import-game-input" accept=".json" style="display:none;">
      <span class="save-status" id="save-status"></span>
    </div>
    <div class="inventory-toggle" id="inventory-panel">
      <div class="inventory-header" onclick="toggleInventory()">
        <span>Inventory</span>
        <span id="inv-arrow">&#9654;</span>
      </div>
      <div class="inventory-body">
        <ul class="inventory-items" id="inventory-list"></ul>
      </div>
    </div>
    <div id="game-content"></div>
  </div>

  <!-- ENDING SCREEN -->
  <div id="ending-screen" class="screen"></div>

</div>

<!-- Debug Panel -->
<div class="debug-toggle" onclick="toggleDebug()">DEBUG</div>
<div class="debug-panel" id="debug-panel"></div>

<script src="fengari-web.js"></script>
<script>
// ==================== GAME STATE ====================
let gameData = null;
let state = {
  stats: {},
  initialStats: {},
  inventory: [],
  flags: new Set(),
  provisions: 0,
  gold: 0,
  potion: null,
  potionDoses: 0,
  currentSection: null,
  visitedSections: new Set(),
};

// ==================== UTILITY ====================
function rollDice(formula) {
  // Handle R10 (Lone Wolf random number table: 0-9)
  const r10 = formula.match(/^R10(?:\+(\d+))?$/);
  if (r10) {
    const bonus = r10[1] ? parseInt(r10[1]) : 0;
    const roll = Math.floor(Math.random() * 10); // 0-9
    return { total: roll + bonus, rolls: [roll], bonus };
  }
  // Parse "NdX+Y", "NdX*Y", "NdX-Y", or "NdX"
  const m = formula.match(/(\d+)d(\d+)(?:([+\-*])(\d+))?/);
  if (!m) return { total: 0, rolls: [], bonus: 0 };
  const count = parseInt(m[1]);
  const sides = parseInt(m[2]);
  const op = m[3] || '+';
  const modifier = m[4] ? parseInt(m[4]) : 0;
  const rolls = [];
  for (let i = 0; i < count; i++) {
    rolls.push(Math.floor(Math.random() * sides) + 1);
  }
  const sum = rolls.reduce((a, b) => a + b, 0);
  const total = op === '*' ? sum * modifier :
                op === '-' ? sum - modifier :
                sum + modifier;
  return { total, rolls, bonus: modifier, op };
}

function roll2d6() {
  const r = rollDice('2d6');
  return r;
}

function getEnemy(ref) {
  return gameData.enemies_catalog[ref] || null;
}

// Resolve combat stat names from the game data's rules.attack_stat and rules.health_stat
function getCombatStats() {
  const rules = gameData.rules || {};
  return {
    attackStat: rules.attack_stat || null,
    healthStat: rules.health_stat || null,
  };
}

// Get the player's current attack stat value
function getPlayerAttack() {
  const { attackStat } = getCombatStats();
  return attackStat ? (state.stats[attackStat] || 0) : 0;
}

// Get the player's current health stat value
function getPlayerHealth() {
  const { healthStat } = getCombatStats();
  return healthStat ? (state.stats[healthStat] || 0) : 0;
}

// Set the player's health stat
function setPlayerHealth(val) {
  const { healthStat } = getCombatStats();
  if (healthStat) state.stats[healthStat] = val;
}

// Get enemy's attack stat value using the game's attack_stat name
function getEnemyAttack(enemy) {
  const { attackStat } = getCombatStats();
  if (!attackStat) return 0;
  const key = attackStat.toLowerCase().replace(/ /g, '_');
  return enemy[attackStat] ?? enemy[key] ?? 0;
}

// Get enemy's health stat value using the game's health_stat name
function getEnemyHealth(enemy) {
  const { healthStat } = getCombatStats();
  if (!healthStat) return 0;
  const key = healthStat.toLowerCase().replace(/ /g, '_');
  return enemy[healthStat] ?? enemy[key] ?? 0;
}

function getItemName(itemId) {
  const cat = gameData.items_catalog[itemId];
  return cat ? cat.name : itemId.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

document.getElementById('file-picker').addEventListener('click', () => {
  document.getElementById('file-input').click();
});

document.getElementById('file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      gameData = JSON.parse(ev.target.result);
      if (!gameData.sections || !gameData.rules) throw new Error('Invalid game data');
      // Check for existing save before starting new game
      const existingSave = localStorage.getItem(getSaveKey());
      if (existingSave) {
        offerSaveRestore(JSON.parse(existingSave));
      } else {
        startGame();
      }
    } catch (err) {
      document.getElementById('load-error').textContent = 'Error: ' + err.message;
    }
  };
  reader.readAsText(file);
});

// ==================== LUA SANDBOX ====================
const LuaEngine = (function() {
  // Check if Fengari is available
  if (typeof fengari === 'undefined') {
    return {
      available: false,
      runCombatRound: () => ({ error: 'Lua engine not loaded' }),
    };
  }

  const lua = fengari.lua;
  const lauxlib = fengari.lauxlib;
  const lualib = fengari.lualib;
  const { to_luastring, to_jsstring } = fengari;

  function createSandbox() {
    const L = lauxlib.luaL_newstate();
    // Only open safe libs (math, string, table) — no io, os, debug
    lauxlib.luaL_requiref(L, to_luastring('_G'), lualib.luaopen_base, 1); lua.lua_pop(L, 1);
    lauxlib.luaL_requiref(L, to_luastring('math'), lualib.luaopen_math, 1); lua.lua_pop(L, 1);
    lauxlib.luaL_requiref(L, to_luastring('string'), lualib.luaopen_string, 1); lua.lua_pop(L, 1);
    lauxlib.luaL_requiref(L, to_luastring('table'), lualib.luaopen_table, 1); lua.lua_pop(L, 1);

    // Remove dangerous globals
    for (const name of ['dofile', 'loadfile', 'require', 'collectgarbage', 'rawset', 'rawget']) {
      lua.lua_pushnil(L);
      lua.lua_setglobal(L, to_luastring(name));
    }

    return L;
  }

  // Push a JS object as a Lua table
  function pushTable(L, obj) {
    lua.lua_createtable(L, 0, Object.keys(obj).length);
    for (const [key, val] of Object.entries(obj)) {
      lua.lua_pushstring(L, to_luastring(String(key)));
      if (typeof val === 'number') lua.lua_pushnumber(L, val);
      else if (typeof val === 'string') lua.lua_pushstring(L, to_luastring(val));
      else if (typeof val === 'boolean') lua.lua_pushboolean(L, val);
      else if (val === null || val === undefined) lua.lua_pushnil(L);
      else if (typeof val === 'object' && !Array.isArray(val)) pushTable(L, val);
      else if (Array.isArray(val)) {
        lua.lua_createtable(L, val.length, 0);
        for (let i = 0; i < val.length; i++) {
          if (typeof val[i] === 'number') lua.lua_pushnumber(L, val[i]);
          else if (typeof val[i] === 'string') lua.lua_pushstring(L, to_luastring(val[i]));
          else lua.lua_pushnil(L);
          lua.lua_rawseti(L, -2, i + 1);
        }
      }
      else lua.lua_pushnil(L);
      lua.lua_settable(L, -3);
    }
  }

  // Read a Lua table back to JS object
  function readTable(L, idx) {
    const obj = {};
    lua.lua_pushnil(L);
    while (lua.lua_next(L, idx < 0 ? idx - 1 : idx) !== 0) {
      const key = lua.lua_isstring(L, -2) ? to_jsstring(lua.lua_tostring(L, -2)) :
                  lua.lua_isnumber(L, -2) ? lua.lua_tonumber(L, -2) : null;
      let val;
      if (lua.lua_isnumber(L, -1)) val = lua.lua_tonumber(L, -1);
      else if (lua.lua_isstring(L, -1)) val = to_jsstring(lua.lua_tostring(L, -1));
      else if (lua.lua_isboolean(L, -1)) val = lua.lua_toboolean(L, -1);
      else if (lua.lua_istable(L, -1)) val = readTable(L, lua.lua_gettop(L));
      else val = null;
      if (key !== null) obj[key] = val;
      lua.lua_pop(L, 1);
    }
    return obj;
  }

  // Run a combat round script
  // Returns: { logs: string[], player: {health, attack}, enemy: {health, attack, name}, combat: {last_result, last_damage, ...} }
  function runCombatRound(script, playerData, enemyData, combatData, extraContext) {
    const L = createSandbox();
    const logs = [];

    // Register roll() function
    lua.lua_pushcfunction(L, function(L) {
      const formula = to_jsstring(lua.lua_tostring(L, 1));
      const result = rollDice(formula);
      lua.lua_createtable(L, 0, 3);
      lua.lua_pushstring(L, to_luastring('total'));
      lua.lua_pushnumber(L, result.total);
      lua.lua_settable(L, -3);
      lua.lua_pushstring(L, to_luastring('rolls'));
      lua.lua_createtable(L, result.rolls.length, 0);
      for (let i = 0; i < result.rolls.length; i++) {
        lua.lua_pushnumber(L, result.rolls[i]);
        lua.lua_rawseti(L, -2, i + 1);
      }
      lua.lua_settable(L, -3);
      lua.lua_pushstring(L, to_luastring('text'));
      lua.lua_pushstring(L, to_luastring(result.rolls.join(', ')));
      lua.lua_settable(L, -3);
      return 1;
    });
    lua.lua_setglobal(L, to_luastring('roll'));

    // Register log() function
    lua.lua_pushcfunction(L, function(L) {
      const msg = to_jsstring(lua.lua_tostring(L, 1));
      logs.push(msg);
      return 0;
    });
    lua.lua_setglobal(L, to_luastring('log'));

    // Register lookup() for table lookups (e.g., Combat Results Table)
    lua.lua_pushcfunction(L, function(L) {
      // lookup(table, col_key, row_key) -> value
      if (!lua.lua_istable(L, 1)) { lua.lua_pushnil(L); return 1; }
      const tbl = readTable(L, 1);
      const col = lua.lua_isstring(L, 2) ? to_jsstring(lua.lua_tostring(L, 2)) : String(lua.lua_tonumber(L, 2));
      const row = lua.lua_isstring(L, 3) ? to_jsstring(lua.lua_tostring(L, 3)) : String(lua.lua_tonumber(L, 3));
      const result = tbl?.[col]?.[row];
      if (result && typeof result === 'object') {
        pushTable(L, result);
      } else if (typeof result === 'number') {
        lua.lua_pushnumber(L, result);
      } else {
        lua.lua_pushnil(L);
      }
      return 1;
    });
    lua.lua_setglobal(L, to_luastring('lookup'));

    // Push player, enemy, combat tables
    pushTable(L, playerData);
    lua.lua_setglobal(L, to_luastring('player'));

    pushTable(L, enemyData);
    lua.lua_setglobal(L, to_luastring('enemy'));

    pushTable(L, combatData);
    lua.lua_setglobal(L, to_luastring('combat'));

    // Push any extra context (e.g., combat_results_table)
    if (extraContext) {
      for (const [key, val] of Object.entries(extraContext)) {
        if (typeof val === 'object') pushTable(L, val);
        else if (typeof val === 'number') lua.lua_pushnumber(L, val);
        else if (typeof val === 'string') lua.lua_pushstring(L, to_luastring(val));
        else lua.lua_pushnil(L);
        lua.lua_setglobal(L, to_luastring(key));
      }
    }

    // Execute the script
    const status = lauxlib.luaL_dostring(L, to_luastring(script));
    if (status !== 0) {
      const err = to_jsstring(lua.lua_tostring(L, -1));
      lua.lua_close(L);
      return { error: err, logs };
    }

    // Read back player, enemy, combat tables
    lua.lua_getglobal(L, to_luastring('player'));
    const newPlayer = lua.lua_istable(L, -1) ? readTable(L, lua.lua_gettop(L)) : playerData;
    lua.lua_pop(L, 1);

    lua.lua_getglobal(L, to_luastring('enemy'));
    const newEnemy = lua.lua_istable(L, -1) ? readTable(L, lua.lua_gettop(L)) : enemyData;
    lua.lua_pop(L, 1);

    lua.lua_getglobal(L, to_luastring('combat'));
    const newCombat = lua.lua_istable(L, -1) ? readTable(L, lua.lua_gettop(L)) : combatData;
    lua.lua_pop(L, 1);

    lua.lua_close(L);
    return { player: newPlayer, enemy: newEnemy, combat: newCombat, logs, error: null };
  }

  return { available: true, runCombatRound };
})();

// ==================== FRONTMATTER ====================
let frontmatterPages = [];
let frontmatterIdx = 0;

function offerSaveRestore(save) {
  showScreen('load-screen');
  const title = gameData.metadata?.title || 'Unknown';
  const date = new Date(save.timestamp);
  const timeStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const section = save.state?.currentSection || '?';

  const area = document.getElementById('continue-area');
  area.style.display = '';
  area.innerHTML = `
    <h3>Save Found</h3>
    <p style="font-size:0.9em;color:var(--text-dim);margin-bottom:12px;">${title} — Section ${section} (${timeStr})</p>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button class="btn" onclick="restoreSave()">Continue Saved Game</button>
      <button class="btn btn-small" onclick="startGame()">New Game</button>
    </div>
  `;

  window.restoreSave = function() {
    const raw = localStorage.getItem(getSaveKey());
    if (!raw) return;
    loadGame(JSON.parse(raw));
  };
}

function startGame() {
  const fm = gameData.frontmatter;
  if (fm?.pages && fm.pages.length > 0) {
    frontmatterPages = fm.pages;
    frontmatterIdx = 0;
    showFrontmatterPage();
  } else {
    startCharacterCreation();
  }
}

function showFrontmatterPage() {
  showScreen('frontmatter-screen');
  const page = frontmatterPages[frontmatterIdx];
  document.getElementById('frontmatter-title').textContent = gameData.metadata?.title || 'Gamebook';

  const content = document.getElementById('frontmatter-content');
  const total = frontmatterPages.length;
  content.innerHTML = `
    <div class="fm-page-indicator">Page ${frontmatterIdx + 1} of ${total}</div>
    <div class="frontmatter-page">
      ${page.type ? `<span class="fm-type-tag">${page.type}</span>` : ''}
      <h3>${page.title}</h3>
      <div class="fm-text">${formatText(page.text)}</div>
    </div>
  `;

  const btn = document.getElementById('frontmatter-next-btn');
  if (frontmatterIdx < total - 1) {
    btn.textContent = 'Continue';
  } else {
    btn.textContent = 'Begin Character Creation';
  }
}

function nextFrontmatterPage() {
  frontmatterIdx++;
  if (frontmatterIdx < frontmatterPages.length) {
    showFrontmatterPage();
  } else {
    startCharacterCreation();
  }
}

// ==================== CHARACTER CREATION ====================
function startCharacterCreation() {
  // Reset state for a fresh character
  state = {
    stats: {},
    initialStats: {},
    inventory: [],
    flags: new Set(),
    provisions: 0,
    gold: 0,
    meals: 0,
    potion: null,
    potionDoses: 0,
    abilities: [],
    currentSection: null,
    visitedSections: new Set(),
  };
  window._lastTestResult = null;

  showScreen('creation-screen');
  document.getElementById('game-title').textContent = gameData.metadata?.title || 'Gamebook';

  const steps = gameData.character_creation?.steps || [];
  const rollContainer = document.getElementById('stat-rolls');
  rollContainer.innerHTML = '';

  // Process steps that are immediate (rolls, items, resources)
  // Collect interactive steps (potion choice, ability choice) for later
  let interactiveSteps = [];
  const items = [];

  for (const step of steps) {
    if (step.action === 'roll_stat') {
      const result = rollDice(step.formula);
      state.stats[step.stat] = result.total;
      state.initialStats[step.stat] = result.total;

      const div = document.createElement('div');
      div.className = 'stat-roll';
      const rollLabel = step.formula.startsWith('R10') ? `R10 = [${result.rolls[0]}]` : `${step.formula} = [${result.rolls.join(', ')}]`;
      div.innerHTML = `
        <span class="stat-name">${step.stat}</span>
        <span class="dice-result">${rollLabel}${result.bonus ? ` ${result.op || '+'} ${result.bonus}` : ''}</span>
        <span class="stat-value">${result.total}</span>
      `;
      rollContainer.appendChild(div);
    } else if (step.action === 'choose_one') {
      interactiveSteps.push({ type: 'choose_one', step });
    } else if (step.action === 'choose_abilities') {
      interactiveSteps.push({ type: 'abilities', step });
    } else if (step.action === 'add_item') {
      items.push(step.item);
    } else if (step.action === 'set_resource') {
      if (step.resource === 'provisions') state.provisions = step.amount;
      else if (step.resource === 'gold') state.gold = step.amount;
      else if (step.resource === 'meals') state.meals = step.amount;
    }
  }

  // Add starting items
  for (const item of items) {
    if (!state.inventory.includes(item)) state.inventory.push(item);
  }

  // Process interactive steps sequentially
  processCreationSteps(interactiveSteps, items);
}

function processCreationSteps(steps, items) {
  if (steps.length === 0) {
    showEquipmentAndBegin();
    return;
  }

  const current = steps.shift();
  const rollContainer = document.getElementById('stat-rolls');

  if (current.type === 'choose_one') {
    const choiceStep = current.step;
    const category = choiceStep.category || 'choice';
    const options = choiceStep.options || [];

    // Check if this is a potion choice (special handling for potion mechanics)
    const isPotion = category === 'potion';
    const potionDefs = isPotion ? (gameData.rules.potion?.choose_one_of || []) : [];

    const section = document.getElementById('potion-section');
    section.style.display = '';
    // Repurpose the potion section UI for any choose_one
    section.querySelector('h3').textContent = isPotion ? 'Choose Your Potion' : `Choose: ${category.charAt(0).toUpperCase() + category.slice(1)}`;
    section.querySelector('p').textContent = isPotion
      ? `You may take one potion with you on your adventure (${gameData.rules.potion?.doses || 2} doses).`
      : `Select one option.`;
    const container = document.getElementById('potion-choices');
    container.innerHTML = '';

    for (const opt of options) {
      const def = potionDefs.find(p => p.name === opt);
      const btn = document.createElement('button');
      btn.className = 'potion-btn';
      btn.textContent = opt + (def?.detail ? ` — ${def.detail}` : def ? ` — Restores ${def.stat} to initial value` : '');
      btn.addEventListener('click', () => {
        container.querySelectorAll('.potion-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');

        if (isPotion) {
          if (state.potion) {
            const prevId = state.potion.toLowerCase().replace(/ /g, '_');
            const idx = state.inventory.indexOf(prevId);
            if (idx >= 0) state.inventory.splice(idx, 1);
          }
          state.potion = opt;
          state.potionDoses = gameData.rules.potion?.doses || 2;
          state.inventory.push(opt.toLowerCase().replace(/ /g, '_'));
        } else {
          // Generic choose_one: set a flag for the choice
          const flagName = category + '_' + opt.toLowerCase().replace(/ /g, '_');
          state.flags.add(flagName);
        }
        processCreationSteps(steps, items);
      });
      container.appendChild(btn);
    }
  } else if (current.type === 'abilities') {
    const abStep = current.step;
    const abRules = gameData.rules.abilities || {};
    const available = abRules.available || [];
    const count = abStep.count || abRules.choose_count || 5;
    const selected = new Set();

    const section = document.createElement('div');
    section.className = 'mt-2';
    section.id = 'abilities-section';
    rollContainer.parentNode.insertBefore(section, document.getElementById('equipment-section'));

    function renderAbilities() {
      let html = `<h3>Choose ${count} Disciplines</h3>`;
      html += `<div class="choose-items-count">Selected: ${selected.size} / ${count}</div>`;
      html += `<div class="choose-items-grid">`;
      for (const ab of available) {
        const isSel = selected.has(ab.name);
        html += `<div class="choose-item-btn ${isSel ? 'selected' : ''}" data-ability="${ab.name}">
          <strong>${ab.name}</strong>
          <div class="item-desc">${ab.description || ''}${ab.mechanical_effect ? ' (' + ab.mechanical_effect + ')' : ''}</div>
        </div>`;
      }
      html += `</div>`;
      if (selected.size === count) {
        html += `<div class="center mt-1"><button class="btn" id="confirm-abilities-btn">Confirm Disciplines</button></div>`;
      }
      section.innerHTML = html;

      section.querySelectorAll('.choose-item-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const name = btn.dataset.ability;
          if (selected.has(name)) {
            selected.delete(name);
          } else if (selected.size < count) {
            selected.add(name);
          }
          renderAbilities();
        });
      });
      const confirmBtn = section.querySelector('#confirm-abilities-btn');
      if (confirmBtn) {
        confirmBtn.addEventListener('click', () => {
          state.abilities = [...selected];
          for (const name of selected) {
            state.flags.add('ability_' + name.toLowerCase().replace(/ /g, '_'));
          }

          // Check if any selected abilities require a roll
          const rollAbilities = available.filter(ab => selected.has(ab.name) && ab.requires_roll);
          if (rollAbilities.length > 0) {
            processAbilityRolls(section, rollAbilities, 0, steps, items);
          } else {
            section.innerHTML = `<div class="event-msg gain">Disciplines: ${[...selected].join(', ')}</div>`;
            processCreationSteps(steps, items);
          }
        });
      }
    }
    renderAbilities();
  }
}

function processAbilityRolls(section, rollAbilities, idx, steps, items) {
  if (idx >= rollAbilities.length) {
    section.innerHTML = `<div class="event-msg gain">Disciplines: ${state.abilities.join(', ')}</div>`;
    processCreationSteps(steps, items);
    return;
  }

  const ab = rollAbilities[idx];
  const roll = ab.requires_roll;
  section.innerHTML = `
    <div class="test-area">
      <h3>${ab.name}</h3>
      <p>${roll.prompt || 'Roll to determine your result'}</p>
      <div class="mt-2">
        <button class="btn" id="ability-roll-btn">Roll</button>
      </div>
    </div>
  `;

  section.querySelector('#ability-roll-btn').addEventListener('click', () => {
    const result = rollDice(roll.formula || 'R10');
    const resultLabel = roll.results?.[String(result.total)] || String(result.total);

    // Store the result as a flag
    const flagName = ab.name.toLowerCase().replace(/ /g, '_') + '_' + resultLabel.toLowerCase().replace(/ /g, '_');
    state.flags.add(flagName);

    section.innerHTML = `
      <div class="test-area">
        <h3>${ab.name}</h3>
        <div class="dice-display">[${result.rolls[0]}]</div>
        <p><strong>${resultLabel}</strong></p>
      </div>
    `;

    setTimeout(() => processAbilityRolls(section, rollAbilities, idx + 1, steps, items), 1500);
  });
}

function showEquipmentAndBegin() {
  const section = document.getElementById('equipment-section');
  section.style.display = '';
  const list = document.getElementById('equipment-list');
  list.innerHTML = '';
  for (const item of state.inventory) {
    const li = document.createElement('li');
    li.textContent = getItemName(item);
    list.appendChild(li);
  }
  if (state.provisions > 0) {
    const li = document.createElement('li');
    li.textContent = `Provisions (${state.provisions})`;
    list.appendChild(li);
  }
  if (state.meals > 0) {
    const li = document.createElement('li');
    li.textContent = `Meals (${state.meals})`;
    list.appendChild(li);
  }
  if (state.gold > 0) {
    const li = document.createElement('li');
    li.textContent = `Gold (${state.gold})`;
    list.appendChild(li);
  }
  if (state.abilities.length > 0) {
    const li = document.createElement('li');
    li.textContent = `Disciplines: ${state.abilities.join(', ')}`;
    list.appendChild(li);
  }
  document.getElementById('begin-btn').style.display = '';
}

// ==================== BEGIN ADVENTURE ====================
function beginAdventure() {
  showScreen('game-screen');
  navigateTo('1');
}

// ==================== STAT BAR ====================
function updateStatBar() {
  const bar = document.getElementById('stat-bar');
  const statDefs = gameData.rules.stats || [];

  let html = '';
  for (const sd of statDefs) {
    const val = state.stats[sd.name] || 0;
    const initial = state.initialStats[sd.name] || val;
    html += `<div class="stat-item ${sd.name}">
      <span class="stat-label">${sd.name}</span>
      <span class="stat-val">${val}/${initial}</span>
    </div>`;
  }

  html += `<div class="stat-item provisions">
    <span class="stat-label">Provisions</span>
    <span class="stat-val">${state.provisions}</span>
  </div>`;
  html += `<div class="stat-item gold">
    <span class="stat-label">Gold</span>
    <span class="stat-val">${state.gold}</span>
  </div>`;

  if (state.potion && state.potionDoses > 0) {
    html += `<div class="stat-bar-actions">
      <span class="potion-info" onclick="usePotion()" title="Click to drink">${state.potion} (${state.potionDoses})</span>
    </div>`;
  }

  bar.innerHTML = html;
}

function updateInventory() {
  const list = document.getElementById('inventory-list');
  list.innerHTML = '';
  // Hide potion from inventory list — it's shown in the stat bar
  const potionId = state.potion ? state.potion.toLowerCase().replace(/ /g, '_') : null;
  const displayItems = state.inventory.filter(i => i !== potionId);
  if (displayItems.length === 0) {
    list.innerHTML = '<li class="empty">Empty</li>';
    return;
  }
  for (const item of displayItems) {
    const li = document.createElement('li');
    li.textContent = getItemName(item);
    list.appendChild(li);
  }
}

function toggleInventory() {
  const panel = document.getElementById('inventory-panel');
  panel.classList.toggle('open');
  document.getElementById('inv-arrow').textContent = panel.classList.contains('open') ? '\u25BC' : '\u25B6';
}

// ==================== POTION USE ====================
function usePotion() {
  if (!state.potion || state.potionDoses <= 0) return;
  const potionDefs = gameData.rules.potion?.choose_one_of || [];
  const def = potionDefs.find(p => p.name === state.potion);
  if (!def) return;

  state.potionDoses--;

  if (def.effect === 'restore_to_initial') {
    state.stats[def.stat] = state.initialStats[def.stat];
  } else if (def.effect === 'restore_to_initial_plus_one') {
    state.initialStats[def.stat] = (state.initialStats[def.stat] || 0) + 1;
    state.stats[def.stat] = state.initialStats[def.stat];
  }

  if (state.potionDoses <= 0) {
    const idx = state.inventory.indexOf(state.potion.toLowerCase().replace(/ /g, '_'));
    if (idx >= 0) state.inventory.splice(idx, 1);
  }

  updateStatBar();
  updateInventory();
}

// ==================== NAVIGATION ====================
function navigateTo(sectionId) {
  const sid = String(sectionId);
  const section = gameData.sections[sid];
  if (!section) {
    document.getElementById('game-content').innerHTML = `<p style="color:var(--danger)">Section ${sid} not found!</p>`;
    return;
  }

  state.currentSection = sid;
  state.visitedSections.add(sid);

  // Check for ending
  if (section.is_ending) {
    showEnding(section);
    return;
  }

  // Check for death
  const { healthStat: _hs } = getCombatStats();
  if (_hs && state.stats[_hs] !== undefined && state.stats[_hs] <= 0) {
    showEnding({ text: `Your ${_hs} has reached zero. Your adventure is over.`, ending_type: 'death', events: [], choices: [] });
    return;
  }

  updateStatBar();
  updateInventory();
  updateDebug();

  const content = document.getElementById('game-content');
  content.innerHTML = '';

  // Section header
  const header = document.createElement('div');
  header.className = 'section-header';
  header.textContent = `\u2014 ${sid} \u2014`;
  content.appendChild(header);

  // Section text
  const textDiv = document.createElement('div');
  textDiv.className = 'section-text';
  textDiv.innerHTML = formatText(section.text);
  content.appendChild(textDiv);

  // Process events
  processEvents(section.events || [], section.choices || []);
}

function formatText(text) {
  if (!text) return '';
  return text.split('\n\n').map(p => `<p>${p}</p>`).join('');
}

// ==================== EVENT PROCESSING ====================
let pendingEvents = [];
let pendingChoices = [];

function processEvents(events, choices) {
  pendingEvents = [...events];
  pendingChoices = choices;
  processNextEvent();
}

function processNextEvent() {
  if (pendingEvents.length === 0) {
    // All events processed, show choices
    showChoices(pendingChoices);
    return;
  }

  const event = pendingEvents.shift();
  const content = document.getElementById('game-content');

  switch (event.type) {
    case 'modify_stat':
      handleModifyStat(event);
      processNextEvent();
      break;
    case 'add_item':
      handleAddItem(event);
      processNextEvent();
      break;
    case 'remove_item':
      handleRemoveItem(event);
      processNextEvent();
      break;
    case 'set_flag':
      handleSetFlag(event);
      processNextEvent();
      break;
    case 'combat':
      handleCombat(event);
      break;
    case 'stat_test':
      handleStatTest(event);
      break;
    case 'roll_dice':
      handleRollDice(event);
      break;
    case 'eat_meal':
      handleEatMeal(event);
      break;
    case 'input_number':
      handleInputNumber(event);
      break;
    case 'input_text':
      handleInputText(event);
      break;
    case 'choose_items':
      handleChooseItems(event);
      break;
    case 'script':
      handleScript(event);
      break;
    case 'custom':
      handleCustom(event);
      processNextEvent();
      break;
    default:
      processNextEvent();
  }
}

// --- Modify Stat ---
function handleModifyStat(event) {
  const stat = event.stat;
  const amount = event.amount || 0;
  const content = document.getElementById('game-content');

  if (stat === 'provisions') {
    state.provisions = Math.max(0, state.provisions + amount);
  } else if (stat === 'gold') {
    state.gold = Math.max(0, state.gold + amount);
  } else {
    const old = state.stats[stat] || 0;
    let newVal = old + amount;
    // Respect initial max if applicable
    const statDef = (gameData.rules.stats || []).find(s => s.name === stat);
    if (statDef?.initial_is_max && state.initialStats[stat] !== undefined) {
      newVal = Math.min(newVal, state.initialStats[stat]);
    }
    if (statDef?.min !== undefined && statDef?.min !== null) {
      newVal = Math.max(newVal, statDef.min);
    }
    state.stats[stat] = newVal;
  }

  // Check for special: set to value instead of delta
  if (event.set_to !== undefined) {
    if (stat === 'provisions') state.provisions = event.set_to;
    else if (stat === 'gold') state.gold = event.set_to;
    else state.stats[stat] = event.set_to;
  }

  // Check for modify_initial
  if (event.modify_initial) {
    state.initialStats[stat] = (state.initialStats[stat] || 0) + (event.modify_initial_amount || amount);
    // Also apply to current
    state.stats[stat] = (state.stats[stat] || 0) + (event.modify_initial_amount || 0);
  }

  const msg = document.createElement('div');
  msg.className = 'event-msg ' + (amount >= 0 ? 'gain' : 'loss');
  const sign = amount >= 0 ? '+' : '';
  msg.textContent = `${stat.toUpperCase()} ${sign}${amount}`;
  content.appendChild(msg);

  updateStatBar();

  // Check for death
  const { healthStat: _hs2 } = getCombatStats();
  if (_hs2 && state.stats[_hs2] !== undefined && state.stats[_hs2] <= 0) {
    showEnding({ text: `Your ${_hs2} has reached zero. Your adventure is over.`, ending_type: 'death', events: [], choices: [] });
  }
}

// --- Add Item ---
function handleAddItem(event) {
  const item = event.item;
  if (!state.inventory.includes(item)) {
    state.inventory.push(item);
  }
  const content = document.getElementById('game-content');
  const msg = document.createElement('div');
  msg.className = 'event-msg gain';
  msg.textContent = `Acquired: ${getItemName(item)}`;
  content.appendChild(msg);
  updateInventory();
}

// --- Remove Item ---
function handleRemoveItem(event) {
  const idx = state.inventory.indexOf(event.item);
  if (idx >= 0) state.inventory.splice(idx, 1);
  const content = document.getElementById('game-content');
  const msg = document.createElement('div');
  msg.className = 'event-msg loss';
  msg.textContent = `Lost: ${getItemName(event.item)}`;
  content.appendChild(msg);
  updateInventory();
}

// --- Set Flag ---
function handleSetFlag(event) {
  state.flags.add(event.flag);
  const content = document.getElementById('game-content');
  const msg = document.createElement('div');
  msg.className = 'event-msg info';
  msg.textContent = `\u2691 ${event.flag.replace(/_/g, ' ')}`;
  content.appendChild(msg);
}

// --- Custom ---
// ==================== SCRIPT EVENT ====================
function handleScript(event) {
  if (!LuaEngine.available || !event.script_code) {
    // Fall back to showing description
    const content = document.getElementById('game-content');
    const msg = document.createElement('div');
    msg.className = 'event-msg info';
    msg.textContent = event.description || 'Script event (Lua not available)';
    content.appendChild(msg);
    processNextEvent();
    return;
  }

  const { attackStat, healthStat } = getCombatStats();
  const playerData = {
    attack: getPlayerAttack(),
    health: getPlayerHealth(),
    name: 'You',
  };

  // Build game_state with all stats
  const gameState = { ...state.stats };

  // Build extra context
  const extraContext = {
    game_state: gameState,
    inventory: [...state.inventory],
    flags: [...state.flags],
  };

  const result = LuaEngine.runCombatRound(event.script_code, playerData, { attack: 0, health: 0, name: '' }, { round: 0 }, extraContext);

  const content = document.getElementById('game-content');

  if (result.error) {
    const msg = document.createElement('div');
    msg.className = 'event-msg loss';
    msg.textContent = 'Script error: ' + result.error;
    content.appendChild(msg);
    processNextEvent();
    return;
  }

  // Apply stat changes from game_state
  if (result.combat?.navigate_to || result.player?.navigate_to) {
    // Script wants to navigate
    const target = result.combat?.navigate_to || result.player?.navigate_to;
    // Apply health changes first
    if (result.player?.health !== undefined && healthStat) {
      state.stats[healthStat] = Math.max(0, result.player.health);
    }
    // Apply game_state changes
    const newGameState = result.combat?.game_state_changed;
    if (newGameState) {
      for (const [k, v] of Object.entries(newGameState)) {
        state.stats[k] = v;
      }
    }
    updateStatBar();
    for (const msg of result.logs || []) {
      const el = document.createElement('div');
      el.className = 'event-msg info';
      el.innerHTML = msg;
      content.appendChild(el);
    }
    setTimeout(() => navigateTo(target), 1000);
    return;
  }

  // Apply health/stat changes
  if (result.player?.health !== undefined && healthStat) {
    state.stats[healthStat] = Math.max(0, result.player.health);
  }
  if (result.player?.stats_changed) {
    for (const [k, v] of Object.entries(result.player.stats_changed)) {
      state.stats[k] = v;
    }
  }

  // Show log messages
  for (const msg of result.logs || []) {
    const el = document.createElement('div');
    el.className = 'event-msg info';
    el.innerHTML = msg;
    content.appendChild(el);
  }

  updateStatBar();

  // Check for death
  if (healthStat && state.stats[healthStat] !== undefined && state.stats[healthStat] <= 0) {
    showEnding({ text: `Your ${healthStat} has reached zero. Your adventure is over.`, ending_type: 'death', events: [], choices: [] });
    return;
  }

  processNextEvent();
}

function handleCustom(event) {
  const content = document.getElementById('game-content');
  const msg = document.createElement('div');
  msg.className = 'event-msg info';
  msg.textContent = event.description || 'Special event';
  content.appendChild(msg);
}

// ==================== CHOOSE ITEMS ====================
function handleChooseItems(event) {
  const content = document.getElementById('game-content');
  const area = document.createElement('div');
  area.className = 'choose-items-area';
  content.appendChild(area);

  const catalog = gameData.items_catalog || {};
  const filter = event.catalog_filter || {};
  const excludeSet = new Set(event.exclude || []);
  const count = event.count || 1;
  const addAutomatic = event.add_automatic || [];
  const replaceCategory = event.replace_category || false;

  // Filter catalog — separate automatic items from selectable ones
  const autoSet = new Set(addAutomatic);
  const available = Object.entries(catalog).filter(([id, item]) => {
    if (autoSet.has(id)) return false; // shown separately
    if (excludeSet.has(id)) return false;
    for (const [key, val] of Object.entries(filter)) {
      if (item[key] !== val) return false;
    }
    return true;
  });
  const autoItems = addAutomatic.map(id => [id, catalog[id]]).filter(([id, item]) => item);

  const selected = new Set();

  function render() {
    let html = `<h3>${event.description || 'Choose your items'}</h3>`;
    html += `<div class="choose-items-count">Selected: ${selected.size} / ${count}</div>`;
    html += `<div class="choose-items-grid">`;
    // Show automatic items first (always included, not clickable)
    for (const [id, item] of autoItems) {
      html += `<div class="choose-item-btn selected" style="opacity:0.7;cursor:default;">
        <strong>${item.name}</strong> <span style="font-size:0.8em;color:var(--text-dim)">(always carried)</span>
        ${item.description ? `<div class="item-desc">${item.description}</div>` : ''}
      </div>`;
    }
    // Show selectable items
    for (const [id, item] of available) {
      const isSel = selected.has(id);
      html += `<div class="choose-item-btn ${isSel ? 'selected' : ''}" data-item-id="${id}">
        <strong>${item.name}</strong>
        ${item.description ? `<div class="item-desc">${item.description}</div>` : ''}
      </div>`;
    }
    html += `</div>`;
    if (selected.size === count) {
      html += `<div class="center mt-1"><button class="btn" id="confirm-items-btn">Confirm</button></div>`;
    }
    area.innerHTML = html;

    // Bind clicks
    area.querySelectorAll('.choose-item-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.itemId;
        if (selected.has(id)) {
          selected.delete(id);
        } else if (selected.size < count) {
          selected.add(id);
        }
        render();
      });
    });
    const confirmBtn = area.querySelector('#confirm-items-btn');
    if (confirmBtn) {
      confirmBtn.addEventListener('click', () => {
        // Remove existing items in category if replace_category
        if (replaceCategory) {
          const filterKey = Object.keys(filter)[0];
          const filterVal = filter[filterKey];
          if (filterKey && filterVal) {
            state.inventory = state.inventory.filter(itemId => {
              const catItem = catalog[itemId];
              return !catItem || catItem[filterKey] !== filterVal;
            });
          }
        }
        // Add automatic items
        for (const id of addAutomatic) {
          if (!state.inventory.includes(id)) state.inventory.push(id);
        }
        // Add selected items
        for (const id of selected) {
          if (!state.inventory.includes(id)) state.inventory.push(id);
        }
        area.innerHTML = `<div class="event-msg gain">Selected: ${[...addAutomatic.map(id => getItemName(id)), ...[...selected].map(id => getItemName(id))].join(', ')}</div>`;
        updateInventory();
        updateStatBar();
        processNextEvent();
      });
    }
  }

  render();
}

// ==================== COMBAT ====================
function handleCombat(event) {
  const content = document.getElementById('game-content');
  const area = document.createElement('div');
  area.className = 'combat-area';
  content.appendChild(area);

  // Resolve enemies list
  let enemies = [];
  if (event.enemies) {
    enemies = event.enemies.map(e => {
      const data = getEnemy(e.ref);
      return { ...data, ref: e.ref, currentHealth: getEnemyHealth(data) };
    });
  } else if (event.enemy_ref) {
    const data = getEnemy(event.enemy_ref);
    enemies = [{ ...data, ref: event.enemy_ref, currentHealth: getEnemyHealth(data) }];
  }

  const mode = event.mode || 'sequential';
  const winTo = event.win_to;
  const fleeTo = event.flee_to || null;
  const specialRules = event.special_rules || null;

  function renderCombat() {
    const c = window._combat;
    const enemy = c.enemies[c.currentEnemyIdx];
    const { attackStat, healthStat } = getCombatStats();
    const playerHealth = getPlayerHealth();
    const playerMaxHealth = state.initialStats[healthStat] || playerHealth;
    const playerAttack = getPlayerAttack();
    const enemyMaxHealth = getEnemyHealth(getEnemy(enemy.ref) || enemy);
    const enemyAttack = getEnemyAttack(enemy);

    let html = `<div class="combat-header"><h3>COMBAT</h3>`;
    if (c.enemies.length > 1) {
      html += `<div style="font-size:0.85em;color:var(--text-dim)">Enemy ${c.currentEnemyIdx + 1} of ${c.enemies.length} (${c.mode})</div>`;
    }
    html += `</div>`;

    if (c.specialRules) {
      html += `<div class="special-rules-box"><strong>Special Rules:</strong> ${c.specialRules}</div>`;
    }

    const playerStatLine = (attackStat ? `${attackStat} ${playerAttack} | ` : '') + `${healthStat} ${playerHealth}`;
    const enemyStatLine = (attackStat ? `${attackStat} ${enemyAttack} | ` : '') + `${healthStat} ${enemy.currentHealth}`;

    html += `<div class="combatants">
      <div class="combatant player">
        <div class="name" style="color:var(--stat-skill)">You</div>
        <div class="stats-line">${playerStatLine}</div>
        <div class="hp-bar"><div class="hp-fill" style="width:${Math.max(0, playerHealth / playerMaxHealth * 100)}%"></div></div>
      </div>
      <div style="font-size:1.5em;color:var(--text-dim)">vs</div>
      <div class="combatant enemy">
        <div class="name" style="color:var(--danger)">${enemy.name}</div>
        <div class="stats-line">${enemyStatLine}</div>
        <div class="hp-bar"><div class="hp-fill" style="width:${Math.max(0, enemy.currentHealth / enemyMaxHealth * 100)}%"></div></div>
      </div>
    </div>`;

    // Combat log
    if (c.combatLog.length > 0) {
      html += `<div class="combat-log">`;
      for (const entry of c.combatLog) {
        html += `<div class="round">${entry}</div>`;
      }
      html += `</div>`;
    }

    // Actions
    html += `<div class="combat-actions">`;
    if (c.waitingForLuckChoice) {
      const postLabel = gameData.rules.combat_system?.post_round_label || gameData.rules.combat_rules_detail?.post_round_label || 'Test Your Luck?';
      html += `<button class="btn btn-small" onclick="combatTestLuck()">${postLabel}</button>`;
      html += `<button class="btn btn-small" onclick="combatSkipLuck()">Skip</button>`;
    } else if (enemy.currentHealth > 0 && playerHealth > 0) {
      html += `<button class="btn" onclick="combatAttack()">Attack</button>`;
      if (c.fleeTo) {
        html += `<button class="btn btn-danger btn-small" onclick="combatFlee()">Flee</button>`;
      }
    }
    html += `</div>`;

    c.area.innerHTML = html;
    // Auto-scroll combat log
    const log = c.area.querySelector('.combat-log');
    if (log) log.scrollTop = log.scrollHeight;
  }

  // Store combat state for callbacks — all mutable state lives here
  window._combat = {
    enemies, currentEnemyIdx: 0, mode, winTo, fleeTo, specialRules,
    roundNum: 0, combatLog: [], waitingForLuckChoice: false,
    lastRoundResult: null, renderCombat, checkCombatEnd, area,
  };

  window.combatAttack = function() {
    const c = window._combat;
    const enemy = c.enemies[c.currentEnemyIdx];
    const { attackStat, healthStat } = getCombatStats();
    c.roundNum++;

    // Get the round script from the combat system
    const cs = gameData.rules.combat_system;
    const roundScript = cs?.round_script || gameData.rules.combat_rules_detail?.round_script;

    if (!roundScript || !LuaEngine.available) {
      c.combatLog.push(`<span class="hit">Error: No combat round_script defined or Lua engine not available.</span>`);
      c.renderCombat();
      return;
    }

    // Build context for the Lua script
    // Pass all player stats and all enemy fields so scripts can access anything they need
    const playerData = {
      attack: getPlayerAttack(),
      health: getPlayerHealth(),
      name: 'You',
      ...state.stats,
    };
    // Apply equipment modifiers from inventory items with when:"combat"
    const catalog = gameData.items_catalog || {};
    for (const itemId of state.inventory) {
      const item = catalog[itemId];
      if (item?.stat_modifier && (item.stat_modifier.when === 'combat' || item.stat_modifier.when === 'always')) {
        // Copy all modifier fields onto player (e.g., hit_threshold, damage_bonus, armor)
        for (const [k, v] of Object.entries(item.stat_modifier)) {
          if (k !== 'when' && k !== 'effect' && k !== 'stat' && k !== 'amount') {
            playerData[k] = v;
          }
          // Standard stat modifier: stat + amount
          if (k === 'stat' && item.stat_modifier.amount) {
            playerData[item.stat_modifier.stat] = (playerData[item.stat_modifier.stat] || 0) + item.stat_modifier.amount;
          }
        }
      }
    }
    const enemyCatalogEntry = getEnemy(enemy.ref) || {};
    const enemyData = {
      attack: getEnemyAttack(enemy),
      health: enemy.currentHealth,
      name: enemy.name,
      ...enemyCatalogEntry,
    };
    // Ensure health is the current value, not the catalog max
    enemyData.health = enemy.currentHealth;
    const combatData = {
      round: c.roundNum,
      standard_damage: cs?.details?.standard_damage || gameData.rules.combat_rules_detail?.standard_damage || 2,
      last_result: '',
      last_damage: 0,
    };

    // Pass any extra details from combat_system.details as global context
    const extraContext = {};
    const details = cs?.details || {};
    for (const [key, val] of Object.entries(details)) {
      if (key !== 'standard_damage' && typeof val === 'object') {
        extraContext[key] = val;
      }
    }

    const result = LuaEngine.runCombatRound(roundScript, playerData, enemyData, combatData, extraContext);

    if (result.error) {
      c.combatLog.push(`<span class="hit">Lua error: ${result.error}</span>`);
      c.renderCombat();
      return;
    }

    // Apply results back to game state
    enemy.currentHealth = Math.max(0, result.enemy?.health ?? enemy.currentHealth);
    setPlayerHealth(Math.max(0, result.player?.health ?? getPlayerHealth()));

    // Add logs
    for (const msg of result.logs || []) {
      c.combatLog.push(`<span class="hit">${msg}</span>`);
    }

    // Store last result for luck testing etc.
    const lr = result.combat?.last_result;
    if (lr === 'player_wounds_enemy') {
      c.lastRoundResult = { winner: 'player', damage: result.combat?.last_damage || 0, enemy };
    } else if (lr === 'enemy_wounds_player') {
      c.lastRoundResult = { winner: 'enemy', damage: result.combat?.last_damage || 0, enemy };
    } else {
      c.lastRoundResult = null;
    }

    updateStatBar();

    // Check for post-round script (luck testing, etc.)
    const postScript = cs?.post_round_script || gameData.rules.combat_rules_detail?.post_round_script;
    if (postScript && c.lastRoundResult) {
      // If there's a post-round script, offer it as an option
      c.waitingForLuckChoice = true;
    } else {
      c.waitingForLuckChoice = false;
      c.checkCombatEnd();
      return;
    }

    c.renderCombat();
  };

  window.combatTestLuck = function() {
    const c = window._combat;
    const lr = c.lastRoundResult;
    if (!lr) { c.waitingForLuckChoice = false; c.renderCombat(); return; }

    const cs = gameData.rules.combat_system;
    const postScript = cs?.post_round_script || gameData.rules.combat_rules_detail?.post_round_script;

    if (!postScript || !LuaEngine.available) {
      c.waitingForLuckChoice = false;
      c.lastRoundResult = null;
      c.checkCombatEnd();
      return;
    }

    const playerData = {
      attack: getPlayerAttack(),
      health: getPlayerHealth(),
      name: 'You',
    };
    const enemyData = {
      attack: getEnemyAttack(lr.enemy),
      health: lr.enemy.currentHealth,
      name: lr.enemy.name,
    };
    const combatData = {
      round: c.roundNum,
      last_result: lr.winner === 'player' ? 'player_wounds_enemy' : 'enemy_wounds_player',
      last_damage: lr.damage,
    };

    // Pass all stats so the script can access luck etc.
    const extraContext = { player_stats: { ...state.stats }, initial_stats: { ...state.initialStats } };
    const details = cs?.details || {};
    for (const [key, val] of Object.entries(details)) {
      if (typeof val === 'object') extraContext[key] = val;
    }

    const result = LuaEngine.runCombatRound(postScript, playerData, enemyData, combatData, extraContext);

    if (result.error) {
      c.combatLog.push(`<span class="hit">Lua error: ${result.error}</span>`);
    } else {
      lr.enemy.currentHealth = Math.max(0, result.enemy?.health ?? lr.enemy.currentHealth);
      setPlayerHealth(Math.max(0, result.player?.health ?? getPlayerHealth()));
      // Apply any stat changes from the script
      if (result.player?.stats_changed) {
        for (const [k, v] of Object.entries(result.player.stats_changed)) {
          state.stats[k] = v;
        }
      }
      for (const msg of result.logs || []) {
        c.combatLog.push(`<span class="lucky">${msg}</span>`);
      }
    }

    c.waitingForLuckChoice = false;
    c.lastRoundResult = null;
    updateStatBar();
    c.checkCombatEnd();
  };

  window.combatSkipLuck = function() {
    const c = window._combat;
    c.waitingForLuckChoice = false;
    c.lastRoundResult = null;
    c.checkCombatEnd();
  };

  function checkCombatEnd() {
    const c = window._combat;
    const enemy = c.enemies[c.currentEnemyIdx];

    // Player dead
    if (getPlayerHealth() <= 0) {
      c.combatLog.push('<span class="hit">You have been slain!</span>');
      c.renderCombat();
      setTimeout(() => {
        showEnding({ text: 'You have fallen in combat. Your adventure is over.', ending_type: 'death', events: [], choices: [] });
      }, 1000);
      return;
    }

    // Enemy dead
    if (enemy.currentHealth <= 0) {
      c.combatLog.push(`<span class="lucky">${enemy.name} is defeated!</span>`);

      const nextIdx = c.currentEnemyIdx + 1;
      if (nextIdx < c.enemies.length && (c.mode === 'sequential' || c.mode === 'custom')) {
        // Next enemy
        c.currentEnemyIdx = nextIdx;
        c.combatLog.push(`<br>--- Next opponent: ${c.enemies[c.currentEnemyIdx].name} ---`);
        c.renderCombat();
        return;
      } else {
        // All enemies defeated — don't re-render (index would be out of bounds)
        setTimeout(() => {
          if (c.winTo) navigateTo(c.winTo);
          else processNextEvent();
        }, 500);
        return;
      }
    }

    c.renderCombat();
  }

  window.combatFlee = function() {
    const c = window._combat;
    const fleeRules = gameData.rules.escaping || {};
    const fleeDmg = fleeRules.flee_damage || 2;

    setPlayerHealth(Math.max(0, getPlayerHealth() - fleeDmg));
    const { healthStat } = getCombatStats();
    c.combatLog.push(`<span class="hit">You flee! The enemy strikes as you run. (-${fleeDmg} ${healthStat})</span>`);
    updateStatBar();

    if (getPlayerHealth() <= 0) {
      c.checkCombatEnd();
      return;
    }

    // Offer luck test on flee wound if allowed
    const luckStat = (gameData.rules.stats || []).find(s => /luck/i.test(s.name));
    const luckVal = luckStat ? (state.stats[luckStat.name] || 0) : 0;
    if (fleeRules.luck_on_flee_wound_allowed && luckVal > 0) {
      c.lastRoundResult = { winner: 'enemy', damage: fleeDmg, enemy: c.enemies[c.currentEnemyIdx] };
      c.waitingForLuckChoice = true;
      c.renderCombat();
      // Override skip to navigate after
      const origSkip = window.combatSkipLuck;
      window.combatSkipLuck = function() {
        c.waitingForLuckChoice = false;
        c.renderCombat();
        window.combatSkipLuck = origSkip;
        navigateTo(c.fleeTo);
      };
      const origLuck = window.combatTestLuck;
      const savedTestLuck = window.combatTestLuck;
      window.combatTestLuck = function() {
        savedTestLuck();
        // After luck test on flee, navigate
        window.combatTestLuck = origLuck;
        window.combatSkipLuck = origSkip;
        setTimeout(() => navigateTo(c.fleeTo), 500);
      };
      return;
    }

    c.renderCombat();
    setTimeout(() => navigateTo(c.fleeTo), 500);
  };

  renderCombat();
}

// ==================== STAT TEST ====================
function handleStatTest(event) {
  const content = document.getElementById('game-content');
  const area = document.createElement('div');
  area.className = 'test-area';
  content.appendChild(area);

  const stat = event.stat;
  const statVal = state.stats[stat] || 0;

  area.innerHTML = `
    <h3>Test Your ${stat.charAt(0).toUpperCase() + stat.slice(1)}</h3>
    <p style="color:var(--text-dim)">Roll 2d6. Succeed if &le; your current ${stat.toUpperCase()} (${statVal})</p>
    <div class="mt-2">
      <button class="btn" onclick="resolveStatTest(this)">Roll</button>
    </div>
  `;

  window.resolveStatTest = function(btn) {
    btn.disabled = true;
    const result = roll2d6();
    const success = result.total <= statVal;

    // Deduct if needed
    if (event.deduct_after) {
      const deductStat = event.deduct_stat || stat;
      const deductAmt = event.deduct_amount || 1;
      state.stats[deductStat] = Math.max(0, (state.stats[deductStat] || 0) - deductAmt);
      updateStatBar();
    }

    area.innerHTML = `
      <h3>Test Your ${stat.charAt(0).toUpperCase() + stat.slice(1)}</h3>
      <div class="dice-display">[${result.rolls.join(', ')}] = ${result.total}</div>
      <div class="test-result ${success ? 'success' : 'failure'}">
        ${result.total} vs ${statVal} — ${success ? 'Success!' : 'Failed!'}
      </div>
      ${event.deduct_after ? `<p style="font-size:0.85em;color:var(--text-dim)">${(event.deduct_stat || stat).toUpperCase()} reduced by ${event.deduct_amount || 1}</p>` : ''}
    `;

    // Apply failure_penalty if present and failed
    if (!success && event.failure_penalty) {
      const penalty = event.failure_penalty;
      if (penalty.type === 'modify_stat') {
        handleModifyStat(penalty);
      }
    }

    // Set a flag for test_failed conditions
    window._lastTestResult = success;

    setTimeout(() => {
      if (success && event.success_to) {
        navigateTo(event.success_to);
      } else if (!success && event.failure_to) {
        navigateTo(event.failure_to);
      } else {
        // No navigation target, continue events and show choices
        processNextEvent();
      }
    }, 1000);
  };
}

// ==================== DICE ROLL ====================
function handleRollDice(event) {
  const content = document.getElementById('game-content');
  const area = document.createElement('div');
  area.className = 'dice-roll-area';
  content.appendChild(area);

  const dice = event.dice || '2d6';

  area.innerHTML = `
    <h3>${event.prompt || 'Roll the Dice'}</h3>
    <p style="color:var(--text-dim)">Roll ${dice}</p>
    <div class="mt-2">
      <button class="btn" onclick="resolveRollDice(this)">Roll</button>
    </div>
  `;

  window.resolveRollDice = function(btn) {
    btn.disabled = true;
    const result = rollDice(dice);

    // Handle apply_to_stat: roll dice and apply result as stat modification
    if (event.apply_to_stat) {
      const stat = event.apply_to_stat;
      const isAdd = event.amount_sign === 'positive';
      const amount = isAdd ? result.total : -result.total;

      if (stat === 'provisions') state.provisions = Math.max(0, state.provisions + amount);
      else if (stat === 'gold') state.gold = Math.max(0, state.gold + amount);
      else {
        const old = state.stats[stat] || 0;
        state.stats[stat] = Math.max(0, old + amount);
      }

      area.innerHTML = `
        <h3>${event.prompt || 'Roll the Dice'}</h3>
        <div class="dice-display">[${result.rolls.join(', ')}] = ${result.total}</div>
        <div class="event-msg ${isAdd ? 'gain' : 'loss'}">${stat.toUpperCase()} ${isAdd ? '+' : ''}${amount}</div>
        ${event.note ? `<p style="font-size:0.85em;color:var(--text-dim)">${event.note}</p>` : ''}
      `;
      updateStatBar();

      // Check for death
      const { healthStat: _hs3 } = getCombatStats();
      if (_hs3 && state.stats[_hs3] !== undefined && state.stats[_hs3] <= 0) {
        setTimeout(() => showEnding({ text: `Your ${_hs3} has reached zero. Your adventure is over.`, ending_type: 'death', events: [], choices: [] }), 1000);
        return;
      }

      setTimeout(() => processNextEvent(), 1000);
      return;
    }

    // Standard result table lookup
    let matched = false;
    let target = null;
    let resultText = '';
    const results = event.results || {};
    if (results[String(result.total)]) {
      matched = true;
      target = results[String(result.total)].target;
      resultText = results[String(result.total)].text || results[String(result.total)].note || '';
    } else {
      // Check range keys like "1-2"
      for (const [key, val] of Object.entries(results)) {
        if (key.includes('-')) {
          const [lo, hi] = key.split('-').map(Number);
          if (result.total >= lo && result.total <= hi) {
            matched = true;
            target = val.target;
            resultText = val.text || val.note || '';
            break;
          }
        }
      }
    }

    area.innerHTML = `
      <h3>${event.prompt || 'Roll the Dice'}</h3>
      <div class="dice-display">[${result.rolls.join(', ')}] = ${result.total}</div>
      ${resultText ? `<p>${resultText}</p>` : ''}
    `;

    if (target) {
      setTimeout(() => navigateTo(target), 1000);
    } else if (matched) {
      // Matched a result but target is null — continue to next event/choices
      setTimeout(() => processNextEvent(), 1000);
    } else {
      area.innerHTML += `<p style="color:var(--danger)">No result for ${result.total}</p>`;
      processNextEvent();
    }
  };
}

// ==================== EAT MEAL ====================
function handleEatMeal(event) {
  const content = document.getElementById('game-content');
  const area = document.createElement('div');
  area.className = 'eat-meal-area';
  content.appendChild(area);

  const provRules = gameData.rules.provisions || {};
  const healAmount = event.heal_amount || provRules.heal_amount || 4;
  const healStat = event.heal_stat || provRules.heal_stat || 'stamina';

  const isRequired = event.required === true;

  if (state.provisions > 0) {
    area.innerHTML = `
      <h3>Eat a Meal</h3>
      <p>${isRequired ? 'You must eat a meal here.' : 'You may eat a meal'} to restore ${healAmount} ${healStat.toUpperCase()}.</p>
      <p style="color:var(--text-dim)">Provisions remaining: ${state.provisions}</p>
      <div class="mt-1">
        <button class="btn btn-success btn-small" onclick="doEatMeal(${healAmount}, '${healStat}')">Eat</button>
        ${isRequired ? '' : '<button class="btn btn-small" onclick="skipMeal()">Skip</button>'}
      </div>
    `;
  } else {
    area.innerHTML = `
      <p style="color:var(--text-dim)">You have no provisions to eat.</p>
    `;
    setTimeout(() => processNextEvent(), 500);
    return;
  }

  window.doEatMeal = function(heal, stat) {
    state.provisions--;
    const old = state.stats[stat] || 0;
    let newVal = old + heal;
    const statDef = (gameData.rules.stats || []).find(s => s.name === stat);
    if (statDef?.initial_is_max && state.initialStats[stat] !== undefined) {
      newVal = Math.min(newVal, state.initialStats[stat]);
    }
    state.stats[stat] = newVal;

    area.innerHTML = `
      <p>You eat a meal. <span style="color:var(--stat-provisions)">+${heal} ${stat.toUpperCase()}</span></p>
    `;
    updateStatBar();
    processNextEvent();
  };

  window.skipMeal = function() {
    area.innerHTML = `<p style="color:var(--text-dim)">You decide not to eat.</p>`;
    processNextEvent();
  };
}

function handleInputNumber(event) {
  const content = document.getElementById('game-content');
  const area = document.createElement('div');
  area.className = 'input-area';
  content.appendChild(area);

  area.innerHTML = `
    <h3>${event.prompt || 'Enter a number'}</h3>
    ${event.note ? `<p style="font-size:0.85em;color:var(--text-dim);margin-bottom:8px">${event.note}</p>` : ''}
    <div class="mt-1" style="display:flex;gap:8px;align-items:center;justify-content:center;">
      <input type="number" id="number-input" min="1" placeholder="Enter number...">
      <button class="btn btn-small" onclick="submitNumber()">Submit</button>
    </div>
  `;

  window.submitNumber = function() {
    const val = document.getElementById('number-input').value;
    if (!val) return;
    const num = parseInt(val);
    if (isNaN(num)) return;

    if (event.target === 'computed') {
      // Navigate to the entered number as a section
      navigateTo(num);
    } else if (event.target) {
      navigateTo(event.target);
    } else {
      navigateTo(num);
    }
  };
}

  const content = document.getElementById('game-content');
