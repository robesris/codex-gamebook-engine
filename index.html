    const results = event.results || {};
    const match = results[val.toLowerCase()] || results[val];
    if (match) {
      navigateTo(match.target || match);
    } else if (event.default_to) {
      navigateTo(event.default_to);
    } else {
      processNextEvent();
    }
  };
}

// ==================== CHOICES ====================
function showChoices(choices) {
  // If the current section has no outgoing choices AND is not an
  // ending, the player would be stuck — all events have fired and the
  // screen has no way forward. This is a data bug: the book's section
  // almost certainly has a "turn to X" instruction that the parser
  // didn't capture. Surface it as a visible diagnostic with a button
  // that at least lets the player back out, instead of silently
  // hanging. The next session should route the specific section
  // through the codex loop to recover the missing target.
  if (!choices || choices.length === 0) {
    const section = gameData?.sections?.[state.currentSection];
    if (section && !section.is_ending) {
      const content = document.getElementById('game-content');
      const diag = document.createElement('div');
      diag.className = 'event-msg loss mt-2';
      const reviewNote = section.needs_review
        ? ' The data parser flagged this section with needs_review=true, which usually means the original "turn to X" instruction was not captured during parsing.'
        : '';
      diag.innerHTML = `<strong>Data bug:</strong> section ${state.currentSection} has no outgoing choices and is not marked as an ending.${reviewNote} Please report this to the project maintainers so the section can be re-processed through the codex loop. You can reload the page to start a new adventure.`;
      content.appendChild(diag);
      const btnWrap = document.createElement('div');
      btnWrap.className = 'mt-2';
      btnWrap.innerHTML = `<button class="btn btn-large" id="dead-end-reload">Reload</button>`;
      content.appendChild(btnWrap);
      const rbtn = document.getElementById('dead-end-reload');
      if (rbtn) {
        rbtn.addEventListener('click', () => window.location.reload(), { once: true });
      }
    }
    return;
  }

  const content = document.getElementById('game-content');
  const div = document.createElement('div');
  div.className = 'choices';
  content.appendChild(div);

  for (const choice of choices) {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choice.text;

    const condMet = evaluateCondition(choice.condition);

    if (!condMet) {
      btn.classList.add('disabled');
      const tooltip = document.createElement('span');
      tooltip.className = 'condition-tooltip';
      tooltip.textContent = describeCondition(choice.condition);
      btn.appendChild(tooltip);
      btn.addEventListener('click', (e) => e.preventDefault());
    } else {
      btn.addEventListener('click', () => {
        if (choice.target != null) {
          navigateTo(choice.target);
        } else {
          // Null target — check for section-level luck_test/skill_test
          const section = gameData.sections[state.currentSection];
          if (section?.luck_test) {
            // Trigger an inline luck test
            handleStatTest({
              type: 'stat_test',
              stat: 'luck',
              success_to: section.luck_test.success_to,
              failure_to: section.luck_test.failure_to,
              deduct_after: gameData.rules.luck_test?.deduct_after ?? true,
              deduct_stat: 'luck',
              deduct_amount: gameData.rules.luck_test?.deduct_amount ?? 1,
            });
          } else if (section?.skill_test) {
            handleStatTest({
              type: 'stat_test',
              stat: 'skill',
              success_to: section.skill_test.success_to,
              failure_to: section.skill_test.failure_to,
              deduct_after: gameData.rules.skill_test?.deduct_after ?? false,
            });
          } else if (choice.note) {
            // Dead end or informational — show the note
            const msg = document.createElement('div');
            msg.className = 'event-msg info';
            msg.textContent = choice.note;
            document.getElementById('game-content').appendChild(msg);
          }
        }
      });
    }

    div.appendChild(btn);
  }
}

// ==================== CONDITION EVALUATION ====================
function evaluateCondition(cond) {
  if (!cond) return true;

  switch (cond.type) {
    case 'has_item':
      return state.inventory.includes(cond.item);
    case 'has_flag':
      return state.flags.has(cond.flag);
    case 'stat_gte': {
      const val = cond.stat === 'provisions' ? state.provisions :
                  cond.stat === 'gold' ? state.gold :
                  state.stats[cond.stat] || 0;
      return val >= cond.value;
    }
    case 'stat_lte': {
      const val = cond.stat === 'provisions' ? state.provisions :
                  cond.stat === 'gold' ? state.gold :
                  state.stats[cond.stat] || 0;
      return val <= cond.value;
    }
    case 'has_ability': {
      // Check both abilities list and flags (abilities are stored both ways)
      const abName = cond.ability;
      return (state.abilities || []).some(a => a.toLowerCase().replace(/ /g, '_') === abName.toLowerCase().replace(/ /g, '_') || a === abName) ||
             state.flags.has(abName) || state.flags.has('ability_' + abName.toLowerCase().replace(/ /g, '_'));
    }
    case 'not':
      return !evaluateCondition(cond.condition);
    case 'and':
      return (cond.conditions || []).every(c => evaluateCondition(c));
    case 'or':
      return (cond.conditions || []).some(c => evaluateCondition(c));
    case 'test_failed':
      return window._lastTestResult === false;
    case 'test_succeeded':
      return window._lastTestResult === true;
    // Schema v1.5+ equipment-aware conditions. Each reads state.equipment,
    // a map from slot name to item_id. See the CLI emulator (play.js) for
    // the matching reference implementation.
    case 'has_equipped_item': {
      const eq = state.equipment || {};
      return Object.values(eq).some(id => id === cond.item);
    }
    case 'has_equipped_in_slot': {
      const eq = state.equipment || {};
      const occupant = eq[cond.slot];
      if (!occupant) return false;
      if (cond.item) return occupant === cond.item;
      return true;
    }
    case 'has_equipped_with_property': {
      const eq = state.equipment || {};
      const catalog = gameData?.items_catalog || {};
      for (const itemId of Object.values(eq)) {
        if (!itemId) continue;
        const item = catalog[itemId];
        if (!item) continue;
        const props = Array.isArray(item.properties) ? item.properties : [];
        if (props.includes(cond.property)) return true;
      }
      return false;
    }
    default:
      return true;
  }
}

function describeCondition(cond) {
  if (!cond) return '';
  switch (cond.type) {
    case 'has_item':
      return `Requires: ${getItemName(cond.item)}`;
    case 'has_flag':
      return `Requires: ${cond.flag.replace(/_/g, ' ')}`;
    case 'stat_gte':
      return `Requires: ${cond.stat.toUpperCase()} \u2265 ${cond.value}`;
    case 'stat_lte':
      return `Requires: ${cond.stat.toUpperCase()} \u2264 ${cond.value}`;
    case 'has_ability':
      return `Requires ability: ${cond.ability}`;
    case 'not':
      return `Must NOT: ${describeCondition(cond.condition)}`;
    case 'and':
      return (cond.conditions || []).map(describeCondition).join(' AND ');
    case 'or':
      return (cond.conditions || []).map(describeCondition).join(' OR ');
    case 'test_failed':
      return 'Requires: failed the test';
    case 'test_succeeded':
      return 'Requires: passed the test';
    case 'has_equipped_item':
      return `Requires equipped: ${getItemName(cond.item)}`;
    case 'has_equipped_in_slot':
      return cond.item ? `Requires ${getItemName(cond.item)} equipped in ${cond.slot}` : `Requires something in ${cond.slot} slot`;
    case 'has_equipped_with_property':
      return `Requires equipped item with property: ${cond.property}`;
    default:
      return 'Condition not met';
  }
}

// ==================== EQUIPMENT HELPERS (schema v1.5+) ====================

function getItemDef(itemId) {
  const catalog = gameData?.items_catalog || {};
  return catalog[itemId] || null;
}

function isItemEquipped(itemId) {
  const eq = state.equipment || {};
  return Object.values(eq).some(id => id === itemId);
}

function isInCombat() {
  return !!(window._combat && !window._combat.combatOver);
}

// Can this item be equipped right now? Returns {ok, reason}.
// isAutoEquip=true bypasses the combat-active check (auto-equip at add_item
// time is considered "the moment of acquisition" for timing purposes).
function canEquipItem(itemId, isAutoEquip) {
  const item = getItemDef(itemId);
  if (!item) return { ok: false, reason: `no item definition for ${itemId}` };
  if (!item.equippable) return { ok: false, reason: `${itemId} is not equippable` };
  if (!item.slot) return { ok: false, reason: `${itemId} has no slot declared` };
  const timing = item.equip_timing || 'out_of_combat';
  if (timing === 'once' && isItemEquipped(itemId)) {
    return { ok: false, reason: `${itemId} has equip_timing: once and is already equipped` };
  }
  if (isAutoEquip) return { ok: true, reason: '' };
  if (timing === 'out_of_combat' && isInCombat()) {
    return { ok: false, reason: `${itemId} cannot be equipped during combat` };
  }
  return { ok: true, reason: '' };
}

function canUnequipItem(itemId) {
  const item = getItemDef(itemId);
  if (!item) return { ok: false, reason: `no item definition for ${itemId}` };
  const timing = item.equip_timing || 'out_of_combat';
  if (timing === 'once') {
    return { ok: false, reason: `${itemId} is permanent (equip_timing: once)` };
  }
  if (timing === 'out_of_combat' && isInCombat()) {
    return { ok: false, reason: `${itemId} cannot be unequipped during combat` };
  }
  return { ok: true, reason: '' };
}

function equipItem(itemId) {
  const item = getItemDef(itemId);
  if (!item || !item.slot) return;
  if (!state.equipment) state.equipment = {};
  state.equipment[item.slot] = itemId;
}

function unequipSlot(slot) {
  if (!state.equipment) return;
  delete state.equipment[slot];
}

function autoUnequipOnRemove(itemId) {
  if (!state.equipment) return;
  for (const slot of Object.keys(state.equipment)) {
    if (state.equipment[slot] === itemId) {
      delete state.equipment[slot];
    }
  }
}

function autoEquipOnAdd(itemId) {
  const item = getItemDef(itemId);
  if (!item || !item.equippable) return;
  const autoEquip = item.auto_equip !== false;
  if (!autoEquip) return;
  // Non-displacing auto-equip (codex v2.8.3+, emulator v3.0.2+). Fill
  // the slot only if it is currently empty. If the slot is already
  // occupied by a different item, leave the existing occupant equipped
  // and leave the new item unequipped in plain inventory. The player
  // must explicitly click equip in the sidebar if they want to swap.
  // This prevents picking up a new weapon or armor from silently
  // switching the player's active equipment underneath them — a
  // real-playthrough complaint from the Chat #3 Phase 3 browser pass
  // (LW1 section 62, where a "you may take a sword" loot event
  // silently unequipped the player's axe). See Rule 19's
  // "Auto-equip is non-displacing" paragraph for the full rationale.
  //
  // Note: player-driven equip (playerEquipItem → equipItem) still
  // displaces the current occupant, because the player clicking equip
  // is an explicit opt-in to swap. Only the automatic code path here
  // changed.
  if (!state.equipment) state.equipment = {};
  const existingOccupant = state.equipment[item.slot];
  if (existingOccupant && existingOccupant !== itemId) return;
  const check = canEquipItem(itemId, true);
  if (!check.ok) return;
  equipItem(itemId);
}

// Player-driven equip/unequip entry points (called from UI buttons).
function playerEquipItem(itemId) {
  if (!state.inventory.includes(itemId)) return;
  const check = canEquipItem(itemId, false);
  if (!check.ok) {
    alert(`Cannot equip: ${check.reason}`);
    return;
  }
  equipItem(itemId);
  updateStatDisplay();
  renderEquipmentPanel();
}

function playerUnequipItem(itemId) {
  if (!isItemEquipped(itemId)) return;
  const check = canUnequipItem(itemId);
  if (!check.ok) {
    alert(`Cannot unequip: ${check.reason}`);
    return;
  }
  const item = getItemDef(itemId);
  if (item && item.slot) unequipSlot(item.slot);
  updateStatDisplay();
  renderEquipmentPanel();
}

// ==================== DAMAGE INTERACTIONS (schema v1.5+) ====================

function normalizeDamage(raw) {
  if (raw === undefined || raw === null) return [];
  if (typeof raw === 'number') {
    return [{ amount: raw, sources: [] }];
  }
  if (Array.isArray(raw)) {
    const out = [];
    for (const entry of raw) {
      if (typeof entry === 'number') {
        out.push({ amount: entry, sources: [] });
      } else if (entry && typeof entry === 'object') {
        const amount = typeof entry.amount === 'number' ? entry.amount : 0;
        let sources = [];
        if (Array.isArray(entry.sources)) {
          sources = entry.sources.filter(s => typeof s === 'string');
        } else if (entry.sources && typeof entry.sources === 'object') {
          const srcKeys = Object.keys(entry.sources).filter(k => /^\d+$/.test(k)).sort((a, b) => Number(a) - Number(b));
          sources = srcKeys.map(k => entry.sources[k]).filter(s => typeof s === 'string');
        }
        out.push({ amount, sources });
      }
    }
    return out;
  }
  if (typeof raw === 'object') {
    const keys = Object.keys(raw).filter(k => /^\d+$/.test(k)).sort((a, b) => Number(a) - Number(b));
    if (keys.length > 0) {
      return normalizeDamage(keys.map(k => raw[k]));
    }
    if (typeof raw.amount === 'number') {
      let sources = [];
      if (Array.isArray(raw.sources)) sources = raw.sources.filter(s => typeof s === 'string');
      else if (raw.sources && typeof raw.sources === 'object') {
        const srcKeys = Object.keys(raw.sources).filter(k => /^\d+$/.test(k)).sort((a, b) => Number(a) - Number(b));
        sources = srcKeys.map(k => raw.sources[k]).filter(s => typeof s === 'string');
      }
      return [{ amount: raw.amount, sources }];
    }
  }
  return [];
}

function interactionMatchesComponent(inter, component) {
  const sources = component.sources || [];
  if (Array.isArray(inter.source_has_any) && inter.source_has_any.length > 0) {
    if (!inter.source_has_any.some(tag => sources.includes(tag))) return false;
  }
  if (Array.isArray(inter.source_lacks_all) && inter.source_lacks_all.length > 0) {
    if (!inter.source_lacks_all.every(tag => !sources.includes(tag))) return false;
  }
  return true;
}

function applyDamageInteractions(components, interactions, direction, combatLogRef, round) {
  let total = 0;
  const logEntries = [];
  for (const comp of components) {
    let amount = comp.amount;
    if (amount <= 0) {
      total += amount;
      continue;
    }
    for (const inter of interactions) {
      if ((inter.direction || 'incoming') !== direction) continue;
      if (!interactionMatchesComponent(inter, comp)) continue;
      const before = amount;
      amount = amount * inter.multiplier;
      if (round === 1) logEntries.push({ comp, inter, before, after: amount });
    }
    total += amount;
  }
  if (round === 1 && logEntries.length > 0 && combatLogRef) {
    for (const entry of logEntries) {
      const srcs = entry.comp.sources.length > 0 ? `[${entry.comp.sources.join(',')}]` : '[untagged]';
      const reason = entry.inter.reason ? ` — ${entry.inter.reason}` : '';
      combatLogRef.push(
        `<span class="modifier">Damage interaction (${direction}): ${entry.inter.kind} ×${entry.inter.multiplier} on ${srcs} — ${entry.before} → ${entry.after}${reason}</span>`
      );
    }
  }
  return total;
}

// ==================== ENDINGS ====================
function showEnding(section) {
  showScreen('ending-screen');
  const screen = document.getElementById('ending-screen');
  // Route ending styling on `ending_type`. Only explicit death endings
  // get the ominous red frame — everything else (victory, continuation,
  // neutral, or undefined) gets the gold success frame. The old default
  // (fall through to ending-death when neither flag was set) routed
  // LW1's continuation ending to red, which is wrong: successfully
  // completing LW1 is a continuation outcome (the player goes on to
  // Lone Wolf 2), not a death. The codex's four standard ending_type
  // values are: death, victory, neutral, continuation — only death is
  // "bad."
  const endingType = section.ending_type;
  const isDeath = endingType === 'death';
  const cssClass = isDeath ? 'ending-death' : 'ending-victory';
  let heading;
  if (endingType === 'victory') heading = 'VICTORY!';
  else if (endingType === 'continuation') heading = 'TO BE CONTINUED…';
  else if (endingType === 'death') heading = 'YOUR ADVENTURE ENDS';
  else heading = 'THE END';

  screen.innerHTML = `
    <div class="${cssClass} mt-3">
      <h2>${heading}</h2>
      <div class="section-text mt-2">${formatText(section.text)}</div>
      <div class="mt-3">
        <button class="btn btn-large" onclick="playAgain()">Play Again</button>
      </div>
    </div>
  `;
}

function playAgain() {
  state = {
    stats: {},
    initialStats: {},
    inventory: [],
    equipment: {},
    flags: new Set(),
    provisions: 0,
    gold: 0,
    meals: 0,
    potion: null,
    potionDoses: 0,
    abilities: [],
    currentSection: null,
    previousSection: null,
    visitedSections: new Set(),
    returnStack: [],
  };
  window._lastTestResult = null;
  window._forcedRollQueue = [];
  showScreen('load-screen');
}

// ==================== DEBUG PANEL ====================
// Tracks which collapsible sections were open so updateDebug() preserves
// the player's current panel layout after any state change.
const _debugOpenSections = { state: true, tools: false };

function toggleDebug() {
  const panel = document.getElementById('debug-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) updateDebug();
}

function _escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function _debugStatOptions() {
  // Populate the "Set stat" dropdown from rules.stats, plus the
  // three resource fields the emulator tracks separately on state.
  const stats = (gameData?.rules?.stats || []).map(s => s.name);
  const resources = ['provisions', 'gold', 'meals'];
  return [...stats, ...resources];
}

function _debugFlagList() {
  if (!state?.flags || state.flags.size === 0) return '<span class="debug-note">none</span>';
  return [...state.flags].map(f =>
    `<span class="debug-flag-tag">${_escapeHtml(f)}<span class="remove-btn" onclick="debugRemoveFlag('${_escapeHtml(f).replace(/'/g, "\\'")}')">\u00D7</span></span>`
  ).join('');
}

function updateDebug() {
  const panel = document.getElementById('debug-panel');
  if (!panel.classList.contains('open')) return;
  const visited = state.visitedSections ? [...state.visitedSections].join(', ') : 'none';
  const queueStr = (window._forcedRollQueue || []).join(', ') || '(empty)';
  const statOptions = _debugStatOptions()
    .map(n => `<option value="${_escapeHtml(n)}">${_escapeHtml(n)}</option>`)
    .join('');

  panel.innerHTML = `
    <div class="debug-section-header ${_debugOpenSections.state ? 'open' : ''}" onclick="debugToggleSection('state')">State</div>
    <div class="debug-section-body">
      <div><span class="debug-label">Section:</span> ${state.currentSection || 'n/a'}</div>
      <div><span class="debug-label">Stats:</span> ${Object.entries(state.stats).map(([k,v]) => _escapeHtml(k)+'='+v).join(', ') || '(none)'}</div>
      <div><span class="debug-label">Initial:</span> ${Object.entries(state.initialStats).map(([k,v]) => _escapeHtml(k)+'='+v).join(', ') || '(none)'}</div>
      <div><span class="debug-label">Provisions:</span> ${state.provisions}</div>
      <div><span class="debug-label">Gold:</span> ${state.gold}</div>
      <div><span class="debug-label">Meals:</span> ${state.meals || 0}</div>
      <div><span class="debug-label">Potion:</span> ${state.potion || 'none'} (${state.potionDoses} doses)</div>
      <div><span class="debug-label">Abilities:</span> ${(state.abilities || []).length > 0 ? state.abilities.map(_escapeHtml).join(', ') : 'none'}</div>
      <div><span class="debug-label">Flags:</span> ${state.flags.size > 0 ? [...state.flags].map(_escapeHtml).join(', ') : 'none'}</div>
      <div><span class="debug-label">Inventory:</span> ${state.inventory.length > 0 ? state.inventory.map(i => _escapeHtml(getItemName(i))).join(', ') : 'empty'}</div>
      <div><span class="debug-label">Last test:</span> ${window._lastTestResult === null || window._lastTestResult === undefined ? 'n/a' : window._lastTestResult ? 'success' : 'failure'}</div>
      <div><span class="debug-label">Forced rolls:</span> ${_escapeHtml(queueStr)}</div>
      <div><span class="debug-label">Return stack:</span> ${(state.returnStack && state.returnStack.length > 0) ? state.returnStack.map(_escapeHtml).join(' > ') : '(empty)'}</div>
      <div><span class="debug-label">Visited:</span> ${visited}</div>
    </div>

    <div class="debug-section-header ${_debugOpenSections.tools ? 'open' : ''}" onclick="debugToggleSection('tools')">Tools</div>
    <div class="debug-section-body">
      <div class="debug-row">
        <label>Jump to:</label>
        <input type="text" id="debug-jump-input" placeholder="section id" onkeydown="if(event.key==='Enter'){debugJumpToSection();event.preventDefault();}">
        <button class="debug-btn" onclick="debugJumpToSection()">Go</button>
      </div>

      <div class="debug-row">
        <label>Set stat:</label>
        <select id="debug-stat-name">${statOptions}</select>
        <input type="number" id="debug-stat-value" placeholder="value" onkeydown="if(event.key==='Enter'){debugSetStat();event.preventDefault();}">
        <button class="debug-btn" onclick="debugSetStat()">Set</button>
      </div>

      <div class="debug-row">
        <label>Add flag:</label>
        <input type="text" id="debug-flag-input" placeholder="flag name" onkeydown="if(event.key==='Enter'){debugAddFlag();event.preventDefault();}">
        <button class="debug-btn" onclick="debugAddFlag()">Add</button>
      </div>
      <div>${_debugFlagList()}</div>

      <div class="debug-row">
        <label>Force rolls:</label>
        <input type="text" id="debug-rolls-input" placeholder="e.g. 6,6,1,1" onkeydown="if(event.key==='Enter'){debugQueueRolls();event.preventDefault();}">
        <button class="debug-btn" onclick="debugQueueRolls()">Queue</button>
        <button class="debug-btn" onclick="debugClearRolls()">Clear</button>
      </div>
      <div class="debug-note">
        Queued values feed the next rollDice() call. For NdX rolls, N values
        are consumed (1..X). For R10 rolls, one value (0..9). Any shortfall
        falls back to random. This feeds both UI dice rolls and Lua roll()
        calls from inside script events.
      </div>

      <div class="debug-row">
        <button class="debug-btn" onclick="debugShowSectionJson()">Show current section JSON</button>
        <button class="debug-btn" onclick="debugCopySectionJson()">Copy</button>
      </div>
      <pre class="debug-json" id="debug-section-json" style="display:none"></pre>

      <div class="debug-row">
        <button class="debug-btn" onclick="debugShowStateJson()">Show full state JSON</button>
        <button class="debug-btn" onclick="debugCopyStateJson()">Copy</button>
      </div>
      <pre class="debug-json" id="debug-state-json" style="display:none"></pre>

      <div id="debug-status" class="debug-status"></div>
    </div>
  `;
}

function debugToggleSection(key) {
  _debugOpenSections[key] = !_debugOpenSections[key];
  updateDebug();
}

function _debugFlash(msg) {
  const el = document.getElementById('debug-status');
  if (!el) return;
  el.textContent = msg;
  setTimeout(() => { if (el) el.textContent = ''; }, 2500);
}

function debugJumpToSection() {
  const input = document.getElementById('debug-jump-input');
  if (!input) return;
  const val = input.value.trim();
  if (!val) return;
  if (!gameData?.sections?.[val]) {
    _debugFlash(`Section ${val} not found`);
    return;
  }
  // Jumping clears any pending per-section state so the target section
  // processes its events cleanly. Flag / stat / roll state is preserved.
  pendingEvents = [];
  pendingChoices = [];
  // Force the game screen to be active and scroll to top. This handles
  // the case where the player opens the debug panel on the load screen,
  // the character-creation screen, the frontmatter screen, or even the
  // ending screen after dying — all of which hide game-content, so
  // navigateTo would otherwise update an invisible DOM element and the
  // player would see no change. The debug panel itself is position:
  // fixed and floats above every screen, so this reassignment is safe
  // regardless of where the player started.
  showScreen('game-screen');
  updateReferenceButton();
  navigateTo(val);
  // Reset the game-content scroll position too — in case the previous
  // section filled the page with combat logs and the viewport was
  // parked at the bottom.
  const gc = document.getElementById('game-content');
  if (gc && typeof gc.scrollTo === 'function') gc.scrollTo(0, 0);
}

function debugSetStat() {
  const nameEl = document.getElementById('debug-stat-name');
  const valEl = document.getElementById('debug-stat-value');
  if (!nameEl || !valEl) return;
  const name = nameEl.value;
  const raw = valEl.value;
  if (raw === '' || name === '') return;
  const val = parseInt(raw, 10);
  if (Number.isNaN(val)) {
    _debugFlash(`Not a number: ${raw}`);
    return;
  }
  if (name === 'provisions') state.provisions = val;
  else if (name === 'gold') state.gold = val;
  else if (name === 'meals') state.meals = val;
  else state.stats[name] = val;
  updateStatBar();
  updateInventory();
  updateDebug();
  _debugFlash(`${name} = ${val}`);
}

function debugAddFlag() {
  const input = document.getElementById('debug-flag-input');
  if (!input) return;
  const val = input.value.trim();
  if (!val) return;
  state.flags.add(val);
  input.value = '';
  updateDebug();
  _debugFlash(`Flag added: ${val}`);
}

function debugRemoveFlag(name) {
  if (!state.flags.has(name)) return;
  state.flags.delete(name);
  updateDebug();
  _debugFlash(`Flag removed: ${name}`);
}

function debugQueueRolls() {
  const input = document.getElementById('debug-rolls-input');
  if (!input) return;
  const vals = input.value
    .split(',')
    .map(s => s.trim())
    .filter(Boolean)
    .map(Number);
  if (vals.length === 0 || vals.some(Number.isNaN)) {
    _debugFlash('Enter comma-separated numbers (e.g. 6,6,1,1)');
    return;
  }
  if (!window._forcedRollQueue) window._forcedRollQueue = [];
  window._forcedRollQueue.push(...vals);
  input.value = '';
  updateDebug();
  _debugFlash(`Queued ${vals.length} roll(s): ${vals.join(',')}`);
}

function debugClearRolls() {
  window._forcedRollQueue = [];
  updateDebug();
  _debugFlash('Forced roll queue cleared');
}

function debugShowSectionJson() {
  const pre = document.getElementById('debug-section-json');
  if (!pre) return;
  const sid = state.currentSection;
  const sec = gameData?.sections?.[sid];
  if (!sec) {
    pre.textContent = `(no section ${sid})`;
  } else {
    pre.textContent = JSON.stringify(sec, null, 2);
  }
  pre.style.display = pre.style.display === 'none' ? 'block' : 'none';
}

function debugCopySectionJson() {
  const sid = state.currentSection;
  const sec = gameData?.sections?.[sid];
  const text = sec ? JSON.stringify(sec, null, 2) : `(no section ${sid})`;
  _debugCopyToClipboard(text, `Section ${sid} JSON copied`);
}

function debugShowStateJson() {
  const pre = document.getElementById('debug-state-json');
  if (!pre) return;
  pre.textContent = JSON.stringify(_debugSerializeState(), null, 2);
  pre.style.display = pre.style.display === 'none' ? 'block' : 'none';
}

function debugCopyStateJson() {
  _debugCopyToClipboard(
    JSON.stringify(_debugSerializeState(), null, 2),
    'Full state JSON copied'
  );
}

function _debugSerializeState() {
  // Return a plain-object snapshot of state. Sets become arrays so the
  // JSON stringifier can serialize them. Includes the forced roll
  // queue as a debug-only field so a copied snapshot captures the full
  // repro context.
  return {
    currentSection: state.currentSection,
    stats: { ...state.stats },
    initialStats: { ...state.initialStats },
    provisions: state.provisions,
    gold: state.gold,
    meals: state.meals,
    potion: state.potion,
    potionDoses: state.potionDoses,
    abilities: [...(state.abilities || [])],
    inventory: [...state.inventory],
    flags: [...state.flags],
    visitedSections: [...(state.visitedSections || [])],
    lastTestResult: window._lastTestResult ?? null,
    forcedRollQueue: [...(window._forcedRollQueue || [])],
  };
}

function _debugCopyToClipboard(text, successMsg) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(() => _debugFlash(successMsg))
      .catch(err => _debugFlash('Copy failed: ' + (err?.message || err)));
    return;
  }
  // Fallback for older browsers or file:// contexts without clipboard API
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-1000px';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    _debugFlash(successMsg);
  } catch (err) {
    _debugFlash('Copy failed (clipboard not available)');
  }
  document.body.removeChild(ta);
}

// ==================== SAVE / LOAD / EXPORT / IMPORT ====================
function serializeState() {
  return {
    stats: { ...state.stats },
    initialStats: { ...state.initialStats },
    inventory: [...state.inventory],
    flags: [...state.flags],
    provisions: state.provisions,
    gold: state.gold,
    potion: state.potion,
    potionDoses: state.potionDoses,
    abilities: [...(state.abilities || [])],
    meals: state.meals ?? 0,
    currentSection: state.currentSection,
    previousSection: state.previousSection ?? null,
    visitedSections: [...state.visitedSections],
    // Serialize the return stack so a save mid-subroutine reloads cleanly
    // — otherwise the auto-return path would lose the caller on the
    // first return_to_caller event after a load.
    returnStack: [...(state.returnStack || [])],
    _lastTestResult: window._lastTestResult ?? null,
  };
}

function deserializeState(obj) {
  state.stats = obj.stats || {};
  state.initialStats = obj.initialStats || {};
  state.inventory = obj.inventory || [];
  state.flags = new Set(obj.flags || []);
  state.provisions = obj.provisions ?? 0;
  state.gold = obj.gold ?? 0;
  state.meals = obj.meals ?? 0;
  state.potion = obj.potion || null;
  state.potionDoses = obj.potionDoses ?? 0;
  state.abilities = obj.abilities || [];
  state.currentSection = obj.currentSection || null;
  state.previousSection = obj.previousSection ?? null;
  state.visitedSections = new Set(obj.visitedSections || []);
  state.returnStack = Array.isArray(obj.returnStack) ? [...obj.returnStack] : [];
  window._lastTestResult = obj._lastTestResult ?? null;
}

function getSaveKey() {
  const title = gameData?.metadata?.title || 'unknown';
  return 'codex_save_' + title.replace(/\s+/g, '_').toLowerCase();
}

function saveGame() {
  if (!gameData || !state.currentSection) return;
  const save = {
    gameTitle: gameData.metadata?.title || 'Unknown',
    timestamp: new Date().toISOString(),
    state: serializeState(),
  };
  localStorage.setItem(getSaveKey(), JSON.stringify(save));
  flashStatus('Saved');
}

function loadSavedGame() {
  const raw = localStorage.getItem(getSaveKey());
  if (!raw) {
    flashStatus('No save found');
    return;
  }
  const save = JSON.parse(raw);
  loadGame(save);
  flashStatus('Loaded');
}

function loadGame(saveJson) {
  deserializeState(saveJson.state);
  showScreen('game-screen');
  updateReferenceButton();
  navigateTo(state.currentSection);
}

function exportState() {
  if (!gameData || !state.currentSection) return;
  const save = {
    gameTitle: gameData.metadata?.title || 'Unknown',
    timestamp: new Date().toISOString(),
    state: serializeState(),
  };
  const blob = new Blob([JSON.stringify(save, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const title = (gameData.metadata?.title || 'game').replace(/\s+/g, '_').toLowerCase();
  a.download = `${title}_save_${state.currentSection}.json`;
  a.click();
  URL.revokeObjectURL(url);
  flashStatus('Exported');
}

function importState(file) {
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const save = JSON.parse(ev.target.result);
      if (!save.state || !save.state.currentSection) throw new Error('Invalid save file');
      if (!gameData) {
        document.getElementById('load-error').textContent = 'Load a game data file first, then import a save.';
        return;
      }
      loadGame(save);
      flashStatus('Imported');
    } catch (err) {
      const errEl = document.getElementById('load-error') || document.getElementById('save-status');
      if (errEl) errEl.textContent = 'Import error: ' + err.message;
    }
  };
  reader.readAsText(file);
}

function flashStatus(msg) {
  const el = document.getElementById('save-status');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// Check for existing save on load screen
function checkForSave() {
  const area = document.getElementById('continue-area');
  if (!area) return;
  // Scan localStorage for any codex saves
  const saves = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('codex_save_')) {
      try {
        const save = JSON.parse(localStorage.getItem(key));
        saves.push({ key, ...save });
      } catch (e) {}
    }
  }
  if (saves.length === 0) { area.style.display = 'none'; return; }

  area.style.display = '';
  area.innerHTML = '<h3 style="margin-bottom:8px;">Continue</h3>';
  for (const save of saves) {
    const date = new Date(save.timestamp);
    const timeStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const div = document.createElement('div');
    div.style.marginBottom = '8px';
    div.innerHTML = `
      <button onclick="continueSave('${save.key}')">${save.gameTitle} — Section ${save.state.currentSection}</button>
      <div class="save-info">${timeStr}</div>
    `;
    area.appendChild(div);
  }
}

function continueSave(key) {
  const raw = localStorage.getItem(key);
  if (!raw) return;
  const save = JSON.parse(raw);
  // Need game data — prompt to load it
  if (!gameData) {
    document.getElementById('load-error').textContent = 'Please load the game data JSON file first, then click Continue.';
    return;
  }
  loadGame(save);
}

// Wire up import inputs
document.getElementById('import-input')?.addEventListener('change', (e) => {
  if (e.target.files[0]) importState(e.target.files[0]);
});
document.getElementById('import-game-input')?.addEventListener('change', (e) => {
  if (e.target.files[0]) importState(e.target.files[0]);
});

// Show continue on page load
checkForSave();
</script>
</body>
